async function submitWithStripe(){
  var nom=document.getElementById("bkNom").value.trim();
  var tel=document.getElementById("bkTel").value.trim();
  if(!nom||!tel){showAlert("Nom et telephone obligatoires","warning");return;}
  if(booking.lieu==='domicile'){
    if(!booking.clientAdr || booking.clientAdr.frais_mt==null){
      var ok=await validateClientAdresse();
      if(!ok){ showAlert("Veuillez verifier l\'adresse de RDV a domicile avant de payer.","warning"); return; }
    }
  }
  var pre=document.getElementById("bkPre").value.trim();
  var email=document.getElementById("bkEmail").value.trim();
  var msg=document.getElementById("bkMsg").value.trim();

  var t=bookingTotals();
  var dur=t.dur;
  var totalPrix=t.prixFinal;
  var primaryNom=bookingPrimaryNom();
  var itemsPayload=bookingItemsPayload();
  // ===== ROUTE EARLY SELON MODE DE CAUTION =====
  var modeC = SITE_CFG.modeCaution || (SITE_CFG.acompte?"acompte":"aucun");
  var acompte = 0;
  if(modeC === "empreinte"){
    acompte = Number(SITE_CFG.empreinteMontant) || 30;
  } else if(modeC === "acompte" || SITE_CFG.acompte){
    acompte = SITE_CFG.acompteType==="pourcentage"
      ? Math.round(totalPrix * SITE_CFG.acompteMt / 100)
      : SITE_CFG.acompteMt;
    if(SITE_CFG.acompteMin && acompte < SITE_CFG.acompteMin) acompte = SITE_CFG.acompteMin;
  }
  if(modeC === "aucun" || acompte <= 0){ submitBooking(); return; }

  // Check slot availability before payment
  await refreshRDV();
  if(isSlotTaken(booking.date,booking.time,dur,booking.collabId)){
    showAlert("Ce cr\u00e9neau n\u2019est plus disponible. Veuillez choisir un autre horaire.","warning");return;
  }
  
  // EMPREINTE : skip Connect Checkout (incompatible avec capture_method=manual) → flow fallback
  // ACOMPTE avec Connect actif → Connect Checkout
  if(modeC !== "empreinte" && SALON.connectId && SALON.connectStatus==="active"){
    // 1. Create RDV with pending_payment status
    var rdvData={
      salon_id:salonId,
      client_nom:nom,client_prenom:pre,client_tel:tel,client_email:email,
      client_online_id:null,client_luxyra_id:CLIENT?CLIENT.id:null,
      service_id:booking.svcId,service_nom:primaryNom,service_prix:totalPrix,
      items:itemsPayload,
      collaborateur_id:booking.collabId,collaborateur_nom:booking.collab?booking.collab.n:null,
      date_rdv:booking.date,heure_rdv:booking.time,duree_minutes:dur,
      acompte_montant:acompte,acompte_paye:false,
      status:"pending_payment",message:msg,
      lieu: booking.lieu||'salon'
    };
    if(booking.lieu==='domicile' && booking.clientAdr){
      rdvData.client_adresse = booking.clientAdr.adr;
      rdvData.client_adresse_cp = booking.clientAdr.cp;
      rdvData.client_adresse_ville = booking.clientAdr.ville;
      rdvData.adresse_complement = booking.clientAdr.complement || null;
      rdvData.client_lat = booking.clientAdr.lat;
      rdvData.client_lng = booking.clientAdr.lng;
      rdvData.distance_km = booking.clientAdr.distance_km;
      rdvData.frais_deplacement_montant = booking.clientAdr.frais_mt || 0;
    }
    var rdvRes=await sb.from("rdv_online").insert(rdvData).select();
    if(rdvRes.error){showAlert(rdvErrorMessage(rdvRes.error),"info");await refreshRDV();renderTimeSlots(booking.date);return;}
    var rdvId=rdvRes.data[0].id;
    
    // 2. Create Connect Checkout Session via worker
    var btn=event.target;btn.textContent="Redirection vers le paiement...";btn.disabled=true;
    try{
      var res=await fetch("/api/stripe/connect-payment",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          salon_id:salonId,
          amount:acompte,
          description:"Acompte - "+primaryNom+" le "+formatDateFR(booking.date)+" \u00e0 "+booking.time+" - "+SALON.nom,
          customer_email:email,
          customer_name:(nom+" "+(pre||"")).trim(),
          metadata:{type:"acompte",rdv_id:rdvId,return_url:window.location.origin+"/site.html?s="+salonId+"&payment=success&rdv="+rdvId,cancel_url:window.location.origin+"/site.html?s="+salonId+"&payment=cancel&rdv="+rdvId}
        })
      });
      var data=await res.json();
      if(data.url){
        window.location.href=data.url;
      }else{
        showAlert("Erreur paiement: "+(data.error||"Impossible de cr\u00e9er la session de paiement"),"error");
        btn.textContent="\ud83d\udcb3 Payer l\u2019acompte et confirmer";btn.disabled=false;
        // Cleanup: delete the pending RDV
        sb.from("rdv_online").delete().eq("id",rdvId);
      }
    }catch(e){
      showAlert("Erreur de connexion","error");
      btn.textContent="\ud83d\udcb3 Payer l\u2019acompte et confirmer";btn.disabled=false;
      sb.from("rdv_online").delete().eq("id",rdvId);
    }
    return;
  }
  
  // Fallback: no Connect → use card token simulation (test mode)
  // Mode caution : 'acompte' (par défaut, débit immédiat) ou 'empreinte' (pré-autorisation sans débit)
  var modeCaution = (SITE_CFG && SITE_CFG.modeCaution) || 'acompte';
  var isEmpreinte = (modeCaution === 'empreinte');
  if(isEmpreinte){ acompte = Number(SITE_CFG.empreinteMontant) || 30; }
  window._pendingBooking={nom:nom,pre:pre,tel:tel,email:email,msg:msg,acompte:acompte,mode:modeCaution};

  var hasMulti=booking.items&&booking.items.length>1;
  var h='<div class="step active">';
  h+='<div class="step-header"><div class="step-num">'+(isEmpreinte?'\ud83d\udd12':'\ud83d\udcb3')+'</div><div class="step-title">'+(isEmpreinte?'Empreinte bancaire':'Paiement de l\u0027acompte')+'</div></div>';
  if(isEmpreinte){
    h+='<div style="margin-bottom:14px;padding:12px;background:rgba(33,150,243,.08);border:1px solid rgba(33,150,243,.25);border-radius:10px;font-size:12px;color:#bbdefb;line-height:1.5">';
    h+='<strong style="color:#64b5f6">\ud83d\udd12 Aucun débit immédiat</strong><br>';
    h+='Une pré-autorisation de <strong>'+acompte.toFixed(2)+' \u20ac</strong> sera réalisée sur votre carte. Cette somme n\u0027est <strong>pas débitée</strong>. Elle sera <strong>libérée automatiquement</strong> après votre rendez-vous, ou <strong>encaissée uniquement en cas d\u0027absence</strong> non annulée dans les délais.';
    h+='</div>';
  }
  h+='<div class="summary">';
  if(hasMulti){
    h+='<div class="summary-row" style="font-weight:800;color:var(--gold)"><span>Prestations</span><span class="v">'+booking.items.length+'</span></div>';
    booking.items.forEach(function(it){
      h+='<div class="summary-row" style="padding-left:8px;font-size:13px"><span>\u2022 '+it.nom+'</span><span class="v">'+(Number(it.prix)||0).toFixed(2)+' \u20ac</span></div>';
    });
  }else{
    h+='<div class="summary-row"><span>Prestation</span><span class="v">'+primaryNom+'</span></div>';
  }
  h+='<div class="summary-row"><span>Date</span><span class="v">'+formatDateFR(booking.date)+' \u00e0 '+booking.time+'</span></div>';
  h+='<div class="summary-row" style="border-top:2px solid var(--gold);padding-top:10px;margin-top:8px"><span style="font-weight:800">'+(isEmpreinte?'Empreinte (non débitée)':'Acompte')+'</span><span class="v" style="font-size:20px;color:var(--gold)">'+acompte.toFixed(2)+' \u20ac</span></div>';
  h+='</div>';
  h+='<div style="margin-top:16px">';
  h+='<div style="margin-bottom:10px"><label style="font-size:12px;font-weight:700;color:rgba(255,255,255,.6);display:block;margin-bottom:4px">Titulaire de la carte</label>';
  h+='<input type="text" id="stripeCardName" value="'+(nom+' '+(pre||'')).trim()+'" style="width:100%;padding:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-size:14px"></div>';
  h+='<div id="stripeCardElement" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:14px;min-height:44px"></div>';
  h+='<div id="stripeError" style="color:#ef5350;font-size:12px;margin-top:6px;min-height:18px"></div>';
  if(isEmpreinte){
    h+='<label style="display:flex;align-items:flex-start;gap:8px;margin-top:10px;font-size:11px;color:rgba(255,255,255,.6);cursor:pointer"><input type="checkbox" id="empreinteAccept" style="margin-top:2px;flex-shrink:0"><span>J\u0027accepte que <strong>'+acompte.toFixed(2)+' \u20ac</strong> soit débité de ma carte en cas d\u0027absence non annulée 24h à l\u0027avance. <a href="/cgv" target="_blank" style="color:var(--gold)">Conditions</a></span></label>';
  }

async function processStripePayment(){
  var btn=document.getElementById("stripePayBtn");
  btn.disabled=true;
  btn.textContent="Paiement en cours...";
  
  var pb=window._pendingBooking;
  var acompte=pb.acompte;
  
  // Refresh availability from DB before payment
  var dur=booking.duration||30;
  await refreshRDV();
  if(isSlotTaken(booking.date,booking.time,dur,booking.collabId)){
    document.getElementById("stripeError").textContent="Ce créneau n'est plus disponible. Veuillez choisir un autre horaire.";
    btn.disabled=false;btn.textContent="\ud83d\udd12 Payer "+acompte.toFixed(2)+" \u20ac";return;
  }
  
  // Create PaymentIntent via Supabase Edge Function or direct API
  // For TEST MODE: we simulate the payment and mark it as paid
  // In production, you need a server-side endpoint to create PaymentIntents
  
  // Mode caution : empreinte (pré-autorisation Stripe sans débit) ou acompte (débit immédiat)
  var isEmp = (pb.mode === 'empreinte');
  if(isEmp){
    var ckEmp = document.getElementById("empreinteAccept");
    if(!ckEmp || !ckEmp.checked){
      document.getElementById("stripeError").textContent="Vous devez accepter les conditions de l\u0027empreinte bancaire.";
      btn.disabled=false; btn.textContent="\ud83d\udd12 Pré-autoriser "+acompte.toFixed(2)+" \u20ac"; return;
    }
  }

  try{
    var cardName=document.getElementById("stripeCardName").value.trim()||pb.nom;
    var result;
    if(isEmp){
      // Empreinte : créer un PaymentMethod (pm_xxx) → utilisé par PaymentIntent capture_method=manual
      result = await stripe.createPaymentMethod({type:"card", card: window._stripeCard, billing_details:{name:cardName}});
    } else {
      // Acompte : token classique (Charges API legacy)
      result = await stripe.createToken(window._stripeCard, {name:cardName});
    }
    
    if(result.error){
      document.getElementById("stripeError").textContent=result.error.message;
      btn.disabled=false;
      btn.textContent=isEmp?"\ud83d\udd12 Pré-autoriser "+acompte.toFixed(2)+" \u20ac":"\ud83d\udd12 Payer "+acompte.toFixed(2)+" \u20ac";
      return;
    }
    
    // Branche selon mode : acompte (token débit immédiat) ou empreinte (PaymentMethod + PaymentIntent capture_method=manual)
    var tokenId = isEmp ? null : result.token.id;
    var paymentMethodId = isEmp ? result.paymentMethod.id : null;
    var last4 = isEmp ? (result.paymentMethod.card?.last4 || null) : result.token.card.last4;
    var brand = isEmp ? (result.paymentMethod.card?.brand || null) : result.token.card.brand;

    var t=bookingTotals();
    var dur=t.dur;
    var totalPrix=t.prix;
    var primaryNom=bookingPrimaryNom();
    var itemsPayload=bookingItemsPayload();
    var rdvData={
      client_nom:pb.nom,client_prenom:pb.pre,client_tel:pb.tel,client_email:pb.email,
      client_luxyra_id:CLIENT?CLIENT.id:null,
      service_id:booking.svcId,service_nom:primaryNom,service_prix:totalPrix,
      items:itemsPayload,
      collaborateur_id:booking.collabId,collaborateur_nom:booking.collab?booking.collab.n:null,
      date_rdv:booking.date,heure_rdv:booking.time,duree_minutes:dur,
      status:SITE_CFG.autoConfirm?"confirmed":"pending",
      message:pb.msg
    };

    var chargeResp;
    try{
      var endpoint = isEmp ? "rdv-empreinte-create" : "rdv-charge-acompte";
      var payload = isEmp
        ? {salon_id:salonId, payment_method_id:paymentMethodId, amount_eur:acompte, rdv_data:rdvData}
        : {salon_id:salonId, stripe_token:tokenId, amount_eur:acompte, rdv_data:rdvData};
      var r=await fetch(SB_URL+"/functions/v1/"+endpoint,{
        method:"POST",
        headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY},
        body:JSON.stringify(payload)
      });
      chargeResp=await r.json();
      if(!r.ok){
        document.getElementById("stripeError").textContent=chargeResp.error||(isEmp?"\u00c9chec de la pré-autorisation":"\u00c9chec du paiement");
        btn.disabled=false;
        btn.textContent=isEmp?"\ud83d\udd12 Pré-autoriser "+acompte.toFixed(2)+" \u20ac":"\ud83d\udd12 Payer "+acompte.toFixed(2)+" \u20ac";
        if(chargeResp.refunded||chargeResp.released){await refreshRDV();renderTimeSlots(booking.date);}
        return;
      }
    }catch(e){
      document.getElementById("stripeError").textContent="Erreur r\u00e9seau: "+e.message;
      btn.disabled=false;
      btn.textContent=isEmp?"\ud83d\udd12 Pré-autoriser "+acompte.toFixed(2)+" \u20ac":"\ud83d\udd12 Payer "+acompte.toFixed(2)+" \u20ac";
      return;
    }
    
    // SUCCESS - block slot from being rebooked
    RDV_EXISTING.push({date_rdv:booking.date,heure:booking.time,collab_id:booking.collabId,status:"conf",a_phases:[{t:"w",d:dur,l:primaryNom}]});
    // SUCCESS - show confirmation with payment receipt
    var hasMulti=booking.items&&booking.items.length>1;
    var h='<div class="success-page">';
    h+='<div class="ico">\u2705</div>';
    h+='<h2>'+(isEmp?'Pré-autorisation acceptée !':'Paiement accepté !')+'</h2>';
    h+='<p>'+(isEmp?'Une empreinte de <strong>'+acompte.toFixed(2)+' \u20ac</strong> a été réalisée sur votre carte. Aucun débit immédiat — sera libérée après votre RDV.':'Votre acompte de <strong>'+acompte.toFixed(2)+' \u20ac</strong> a été encaissé.')+'</p>';
    h+='<div class="summary" style="max-width:400px;margin:20px auto">';
    if(hasMulti){
      h+='<div class="summary-row" style="font-weight:800;color:var(--gold)"><span>Prestations</span><span class="v">'+booking.items.length+'</span></div>';
      booking.items.forEach(function(it){
        h+='<div class="summary-row" style="padding-left:8px;font-size:13px"><span>\u2022 '+it.nom+'</span><span class="v">'+(Number(it.prix)||0).toFixed(2)+' \u20ac</span></div>';
      });
      h+='<div class="summary-row" style="font-weight:700"><span>Total ('+dur+' min)</span><span class="v">'+totalPrix.toFixed(2)+' \u20ac</span></div>';
    }else{
      h+='<div class="summary-row"><span>Prestation</span><span class="v">'+primaryNom+'</span></div>';
    }
    h+='<div class="summary-row"><span>Date</span><span class="v">'+formatDateFR(booking.date)+' \u00e0 '+booking.time+'</span></div>';
    if(booking.collab)h+='<div class="summary-row"><span>Avec</span><span class="v">'+booking.collab.n+'</span></div>';
    h+='<div class="summary-row" style="border-top:2px solid var(--gold);padding-top:10px;margin-top:8px"><span>'+(isEmp?'Empreinte (non débitée)':'Acompte payé')+'</span><span class="v" style="color:#2d9a5e">'+acompte.toFixed(2)+' \u20ac \u2714</span></div>';
    h+='<div class="summary-row"><span>Carte</span><span class="v">'+brand.toUpperCase()+' **** '+last4+'</span></div>';
    h+='<div class="summary-row"><span>'+(isEmp?'À payer au salon':'Reste à payer au salon')+'</span><span class="v">'+(isEmp?totalPrix.toFixed(2):(totalPrix-acompte).toFixed(2))+' \u20ac</span></div>';
    h+='</div>';

    // Send email receipt if email provided
    h+='<button class="btn btn-outline" onclick="printAcompteReceipt(\''+primaryNom+'\','+acompte+',\''+booking.date+'\',\''+booking.time+'\',\''+brand+'\',\''+last4+'\')" style="margin-top:12px">\ud83d\udda8 Imprimer le re\u00e7u</button>';
    if(pb.email){
      h+='<p style="font-size:13px;color:var(--text3);margin-top:8px">Re\u00e7u disponible pour '+pb.email+'</p>';
    }
    
    h+='<button class="btn btn-gold" onclick="renderBookingStep1()" style="margin-top:16px">Nouveau rendez-vous</button>';
    h+='</div>';
    document.getElementById("bookingFlow").innerHTML=h;
    
    // Reload client RDVs
    if(CLIENT)loadClientRDVs();
    
  }catch(e){
    document.getElementById("stripeError").textContent="Erreur de paiement: "+e.message;
    btn.disabled=false;
    btn.textContent="\ud83d\udd12 Payer "+acompte.toFixed(2)+" \u20ac";
  }
}

async function doModifyRequest(rdvId){
  var newDate=document.getElementById("modifDate").value;
  var newTime=document.getElementById("modifTime").value;
  var msg=document.getElementById("modifMsg").value.trim();
  if(!newDate||!newTime){showAlert("Choisissez une date et un horaire","info");return;}
  var rdv=null;for(var i=0;i<CLIENT_RDVS.length;i++){if(CLIENT_RDVS[i].id===rdvId){rdv=CLIENT_RDVS[i];break;}}
  if(!rdv)return;
  var dur=rdv.duree_minutes||60;
  if(isSlotTaken(newDate,newTime,dur,rdv.collaborateur_id)){
    showAlert("Ce cr\u00e9neau n'est pas disponible. Choisissez un autre horaire.","warning");return;
  }
  try{
    // Endpoint sécurisé : worker valide token + check ownership du RDV
    var resM = await _clientApi("rdv-update", {
      rdv_id: rdvId,
      modification_demandee: true,
      modification_date: newDate,
      modification_heure: newTime,
      modification_message: msg||null,
      modification_status: "pending"
    });
    if(!resM.ok){ showAlert("Erreur: "+(resM.data&&resM.data.error?resM.data.error:"impossible"),"error"); return; }
    document.querySelector(".modify-modal").remove();
    var toast=document.createElement("div");
    toast.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2d9a5e;color:#fff;padding:14px 24px;border-radius:12px;font-weight:700;font-size:14px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3);text-align:center";
    toast.innerHTML="\u2705 Demande envoy\u00e9e<br><small style=\"font-weight:400;opacity:.8\">Le salon vous contactera</small>";
    document.body.appendChild(toast);setTimeout(function(){toast.remove();},4000);
    loadDashboardRdvs();
  }catch(e){showAlert("Erreur. R\u00e9essayez.","error");}
}

async function askCancelRdv(rdvId){
  var rdv=null;for(var i=0;i<CLIENT_RDVS.length;i++){if(CLIENT_RDVS[i].id===rdvId){rdv=CLIENT_RDVS[i];break;}}
  if(!rdv)return;
  // Quick Win #3 (2026-05-06) : prise en charge des nouvelles valeurs "0h" / "6h" / "12h" / "jamais"
  var policy=String(SITE_CFG.politiqueAnnul||"48h").trim().toLowerCase();
  var policyHours;
  if(policy==="jamais"||policy==="non"||policy==="no") policyHours=-1;
  else if(policy==="0"||policy==="0h"||policy==="aucun") policyHours=0;
  else { var _m=policy.match(/(\d+)/); policyHours=_m?parseInt(_m[1],10):48; }
  var rdvDate=new Date(rdv.date_rdv+"T"+(rdv.heure_rdv||"09:00"));
  var now=new Date();
  var hoursUntil=(rdvDate-now)/(1000*60*60);
  var canCancel=(policyHours===0)?true:(policyHours===-1)?false:(hoursUntil>=policyHours);
  var h='<div class="modify-modal" onclick="this.remove()">';
  h+='<div class="modify-box" onclick="event.stopPropagation()">';
  h+='<h2 style="font-family:var(--f1);color:#ef5350;margin-bottom:4px">Annuler ce rendez-vous ?</h2>';
  h+='<div style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:16px">'+rdv.service_nom+' \u2022 '+(rdv.heure_rdv?rdv.heure_rdv.slice(0,5):'')+' le '+rdv.date_rdv+'</div>';
  if(!canCancel){
    h+='<div style="background:rgba(239,83,80,.1);border:1px solid rgba(239,83,80,.2);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;color:#ef5350">';
    h+='\u26a0\ufe0f '+(policyHours===-1?'Ce salon n\'autorise pas les annulations en ligne. Contactez-le directement par t\u00e9l\u00e9phone.':'Annulation impossible moins de '+policyHours+'h avant le RDV. Contactez le salon par t\u00e9l\u00e9phone.')+'</div>';
    h+='<button class="btn-sm btn-outline" style="width:100%;padding:14px" onclick="this.closest(\'.modify-modal\').remove()">Compris</button>';
  }else{
    if(rdv.acompte_paye){
      h+='<div style="background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.2);border-radius:10px;padding:14px;margin-bottom:12px;font-size:13px;color:#d4a843">';
      h+='\ud83d\udcb3 Acompte de '+Number(rdv.acompte_montant).toFixed(0)+'\u20ac vers\u00e9. '+(SITE_CFG.remboursementAnnul?'Il sera rembours\u00e9.':'Non remboursable.')+'</div>';
    }
    h+='<div style="margin-bottom:16px"><label style="font-size:12px;font-weight:700;color:rgba(255,255,255,.6);display:block;margin-bottom:4px">Motif (optionnel)</label>';
    h+='<textarea id="cancelMsg" rows="2" placeholder="Raison..." style="width:100%;padding:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-size:13px;resize:none"></textarea></div>';
    h+='<div style="display:flex;gap:8px">';
    h+='<button class="btn-sm btn-outline" style="flex:1;padding:14px" onclick="this.closest(\'.modify-modal\').remove()">Retour</button>';
    h+='<button class="btn-sm btn-danger" style="flex:1;padding:14px;font-weight:800" onclick="doCancelRdv(\''+rdvId+'\')">Confirmer l\u0027annulation</button>';
    h+='</div>';
  }
  h+='</div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
}

async function doCancelRdv(rdvId){

var CART=[];

function addToCart(prodId){
  var prod=null;for(var i=0;i<PRODUCTS.length;i++){if(PRODUCTS[i].id===prodId){prod=PRODUCTS[i];break;}}
  if(!prod)return;
  // Determine effective price (promo or normal)
  var _today=new Date().toISOString().slice(0,10);
  var _isPromo=prod.promoActif&&prod.promoPrix&&(!prod.promoDebut||prod.promoDebut<=_today)&&(!prod.promoFin||prod.promoFin>=_today);
  var effPrice=_isPromo?prod.promoPrix:prod.p;
  var existing=null;for(var i=0;i<CART.length;i++){if(CART[i].id===prodId){existing=CART[i];break;}}
  if(existing){existing.qty++;existing.p=effPrice;}
  else{CART.push({id:prod.id,n:prod.n,p:effPrice,qty:1,cat:prod.cat,isPromo:_isPromo,prixNormal:prod.p});}
  updateCartBadge();
  // Toast
  var toast=document.createElement("div");
  toast.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:#0a0a0a;padding:10px 20px;border-radius:10px;font-weight:700;font-size:13px;z-index:999;box-shadow:0 4px 16px rgba(200,168,78,.3)";
  toast.textContent="\u2705 "+prod.n+" ajout\u00e9 au panier";
  document.body.appendChild(toast);
  setTimeout(function(){toast.remove();},2000);
}

function updateCartBadge(){
  var total=0;CART.forEach(function(c){total+=c.qty;});
  var el=document.getElementById("cartFloat");
  var cnt=document.getElementById("cartCount");
  if(el){el.style.display=total>0?"flex":"none";}
  if(cnt)cnt.textContent=total;
}

function showCart(){
  if(!CART.length){showAlert("Votre panier est vide","info");return;}
  var total=0;CART.forEach(function(c){total+=c.p*c.qty;});
  var h='<div class="auth-modal" onclick="closeCart()">';
  h+='<div class="auth-box" onclick="event.stopPropagation()" style="max-width:450px">';
  h+='<h2>\ud83d\uded2 Mon panier</h2>';
  for(var i=0;i<CART.length;i++){
    var c=CART[i];
    h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)">';
    h+='<div style="flex:1"><div style="font-weight:700;font-size:14px">'+c.n+'</div><div style="font-size:12px;color:var(--text3)">'+c.cat+'</div></div>';
    h+='<div style="display:flex;align-items:center;gap:8px">';
    h+='<button onclick="cartQty('+i+',-1)" style="width:28px;height:28px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:none;color:var(--text);cursor:pointer;font-size:16px">\u2212</button>';
    h+='<span style="font-weight:700;min-width:20px;text-align:center">'+c.qty+'</span>';
    h+='<button onclick="cartQty('+i+',1)" style="width:28px;height:28px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:none;color:var(--text);cursor:pointer;font-size:16px">+</button>';
    h+='</div>';
    h+='<div style="font-family:var(--f1);font-weight:700;color:var(--gold);min-width:60px;text-align:right">'+(c.p*c.qty).toFixed(2)+' \u20ac</div>';
    h+='</div>';
  }
  h+='<div style="display:flex;justify-content:space-between;padding:14px 0;font-size:18px;font-weight:800;border-top:2px solid var(--gold);margin-top:8px"><span>Total</span><span style="color:var(--gold)">'+total.toFixed(2)+' \u20ac</span></div>';
  h+='<button class="btn btn-gold" style="width:100%;padding:14px;font-size:15px;margin-top:12px" onclick="submitOrder()">Commander (retrait au salon)</button>';
  h+='<button class="btn btn-outline" style="width:100%;padding:10px;font-size:13px;margin-top:8px" onclick="closeCart()">Continuer mes achats</button>';
  h+='</div></div>';
  document.getElementById("authModal").innerHTML=h;

function closeCart(){document.getElementById("authModal").innerHTML="";}

function cartQty(idx,delta){
  CART[idx].qty+=delta;
  if(CART[idx].qty<=0)CART.splice(idx,1);
  updateCartBadge();
  if(CART.length)showCart();else closeCart();
}

async function submitOrder(){
  if(!CLIENT){showAuthModal("login");return;}
  var total=0;var items=[];
  CART.forEach(function(c){total+=c.p*c.qty;items.push({produit_id:c.id,nom:c.n,prix:c.p,qty:c.qty});});
  
  // If salon has Connect → pay online before order
  if(SALON.connectId&&SALON.connectStatus==="active"&&total>0){
    var data={
      salon_id:salonId,
      client_nom:CLIENT.nom+(CLIENT.prenom?" "+CLIENT.prenom:""),
      client_tel:CLIENT.telephone||"",
      client_email:CLIENT.email,
      items:items,total:total,
      status:"pending_payment"
    };
    var r=await sb.from("commandes_online").insert(data).select();
    if(r.error){showAlert("Erreur: "+r.error.message,"error");return;}
    var cmdId=r.data[0].id;
    try{
      var itemNames=items.map(function(i){return i.nom;}).join(", ");
      var res=await fetch("/api/stripe/connect-payment",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          salon_id:salonId,
          amount:total,
          description:"Commande Click & Collect - "+SALON.nom+" - "+itemNames.slice(0,80),
          customer_email:CLIENT.email,
          customer_name:CLIENT.nom+(CLIENT.prenom?" "+CLIENT.prenom:""),
          metadata:{type:"click_collect",commande_id:cmdId,return_url:window.location.origin+"/site.html?s="+salonId+"&order=success&cmd="+cmdId,cancel_url:window.location.origin+"/site.html?s="+salonId+"&order=cancel&cmd="+cmdId}
        })
      });
      var pData=await res.json();
      if(pData.url){CART=[];updateCartBadge();window.location.href=pData.url;return;}
      else{showAlert("Erreur paiement: "+(pData.error||"Impossible de créer la session"),"error");sb.from("commandes_online").delete().eq("id",cmdId);}
    }catch(e){showAlert("Erreur de connexion","error");sb.from("commandes_online").delete().eq("id",cmdId);}
    return;
  }
  
  // No Connect → order without online payment (pay at salon)
  var data={
    salon_id:salonId,
    client_nom:CLIENT.nom+(CLIENT.prenom?" "+CLIENT.prenom:""),
    client_tel:CLIENT.telephone||"",
    client_email:CLIENT.email,
    items:items,total:total,
    status:"pending"
  };
  var r=await sb.from("commandes_online").insert(data).select();
  if(r.error){showAlert("Erreur: "+r.error.message,"error");return;}
  CART=[];updateCartBadge();
  var h='<div class="auth-modal" onclick="closeCart()">';
  h+='<div class="auth-box" onclick="event.stopPropagation()" style="text-align:center">';
  h+='<div style="font-size:48px;margin-bottom:12px">\u2705</div>';
  h+='<h2 style="color:var(--green)">Commande envoy\u00e9e !</h2>';
  h+='<p style="color:var(--text2);margin-top:8px">Votre commande de '+total.toFixed(2)+' \u20ac a \u00e9t\u00e9 transmise au salon. Nous vous pr\u00e9viendrons quand elle sera pr\u00eate \u00e0 retirer.</p>';
  h+='<button class="btn btn-gold" style="margin-top:16px;padding:12px 32px" onclick="closeCart()">Fermer</button>';
  h+='</div></div>';
  document.getElementById("authModal").innerHTML=h;
}

// Helpers
function toMin(t){var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function fromMin(m){return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");}
// === Carte d'abonnement (site) ===
var CLIENT_CARTE_ABO=null;
async function checkClientCarteAbo(){
  CLIENT_CARTE_ABO=null;
  if(!CLIENT||!CLIENT.email||!salonId)return;
  try{
    // Endpoint sécurisé : worker valide token + filtre par salon_id côté serveur (service_role)
    var res = await _clientApi("cartes", {salon_id: salonId, only_active: true});
    var cartes = (res.ok && res.data && Array.isArray(res.data.cartes)) ? res.data.cartes : [];
    if(cartes.length){
      var c = cartes[0];
      var today=new Date().toISOString().slice(0,10);
      if(!c.date_expiration||c.date_expiration>=today){
        CLIENT_CARTE_ABO={id:c.id,carteNom:c.carte_nom,remiseServices:Number(c.remise_services),remiseForfaits:Number(c.remise_forfaits),dateExp:c.date_expiration,eco:Number(c.economies_totales)||0};
      }
    }
  }catch(e){}
}

function formatDateFR(ds){if(!ds)return"";var p=ds.split("-");var dt=new Date(p[0],p[1]-1,p[2]);var jours=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];var mois=["janvier","f\u00e9vrier","mars","avril","mai","juin","juillet","ao\u00fbt","septembre","octobre","novembre","d\u00e9cembre"];return jours[dt.getDay()]+" "+p[2]+" "+mois[dt.getMonth()]+" "+p[0];}

async function submitSouscrireCarte(idx){
  if(!CLIENT){openAuthModal();return;}
  var ca=window.SITE_CARTES_ABO&&window.SITE_CARTES_ABO[idx||0];
  if(!ca)return;
  var btn=document.getElementById("btnSouscrirePay");
  if(btn){btn.disabled=true;btn.textContent="Cr\u00e9ation du paiement\u2026";}
  try{
    // 1) Pr\u00e9-cr\u00e9ation de la carte en status "pending_payment"
    var dExp=new Date();dExp.setMonth(dExp.getMonth()+ca.duree);
    var dateAchat=new Date().toISOString().slice(0,10);
    var dateExp=dExp.toISOString().slice(0,10);
    var clientNom=((CLIENT.prenom||"")+" "+(CLIENT.nom||"")).trim()||CLIENT.email;
    var insertRes=await sb.from("cartes_abo_clients").insert({
      salon_id:salonId,
      client_id:CLIENT.id||CLIENT.email,
      client_nom:clientNom,
      client_luxyra_id:CLIENT.email,
      carte_id:String(ca.id||""),
      carte_nom:ca.nom,
      tarif:Number(ca.tarif),
      remise_services:Number(ca.remiseServices),
      remise_forfaits:Number(ca.remiseForfaits),
      date_achat:dateAchat,
      date_expiration:dateExp,
      status:"pending_payment",
      ticket_num:"",
      economies_totales:0
    }).select().single();
    if(insertRes.error){throw new Error(insertRes.error.message);}
    var carteId=insertRes.data.id;
    // 2) Cr\u00e9ation de la session Stripe Checkout via le worker
    var slugOrId=SALON.slug||salonId;
    // Stripe remplace {CHECKOUT_SESSION_ID} par l'ID r\u00e9el au retour
    var returnUrl=window.location.origin+"/"+slugOrId+"?carte_paid=success&id="+carteId+"&session_id={CHECKOUT_SESSION_ID}";
    var cancelUrl=window.location.origin+"/"+slugOrId+"?carte_paid=cancel&id="+carteId;
    var payRes=await fetch("/api/stripe/connect-payment",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        salon_id:salonId,
        amount:Number(ca.tarif),
        description:"Carte d'abonnement \u2014 "+ca.nom,
        customer_email:CLIENT.email,
        customer_name:clientNom,
        metadata:{
          type:"carte_abo",
          carte_abo_id:carteId,
          rdv_id:carteId,
          return_url:returnUrl,
          cancel_url:cancelUrl
        }
      })
    });
    var payData=await payRes.json();
    if(!payData.url){throw new Error(payData.error||"Erreur paiement");}
    window.location.href=payData.url;
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent="\ud83d\udcb3 Payer "+ca.tarif+" \u20ac en ligne";}
    showAlert("Erreur : "+e.message,"error");
  }
}

// D\u00e9tection au load des retours de paiement carte d'abonnement
(async function handleCartePaymentReturn(){
  var qp=new URLSearchParams(window.location.search);
  var status=qp.get("carte_paid");
  var carteId=qp.get("id");
  var sessionId=qp.get("session_id");
  if(!status||!carteId)return;
  // Nettoie l'URL
  window.history.replaceState({},"",window.location.pathname);
  if(status==="success"){
    if(!sessionId){
      showAlert("\u26a0 Confirmation de paiement sans identifiant Stripe. Contactez le salon si la remise n'appara\u00eet pas.","warning");
      return;
    }
    try{
      // L'activation passe par une edge function qui v\u00e9rifie le paiement Stripe
      var r=await fetch("https://kxdgjtvrkwugbifgppai.supabase.co/functions/v1/carte-abo-confirm-payment",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({carte_id:carteId,stripe_session_id:sessionId})
      });
      var data=await r.json();
      if(!data.ok){throw new Error(data.error||"Activation \u00e9chou\u00e9e");}
      // Recharge la carte client + UI
      if(typeof checkClientCarteAbo==="function")await checkClientCarteAbo();
      setTimeout(function(){showAlert("\u2705 Votre carte d'abonnement est active ! La remise s'appliquera automatiquement \u00e0 vos prochaines r\u00e9servations.","success");},300);
    }catch(e){
      showAlert("\u26a0 Le paiement a r\u00e9ussi mais l'activation a \u00e9chou\u00e9.\nContactez le salon en pr\u00e9cisant la r\u00e9f\u00e9rence : "+carteId+"\nErreur : "+e.message,"error");
    }
  }else if(status==="cancel"){
    // La carte pending_payment sera nettoy\u00e9e par cron \u2014 pas de delete c\u00f4t\u00e9 client (RLS)
  }
})();
</script>
