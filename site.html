<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Réservation en ligne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lx-client.js"></script>
<script src="https://js.stripe.com/v3/"></script>
<style>
:root{--gold:#c8a84e;--gold-l:#e8d994;--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1e;--text:#f5f0e8;--text2:rgba(245,240,232,.6);--text3:rgba(245,240,232,.35);--green:#2d9a5e;--red:#c43838;--f1:'Playfair Display',serif;--f2:'Nunito',sans-serif;--f3:'Cormorant Garamond',serif;--max:900px}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:var(--f2);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
html{overflow-x:hidden}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
.loading .spin{width:40px;height:40px;border:3px solid rgba(200,168,78,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-page{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;text-align:center;padding:20px}
.error-page h2{font-family:var(--f1);color:var(--gold);font-size:28px}

/* HEADER — desktop : logo gauche / menu droite ; mobile : logo centré + menu en dessous */
.header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(200,168,78,.1);position:sticky;top:0;background:rgba(10,10,10,.95);backdrop-filter:blur(12px);z-index:50}
.h-logo{display:flex;align-items:center;gap:12px}
.h-logo img{height:44px;border-radius:10px}
.h-name{font-family:var(--f1);font-size:18px;font-weight:700;color:var(--gold)}
.h-sub{font-size:11px;color:var(--text3);letter-spacing:2px}
.h-links{display:flex;gap:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;max-width:100%}
.h-links::-webkit-scrollbar{display:none}
.h-links a{flex-shrink:0;white-space:nowrap}
.h-links a{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);text-decoration:none;padding:8px 14px;border-radius:8px;transition:all .3s}
.h-links a:hover,.h-links a.active{color:var(--gold);background:rgba(200,168,78,.08)}
/* Mobile : header en colonne, logo centré, menu pleine largeur en dessous (scrollable horizontal si besoin) */
@media(max-width:720px){
  .header{flex-direction:column;gap:12px;padding:14px 16px;position:static}
  .h-logo{justify-content:center;text-align:left}
  .h-logo img{height:38px}
  .h-name{font-size:16px}
  .h-links{width:100%;justify-content:flex-start;gap:6px;padding:0 2px}
  .h-links a{padding:7px 10px;font-size:11px;letter-spacing:.5px}
}

/* TABS / PAGES */
.page{display:none;max-width:var(--max);margin:0 auto;padding:24px 16px}
.page.active{display:block}
.sec{font-family:var(--f1);font-size:clamp(24px,4vw,36px);font-weight:700;text-align:center;margin-bottom:8px}
.sec-sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:32px;max-width:500px;margin-left:auto;margin-right:auto}
.gold-sep{width:50px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto 20px}

/* CARDS */
.card{background:var(--bg3);border:1px solid rgba(200,168,78,.08);border-radius:14px;padding:18px;margin-bottom:12px;transition:all .3s}
.card:hover{border-color:rgba(200,168,78,.2)}
.card-title{font-family:var(--f1);font-size:16px;font-weight:700;color:var(--gold);margin-bottom:10px}

/* === FICHE SALON ACCUEIL — version pro === */
.salon-hero{padding:40px 24px 32px;text-align:center;border-bottom:1px solid rgba(200,168,78,.08);margin-bottom:24px}
.salon-hero-meta{font-size:12px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:12px}
.salon-hero-name{font-family:var(--f1);font-size:clamp(32px,6vw,48px);font-weight:800;line-height:1.05;margin:0 0 6px;letter-spacing:-.5px}
.salon-hero-sub{font-family:var(--f3);font-size:18px;color:var(--gold);font-style:italic;margin-bottom:6px}
.salon-hero-slogan{font-family:var(--f3);font-size:15px;color:var(--text2);font-style:italic;margin-bottom:14px}
.salon-hero-info{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;align-items:center;font-size:13px;color:var(--text2);margin:14px 0 10px}
.salon-hero-stars{display:inline-flex;gap:4px;align-items:center;font-weight:700;color:var(--text)}
.salon-hero-msg{font-size:15px;color:var(--text2);max-width:520px;margin:14px auto 0;line-height:1.6}
.salon-hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}
/* === Bannière hero visuelle (photoHero) === */
.salon-hero-banner{position:relative;min-height:380px;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;text-align:center;padding:56px 24px;margin-bottom:32px;overflow:hidden;border-bottom:1px solid rgba(200,168,78,.08)}
/* Overlay renforcé : flou subtil + dégradé plus dense pour lisibilité maximale du texte */
.salon-hero-banner::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.7) 60%,rgba(0,0,0,.9) 100%);z-index:1}
.salon-hero-banner>.salon-hero-content{position:relative;z-index:2;max-width:820px;width:100%}
.salon-hero-banner .salon-hero-meta{color:#ffd76a;text-shadow:0 2px 10px rgba(0,0,0,.9),0 0 1px rgba(0,0,0,.9);letter-spacing:4px;font-weight:800}
.salon-hero-banner .salon-hero-name{color:#fff;font-size:clamp(38px,7vw,64px);text-shadow:0 4px 18px rgba(0,0,0,.95),0 0 2px rgba(0,0,0,.9);margin-bottom:10px;font-weight:800}
.salon-hero-banner .salon-hero-sub{color:#ffd76a;text-shadow:0 2px 10px rgba(0,0,0,.9),0 0 1px rgba(0,0,0,.9);font-size:22px;font-weight:600}
.salon-hero-banner .salon-hero-slogan{color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.9),0 0 1px rgba(0,0,0,.9);font-size:18px;margin-top:10px;font-weight:500;opacity:.95}
.salon-hero-banner .salon-hero-info{color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.9);font-size:15px;font-weight:600;margin-top:18px}
.salon-hero-banner .salon-hero-info span{background:rgba(0,0,0,.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:6px 14px;border-radius:50px;border:1px solid rgba(255,255,255,.12)}
.salon-hero-banner .salon-hero-msg{color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9);font-weight:500;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:14px 22px;border-radius:12px;border:1px solid rgba(255,255,255,.15);font-size:15px}
@media(max-width:520px){.salon-hero-banner{min-height:310px;padding:36px 16px}.salon-hero-banner .salon-hero-name{font-size:clamp(28px,8vw,42px)}.salon-hero-banner .salon-hero-sub{font-size:18px}}

.salon-block{padding:24px 0;border-top:1px solid rgba(200,168,78,.08)}
.salon-block-text--styled{font-family:Georgia,serif;font-size:15px;color:var(--text);line-height:1.85;max-width:720px;text-align:justify;hyphens:auto}
.salon-block-text--styled p{margin:0 0 14px}
.salon-block-text--styled p:last-child{margin-bottom:0}
.salon-block-text--styled .firstline::first-letter{font-family:var(--f1);font-size:42px;font-weight:800;float:left;line-height:1;padding:4px 10px 0 0;color:var(--gold)}
.salon-block-text--styled em{color:var(--gold);font-style:italic;font-weight:500}
.salon-block-deco{display:flex;align-items:center;gap:14px;margin:6px 0 16px;max-width:720px}
.salon-block-deco .line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,78,.4),transparent)}
.salon-block-deco .star{color:var(--gold);font-size:14px}
.salon-block:first-of-type{border-top:none}
.salon-block-title{font-family:var(--f1);font-size:22px;font-weight:700;color:var(--gold);margin-bottom:14px}
.salon-block-text{font-size:14px;color:var(--text2);line-height:1.7;max-width:680px}

.equipe-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:16px;margin-top:8px}
.equipe-card{display:flex;flex-direction:column;align-items:center;text-align:center;padding:18px 12px;background:var(--bg3);border:1px solid rgba(200,168,78,.08);border-radius:14px;transition:transform .25s,border-color .25s}
.equipe-card:hover{transform:translateY(-3px);border-color:rgba(200,168,78,.3)}
.equipe-photo{width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);margin-bottom:10px;box-shadow:0 6px 20px rgba(0,0,0,.35);transition:transform .25s}
.equipe-card:hover .equipe-photo{transform:scale(1.04)}
@media(max-width:520px){.equipe-photo{width:90px;height:90px}}
.equipe-avatar{width:64px;height:64px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;margin-bottom:8px}
.equipe-name{font-size:13px;font-weight:700;color:var(--text)}

.photos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.photos-grid.photos-2{grid-template-columns:repeat(2,1fr)}
.photos-grid.photos-1{grid-template-columns:1fr}
.photos-item{aspect-ratio:4/3;border-radius:12px;overflow:hidden;cursor:pointer;background:#0c0c12;transition:transform .25s}
.photos-item:hover{transform:translateY(-2px)}
.photos-item img{width:100%;height:100%;object-fit:cover;display:block}
@media(max-width:600px){.photos-grid{grid-template-columns:repeat(2,1fr)}}

.pratique-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:720px){.pratique-grid{grid-template-columns:1fr}}
.salon-mini-map{width:100%;min-height:280px;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:#0c0c12;position:relative;z-index:1}
.salon-mini-map-empty{display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;padding:30px;text-align:center}
/* Empêche les contrôles Leaflet (zoom +/- attribution) de passer par-dessus le header sticky (z-index:50) */
.leaflet-pane,.leaflet-top,.leaflet-bottom,.leaflet-control{z-index:2 !important}
.leaflet-popup-pane{z-index:5 !important}
.pratique-info{display:flex;flex-direction:column;gap:14px}
.pratique-block{background:var(--bg3);border:1px solid rgba(200,168,78,.08);border-radius:12px;padding:14px 16px}
.pratique-title{font-family:var(--f1);font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
.pratique-jour{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);padding:3px 0}
.pratique-jour.aujourdhui{color:var(--gold);font-weight:700}
.pratique-line{font-size:13px;color:var(--text2);padding:2px 0;line-height:1.7}
.pratique-line a{color:var(--gold);text-decoration:none}
.pratique-line a:hover{text-decoration:underline}

/* === PAGE TARIFS — sticky chips + liste par catégorie === */
.tarifs-chips{display:flex;gap:8px;overflow-x:auto;padding:10px 4px;position:sticky;top:0;background:linear-gradient(180deg,var(--bg) 80%,rgba(6,6,9,0));backdrop-filter:blur(12px);z-index:30;scrollbar-width:none;-ms-overflow-style:none;margin-bottom:14px;border-bottom:1px solid rgba(200,168,78,.06)}
.tarifs-chips::-webkit-scrollbar{display:none}
.tarif-chip{flex-shrink:0;padding:8px 16px;border-radius:50px;background:rgba(212,168,67,.06);border:1px solid rgba(212,168,67,.15);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f2);transition:all .2s;white-space:nowrap}
.tarif-chip:hover{border-color:var(--gold);color:var(--text)}
.tarif-chip.active{background:rgba(212,168,67,.18);border-color:var(--gold);color:var(--gold)}

.tarifs-list{padding-bottom:60px}
.tarif-cat{margin-bottom:32px;scroll-margin-top:90px}
.tarif-cat-title{font-family:var(--f1);font-size:22px;font-weight:700;color:var(--gold);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(200,168,78,.15)}
.tarif-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 6px;border-bottom:1px solid rgba(255,255,255,.04)}
.tarif-row:last-child{border-bottom:none}
.tarif-row-left{flex:1;min-width:0}
.tarif-row-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px}
.tarif-row-meta{font-size:12px;color:var(--text3)}
.tarif-row-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.tarif-row-price{font-family:var(--f1);font-weight:800;font-size:18px;color:var(--gold);min-width:80px;text-align:right}
.tarif-row-cta{padding:8px 14px;border-radius:8px;background:rgba(212,168,67,.1);border:1.5px solid var(--gold);color:var(--gold);font-weight:700;font-size:12px;cursor:pointer;font-family:var(--f2);transition:all .2s;letter-spacing:.5px;white-space:nowrap}
.tarif-row-cta:hover{background:var(--gold);color:#0a0a0a;transform:translateY(-1px)}

/* Anciennes classes tarif (compat si jamais utilisées ailleurs) */
.tarif-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.tarif-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px}
.tarif-item:last-child{border-bottom:none}
.tarif-item .p{font-family:var(--f1);font-weight:700;color:var(--gold)}

/* BOOKING FLOW */
.step{display:none}.step.active{display:block}
.step-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.step-num{width:36px;height:36px;border-radius:50%;background:var(--gold);color:#0a0a0a;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
.step-title{font-family:var(--f1);font-size:20px;font-weight:700}

/* Service selection */
.svc-card{padding:14px;border-radius:12px;cursor:pointer;border:2px solid rgba(200,168,78,.08);background:var(--bg3);transition:all .3s;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:12px}
.svc-card:hover{border-color:rgba(200,168,78,.25)}
.svc-card.selected{border-color:var(--gold);background:rgba(200,168,78,.06)}
.svc-card .n{font-weight:700;font-size:14px}.svc-card .d{font-size:12px;color:var(--text3);margin-top:2px}
.svc-card .p{font-family:var(--f1);font-weight:800;font-size:18px;color:var(--gold)}
.svc-card .chk{width:24px;height:24px;border-radius:8px;border:2px solid rgba(200,168,78,.25);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#0a0a0a;font-weight:900;font-size:14px;transition:all .2s}
.svc-card.selected .chk{background:var(--gold);border-color:var(--gold)}
.svc-card .body{flex:1;min-width:0}
.book-cart{position:sticky;bottom:12px;z-index:30;background:linear-gradient(135deg,rgba(200,168,78,.14),rgba(200,168,78,.06));border:1.5px solid rgba(200,168,78,.35);border-radius:14px;padding:14px 16px;margin-top:16px;backdrop-filter:blur(8px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.book-cart .bc-line{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text2);padding:4px 0}
.book-cart .bc-line .v{color:#fff;font-weight:700}
.book-cart .bc-tot{border-top:1px solid rgba(200,168,78,.2);padding-top:8px;margin-top:6px;font-size:14px}
.book-cart .bc-tot .v{font-family:var(--f1);font-size:18px;color:var(--gold);font-weight:900}
.book-cart .bc-cta{margin-top:10px;width:100%}
.book-cart-empty{font-size:12px;color:var(--text3);text-align:center;padding:6px 0}

/* Collab selection */
.collab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.collab-card{text-align:center;padding:20px 12px;border-radius:14px;cursor:pointer;border:2px solid rgba(200,168,78,.08);background:var(--bg3);transition:all .3s}
.collab-card:hover{border-color:rgba(200,168,78,.25)}
.collab-card.selected{border-color:var(--gold);background:rgba(200,168,78,.06)}
.collab-av{width:88px;height:88px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-family:var(--f1);font-size:32px;font-weight:800;border:3px solid var(--gold);color:var(--gold);background:rgba(200,168,78,.06);box-shadow:0 4px 14px rgba(0,0,0,.3)}
@media(max-width:520px){.collab-av{width:72px;height:72px;font-size:26px}}
.collab-card img.av{width:88px;height:88px;border-radius:50%;object-fit:cover;margin:0 auto 12px;display:block;border:3px solid var(--gold);box-shadow:0 4px 14px rgba(0,0,0,.3)}
@media(max-width:520px){.collab-card img.av{width:72px;height:72px}}
.collab-name{font-weight:700;font-size:14px}

/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav button{background:none;border:2px solid rgba(200,168,78,.15);color:var(--gold);padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px;font-family:var(--f2)}
.cal-nav button:hover{background:rgba(200,168,78,.08)}
.cal-nav .month{font-family:var(--f1);font-size:18px;font-weight:700;color:var(--gold)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center}
.cal-head{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:1px;padding:8px 0}
.cal-day{padding:10px 4px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;border:2px solid transparent}
.cal-day:hover{background:rgba(200,168,78,.08)}
.cal-day.today{border-color:rgba(200,168,78,.2)}
.cal-day.selected{background:var(--gold);color:#0a0a0a;font-weight:800}
.cal-day.disabled{opacity:.2;pointer-events:none}
.cal-day.off{opacity:.15;pointer-events:none;text-decoration:line-through}

/* Time slots */
.slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.slot{padding:12px;text-align:center;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;border:2px solid rgba(200,168,78,.1);background:var(--bg3);transition:all .2s}
.slot:hover{border-color:rgba(200,168,78,.3)}
.slot.selected{background:var(--gold);color:#0a0a0a;border-color:var(--gold)}
.slot.taken{opacity:.2;pointer-events:none;text-decoration:line-through}

/* Form */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)}
.fg input,.fg textarea{padding:14px 16px;border-radius:10px;border:1.5px solid rgba(200,168,78,.15);background:rgba(255,255,255,.04);color:var(--text);font-family:var(--f2);font-size:15px;outline:none}
.fg input:focus,.fg textarea:focus{border-color:var(--gold)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Buttons */
.btn{display:inline-block;padding:14px 28px;border-radius:10px;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;border:none;font-family:var(--f2);transition:all .3s}
.btn-gold{background:var(--gold);color:#0a0a0a}.btn-gold:hover{background:var(--gold-l);transform:translateY(-1px)}
.btn-outline{background:transparent;border:2px solid rgba(200,168,78,.2);color:var(--gold)}.btn-outline:hover{background:rgba(200,168,78,.08)}
.btn:disabled{opacity:.3;pointer-events:none}

/* Summary */
.summary{background:rgba(200,168,78,.04);border:2px solid rgba(200,168,78,.15);border-radius:16px;padding:24px;margin:20px 0}
.summary-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(200,168,78,.08);font-size:14px}
.summary-row:last-child{border-bottom:none}
.summary-row .v{font-weight:700;color:var(--gold)}

/* Success */
.success-page{text-align:center;padding:60px 20px}
.success-page .ico{font-size:64px;margin-bottom:16px}
.success-page h2{font-family:var(--f1);font-size:28px;color:var(--green);margin-bottom:12px}

// Helper sécurisé : appelle un endpoint /api/client/* du worker.

// fidelite_client, rdv_online qui étaient en USING(true).
async function _clientApi(endpoint, body){
  var token = (window.LX && LX.getToken) ? LX.getToken() : "";
  if(!token) return {ok:false, status:401, data:{error:"Pas de session"}};
  var payload = Object.assign({session_token:token}, body||{});
  try{
    var r = await fetch("/api/client/"+endpoint, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
    var data;
    try{ data = await r.json(); }catch(_){ data = {}; }
    // Pas de LX.logout() auto sur 401 (cf. compte.html — destructif si bug temporaire)
    return {ok:r.ok, status:r.status, data:data};

// Géocodage adresse via API BAN (gouv.fr)
async function geocodeBANSimple(query){
  try{
    var url="https://api-adresse.data.gouv.fr/search/?q="+encodeURIComponent(query)+"&limit=1";
    var r=await fetch(url);
    var d=await r.json();
    if(d&&d.features&&d.features[0]){
      var f=d.features[0];
      return {
        lat: f.geometry.coordinates[1],
        lng: f.geometry.coordinates[0],
        label: f.properties.label,
        cp: f.properties.postcode||"",
        ville: f.properties.city||""
      };
    }
  }catch(e){console.warn("geocode:",e);}
  return null;
}

// Distance Haversine entre 2 points GPS
function distanceKmSite(lat1,lon1,lat2,lon2){
  if(lat1==null||lon1==null||lat2==null||lon2==null) return null;
  var R=6371;
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Calcul des frais de déplacement
function computeFraisDepl(distanceKm){
  var fraisType=String(SALON.frais_deplacement_type||"forfait");
  var fraisDepl=Number(SALON.frais_deplacement||0);
  if(fraisDepl<=0) return 0;
  if(fraisType==="par_km") return Math.round(fraisDepl*distanceKm*100)/100;
  return fraisDepl; // forfait
}

async function validateClientAdresse(){
  var adr=document.getElementById("bkClientAdr");
  var cp=document.getElementById("bkClientCp");
  var ville=document.getElementById("bkClientVille");
  var compl=document.getElementById("bkClientCompl");
  var statusEl=document.getElementById("bkAdrStatus");
  if(!adr||!adr.value.trim()){
    if(statusEl){statusEl.style.color='var(--red)';statusEl.textContent='Adresse requise pour un RDV à domicile';}
    return false;
  }
  if(statusEl){statusEl.style.color='var(--text3)';statusEl.textContent='⏳ Vérification de l\'adresse...';}
  var query=adr.value.trim()+', '+(cp?cp.value.trim()+' ':'')+(ville?ville.value.trim():'');
  var geo=await geocodeBANSimple(query);
  if(!geo){
    if(statusEl){statusEl.style.color='var(--red)';statusEl.textContent='❌ Adresse introuvable. Vérifiez l\'orthographe.';}
    return false;
  }
  // Calcul distance entre salon (SALON.latitude/longitude) et client
  var dist=distanceKmSite(Number(SALON.latitude), Number(SALON.longitude), geo.lat, geo.lng);
  if(dist==null){
    if(statusEl){statusEl.style.color='var(--red)';statusEl.textContent='❌ Impossible de calculer la distance.';}
    return false;
  }
  var zoneKm=Number(SALON.zone_deplacement_km||0)||25;
  if(dist>zoneKm){
    if(statusEl){statusEl.style.color='var(--red)';statusEl.textContent='❌ Vous êtes à '+dist.toFixed(1)+' km — au-delà de la zone de déplacement ('+zoneKm+' km).';}
    booking.clientAdr=null;
    return false;
  }
  var frais=computeFraisDepl(dist);
  booking.clientAdr={
    adr: adr.value.trim(),
    cp: cp?cp.value.trim():'',
    ville: ville?ville.value.trim():'',
    complement: compl?compl.value.trim():'',
    lat: geo.lat, lng: geo.lng,
    distance_km: Math.round(dist*100)/100,
    frais_mt: frais
  };
  if(statusEl){
    statusEl.style.color='#4caf50';
    statusEl.innerHTML='✓ Adresse validée — '+dist.toFixed(1)+' km · Frais : <strong>'+frais.toFixed(2)+' €</strong>';
  }
  return true;
}

  if(SALON && SALON.slug){
    var p=window.location.pathname;
    return p+"?slug="+SALON.slug+(extraQs?("&"+extraQs):"");
  }
  if(salonId){
    var p2=window.location.pathname;
    return p2+"?s="+salonId+(extraQs?("&"+extraQs):"");
  }
  return window.location.pathname+qs;
}

// R\u00e9solveur principal : slug \u2192 uuid \u2192 subdomain
(async function resolveSalonRef(){
  try{
    if(salonSlug){
      // 1) Lookup direct par slug
      var r=await sb.from("salons_public").select("id,slug").eq("slug",salonSlug).limit(1);
      if(r.data&&r.data[0]){
        salonId=r.data[0].id;
        return loadSalon();
      }
      // 2) Lookup dans alias historique (anciens slugs renomm\u00e9s)
      var ar=await sb.from("salon_slug_aliases").select("salon_id").eq("slug",salonSlug).limit(1);
      if(ar.data&&ar.data[0]){
        var sr=await sb.from("salons_public").select("id,slug").eq("id",ar.data[0].salon_id).limit(1);
        if(sr.data&&sr.data[0]){
          salonId=sr.data[0].id;
          // Canonicalise vers le slug actuel
          var newSlug=sr.data[0].slug;
          if(LX_CLEAN_URLS){
            window.location.replace("/"+newSlug);
            return;
          }
          window.history.replaceState({},"",window.location.pathname+"?slug="+newSlug);
          salonSlug=newSlug;
          return loadSalon();
        }
      }
      showError("Salon introuvable : "+salonSlug);
      return;
    }
    if(salonId){
      return loadSalon();
    }
    if(window.__SALON_SUBDOMAIN){
      var rs=await sb.from("salons_public").select("id,slug").eq("subdomain",window.__SALON_SUBDOMAIN).limit(1);
      if(rs.data&&rs.data[0]){
        salonId=rs.data[0].id;
        return loadSalon();
      }
      showError("Salon introuvable pour : "+window.__SALON_SUBDOMAIN);
      return;
    }
    showError("Aucun salon sp\u00e9cifi\u00e9. V\u00e9rifiez le lien.");
  }catch(e){
    console.error("resolveSalonRef",e);
    showError("Erreur de connexion");
  }
})();

// SEO : injecte les meta Open Graph, Twitter Card et JSON-LD LocalBusiness dans <head>
function injectSeoMeta(SALON, SITE_CFG){
  if(!SALON || !SALON.id) return;
  var slug = SALON.slug || "";
  var url = "https://luxyra.fr" + (slug ? "/"+slug : "/site.html?s="+SALON.id);
  var nom = SALON.nom || "Salon";
  var ville = SALON.ville || "";
  var metierLabel = (typeof METIER_CONFIG!=="undefined" && SALON.metier && METIER_CONFIG[SALON.metier]) ? METIER_CONFIG[SALON.metier].label : "Salon de beauté";
  var desc = nom + (ville?" — "+metierLabel+" à "+ville:" — "+metierLabel) + ". Réservez votre rendez-vous en ligne sur Luxyra.";
  var image = (SITE_CFG && SITE_CFG.photoHero) || (SITE_CFG && SITE_CFG.photoSalon) || SALON.logo || "https://luxyra.fr/luxyra-logo.png";
  // Si l'image est en data URL (base64), on tombe sur le logo Luxyra (les bots ne suivent pas les data URLs)
  if(image && image.indexOf("data:")===0) image = SALON.logo && SALON.logo.indexOf("data:")!==0 ? SALON.logo : "https://luxyra.fr/luxyra-logo.png";

  function setMeta(attr, key, value){
    if(!value) return;
    var sel = "meta["+attr+"=\""+key+"\"]";
    var el = document.querySelector(sel);
    if(!el){ el = document.createElement("meta"); el.setAttribute(attr, key); document.head.appendChild(el); }
    el.setAttribute("content", value);
  }
  function setLink(rel, href){
    if(!href) return;
    var el = document.querySelector("link[rel=\""+rel+"\"]");
    if(!el){ el = document.createElement("link"); el.setAttribute("rel", rel); document.head.appendChild(el); }
    el.setAttribute("href", href);
  }

  // Description
  setMeta("name", "description", desc);
  setLink("canonical", url);

  // Open Graph
  setMeta("property", "og:type", "website");
  setMeta("property", "og:site_name", "Luxyra");
  setMeta("property", "og:url", url);
  setMeta("property", "og:title", nom + " — Réservation en ligne");
  setMeta("property", "og:description", desc);
  setMeta("property", "og:image", image);
  setMeta("property", "og:locale", "fr_FR");

  // Twitter Card
  setMeta("name", "twitter:card", "summary_large_image");
  setMeta("name", "twitter:title", nom + " — Réservation en ligne");
  setMeta("name", "twitter:description", desc);
  setMeta("name", "twitter:image", image);

  // JSON-LD LocalBusiness
  var addr = {
    "@type":"PostalAddress",
    "streetAddress": SALON.adresse || "",
    "postalCode": SALON.cp || "",
    "addressLocality": ville,
    "addressCountry": "FR"
  };
  // Type spécifique selon le métier
  var typeByMetier = {
    coiffure: "HairSalon", barbier: "BarberShop",
    esthetique: "BeautySalon", ongles: "NailSalon", bien_etre: "DaySpa"
  };
  var schemaType = typeByMetier[SALON.metier] || "LocalBusiness";
  var ld = {
    "@context": "https://schema.org",
    "@type": schemaType,
    "name": nom,
    "url": url,
    "image": image,
    "address": addr,
    "priceRange": "€€"
  };
  if(SALON.tel) ld.telephone = SALON.tel;
  if(SALON.email) ld.email = SALON.email;
  if(SALON.latitude && SALON.longitude){
    ld.geo = { "@type":"GeoCoordinates", "latitude": SALON.latitude, "longitude": SALON.longitude };
  }
  if(SALON.note_moyenne && SALON.nb_avis){
    ld.aggregateRating = {
      "@type":"AggregateRating",
      "ratingValue": SALON.note_moyenne,
      "reviewCount": SALON.nb_avis
    };
  }
  // Horaires si dispo
  try{
    var hSal = SITE_CFG && SITE_CFG.horaires_salon;
    if(hSal){
      var jourMap = {lundi:"Mo", mardi:"Tu", mercredi:"We", jeudi:"Th", vendredi:"Fr", samedi:"Sa", dimanche:"Su"};
      var horaires = [];
      Object.keys(hSal).forEach(function(j){
        var v = hSal[j];
        if(v && v.ouvert && v.creneaux && v.creneaux.length){
          v.creneaux.forEach(function(c){ horaires.push(jourMap[j] + " " + c.debut + "-" + c.fin); });
        }
      });
      if(horaires.length) ld.openingHours = horaires;
    }
  }catch(e){}

  // Inject ou remplace le JSON-LD
  var existing = document.getElementById("ld-localbusiness");
  if(existing) existing.remove();
  var script = document.createElement("script");
  script.id = "ld-localbusiness";
  script.type = "application/ld+json";
  script.textContent = JSON.stringify(ld);
  document.head.appendChild(script);
}

        bookOnline:s.book_online!==false  // false = non réservable en ligne (sur demande)
      };});
    }
    
    // 5. Products
    var pr=await sb.from("produits").select("*").eq("salon_id",salonId).order("nom");
    if(pr.data)PRODUCTS=pr.data.map(function(p){return{id:p.id,n:p.nom,p:Number(p.prix),cat:p.categorie,img:p.image||"",stk:p.stock||0,cc:p.click_collect,contenance:p.contenance||null,description:p.description||null,promoActif:p.promo_actif||false,promoPrix:p.promo_prix!=null?Number(p.promo_prix):null,promoDebut:p.promo_debut||null,promoFin:p.promo_fin||null,promoLabel:p.promo_label||null};});
    
    // 5b. Avis clients (note moyenne déjà dans SALON.note_moyenne, mais on charge la liste pour affichage)
    window.SALON_AVIS=[];
    try{
      var avis=await sb.from("avis_salon").select("id, nom, note, texte, date, created_at, salon_reply, salon_reply_at")
        .eq("salon_id",salonId).eq("approved",true).eq("reported",false).eq("hidden_by_luxyra",false)
        .order("created_at",{ascending:false}).limit(20);
      if(avis.data) window.SALON_AVIS=avis.data;
    }catch(e){console.log("Avis load error:",e);}

    // 6. Existing appointments (via Worker - bypasses RLS)
    var today=new Date().toISOString().slice(0,10);
    var maxDate=new Date();maxDate.setDate(maxDate.getDate()+(SITE_CFG.delaiMax||30));
    try{
      var avRes=await fetch("/api/salon/availability",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({salon_id:salonId,date_from:today,date_to:maxDate.toISOString().slice(0,10)})});
      var avData=await avRes.json();
      if(avData.appointments){RDV_EXISTING=avData.appointments.filter(function(a){return a.status!=="canc"&&!a.cancelled;});}
      if(avData.rdv_online){
        avData.rdv_online.filter(function(r){return r.status!=="cancelled";}).forEach(function(r){
          RDV_EXISTING.push({date_rdv:r.date_rdv,heure:r.heure_rdv?r.heure_rdv.slice(0,5):null,collab_id:r.collaborateur_id,status:"conf",a_phases:[{t:"w",d:r.duree_minutes||60,l:"RDV"}]});
        });
      }
    }catch(e){console.log("Availability load error:",e);}
    
    // Horaires from site_config, salon config, or first collab
    if(SITE_CFG.horaires_salon)HORAIRES=SITE_CFG.horaires_salon;
    else if(SALON.config&&SALON.config.horaires)HORAIRES=SALON.config.horaires;
    else if(COLLABS.length>0&&COLLABS[0].hrs)HORAIRES=COLLABS[0].hrs;
    else HORAIRES={0:null,1:{o:"14:00",c:"18:00"},2:{o:"09:00",c:"18:00"},3:{o:"09:00",c:"18:00"},4:{o:"09:00",c:"18:00"},5:{o:"09:00",c:"18:00"},6:{o:"09:00",c:"16:00"}};

    renderSite();

    // ?book=<svcId> dans l'URL → auto-redirige vers le booking avec ce service
    // (utilisé par "Reprendre ce RDV" depuis Mon compte)
    try{
      var bookSvcId=parseInt(params.get("book"))||null;
      if(bookSvcId && typeof goToBookingWithService==="function"){
        // Vérifie que le service existe (sinon on ignore silencieusement)
        var hasIt=SERVICES.some(function(s){return s.id===bookSvcId;});
        if(hasIt){
          // Nettoie l'URL pour ne pas relancer si l'utilisateur recharge
          var url=window.location.pathname+window.location.hash;
          window.history.replaceState({},"",url);
          setTimeout(function(){goToBookingWithService(bookSvcId);},100);
        }
      }
    }catch(_){}
  }catch(e){
    console.error(e);showError("Erreur de chargement: "+e.message);
  }
}

async function hashPassword(pass){
  var enc=new TextEncoder().encode(pass);
  var hash=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}
async function hashPasswordSalted(email, pass){
  return await hashPassword(email.toLowerCase().trim() + ":" + pass);
}

async function doClientRegister(){
  var nom=document.getElementById("aRegNom").value.trim();
  var pre=(document.getElementById("aRegPre")||{}).value||"";
  var tel=document.getElementById("aRegTel").value.trim();
  var ddn=document.getElementById("aRegDdn")?document.getElementById("aRegDdn").value:"";
  var email=document.getElementById("aEmail").value.trim().toLowerCase();
  var pass=document.getElementById("aPass").value;
  var pass2=document.getElementById("aPass2").value;
  if(!nom||!tel||!email||!pass){showAuthError("Remplissez tous les champs obligatoires");return;}
  if(pass.length<6){showAuthError("Mot de passe : 6 caract\u00e8res minimum");return;}
  if(pass!==pass2){showAuthError("Les mots de passe ne correspondent pas");return;}
  // Anti-spam : le salon a-t-il bloqu\u00e9 la cr\u00e9ation de nouveaux comptes ?
  if(SITE_CFG&&SITE_CFG.bloquerNouveauxComptes===true){
    showAuthError("La cr\u00e9ation de nouveaux comptes est temporairement d\u00e9sactiv\u00e9e. Si vous \u00eates d\u00e9j\u00e0 client(e), connectez-vous. Sinon, contactez le salon par t\u00e9l\u00e9phone pour r\u00e9server.");
    return;
  }
  var smsOk=document.getElementById("aRegSms")?document.getElementById("aRegSms").checked:false;
  var emOk=document.getElementById("aRegEm")?document.getElementById("aRegEm").checked:false;
  var res=await LX.signup({email:email,password:pass,nom:nom,prenom:pre.trim(),telephone:tel,date_naissance:ddn||null,sms_ok:smsOk,email_ok:emOk});
  if(!res.ok){showAuthError(res.data&&res.data.error?res.data.error:"Erreur lors de la cr\u00e9ation du compte");return;}
  CLIENT=res.data.user;
  // Auto-create link to this salon
  await ensureClientSalon(CLIENT.id);
  saveClientSession();
  closeAuth();
  renderSite();
  // Hook : rouvrir le modal sur-mesure si on était en train de le demander
  if(window._afterLoginAction==="surMesure"){
    window._afterLoginAction=null;
    setTimeout(openSurMesureModal,200);
  }
}

async function doClientLogin(){
  var email=document.getElementById("aEmail").value.trim().toLowerCase();
  var pass=document.getElementById("aPass").value;
  if(!email||!pass){showAuthError("Remplissez email et mot de passe");return;}
  var res=await LX.login(email,pass);
  if(!res.ok){showAuthError(res.data&&res.data.error?res.data.error:"Email ou mot de passe incorrect");return;}
  CLIENT=res.data.user;
  await ensureClientSalon(CLIENT.id);
  saveClientSession();
  closeAuth();
  renderSite();
  // Hook : rouvrir le modal sur-mesure si on était en train de le demander
  if(window._afterLoginAction==="surMesure"){
    window._afterLoginAction=null;
    setTimeout(openSurMesureModal,200);
  }
}

async function ensureClientSalon(clientId){
  // Create client_salon relationship if it doesn't exist for this salon
  if(!salonId)return;
  var check=await sb.from("client_salon").select("id").eq("client_id",clientId).eq("salon_id",salonId);
  if(!check.data||check.data.length===0){
    await sb.from("client_salon").insert({
      client_id:clientId,
      salon_id:salonId,
      sms_ok:CLIENT.sms_ok||false,
      email_ok:CLIENT.email_ok||false
    });
  }
}

function doClientLogout(){
  CLIENT=null;CLIENT_RDVS=[];
  LX.logout();
  try{sessionStorage.removeItem("cp_client");}catch(e){}
  renderSite();
}

function saveClientSession(){
  // lx-client.js écrit déjà lx_token + lx_account lors de signup/login/update.
  // On recopie CLIENT (sans password_hash) dans localStorage pour rester compat avec l'ancien flow.
  if (!CLIENT) return;
  var safe={};for(var k in CLIENT){if(k!=="password_hash")safe[k]=CLIENT[k];}
  try{localStorage.setItem("lx_account",JSON.stringify(safe));}catch(e){}
}
function loadClientSession(){
  // Si on a un token LX valide, utiliser le user stocké par lx-client
  if (window.LX && LX.hasSession()) {
    var u=LX.getUser();
    if(u){CLIENT=u;return true;}
  }
  // Fallback legacy localStorage (pour transition douce)
  try{var bp=localStorage.getItem("lx_account");if(bp){CLIENT=JSON.parse(bp);if(CLIENT&&CLIENT.password_hash)delete CLIENT.password_hash;return true;}}catch(e){}
  return false;
}

async function loadClientRDVs(){
  if(!CLIENT)return;
  // Endpoint sécurisé : worker valide session_token + bypass RLS via service_role.
  // Le serveur fait les 2 fetches (par lx_id + par email) et dedupe → plus de fuite anon.
  var res = await _clientApi("rdvs", {salon_id: salonId});
  CLIENT_RDVS = (res.ok && res.data && Array.isArray(res.data.rdvs)) ? res.data.rdvs : [];
}

function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  var p=document.getElementById('page-'+id);if(p)p.classList.add('active');

function escapeAttrSimple(s){return String(s||'').replace(/["'<>&]/g,function(c){return {'"':'&quot;',"'":'&#39;','<':'&lt;','>':'&gt;','&':'&amp;'}[c];});}

function scrollToTarifCat(cat){

  if(el){

function initTarifsScrollSpy(){
  var chips=document.querySelectorAll('.tarif-chip');
  var sections=document.querySelectorAll('.tarif-cat');
  if(!chips.length||!sections.length||!('IntersectionObserver' in window))return;
  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        var cat=e.target.getAttribute('data-cat');
        chips.forEach(function(ch){
          ch.classList.toggle('active',ch.getAttribute('data-cat-target')===cat);
        });
      }
    });
  },{rootMargin:'-30% 0px -60% 0px',threshold:0});
  sections.forEach(function(s){io.observe(s);});
}

// === Mini-map Leaflet sur fiche salon (lazy-load) ===
window._salonMiniMap=null;
function initSalonMiniMap(){
  var el=document.getElementById('salonMiniMap');
  if(!el||!SALON.latitude||!SALON.longitude)return;
  if(window._salonMiniMap){try{window._salonMiniMap.remove();}catch(e){}window._salonMiniMap=null;}
  var lat=Number(SALON.latitude),lng=Number(SALON.longitude);
  if(isNaN(lat)||isNaN(lng))return;
  // Charger Leaflet à la demande
  if(!window.L){
    var css=document.createElement('link');
    css.rel='stylesheet';css.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(css);
    var sc=document.createElement('script');
    sc.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    sc.onload=function(){_renderSalonMiniMap(lat,lng);};
    document.head.appendChild(sc);
  } else {
    _renderSalonMiniMap(lat,lng);
  }
}
function _renderSalonMiniMap(lat,lng){
  var el=document.getElementById('salonMiniMap');
  if(!el)return;
  window._salonMiniMap=L.map('salonMiniMap',{zoomControl:true,scrollWheelZoom:false}).setView([lat,lng],17);
  L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png',{
    attribution:'&copy; OpenStreetMap France',subdomains:'abc',maxZoom:20
  }).addTo(window._salonMiniMap);
  // Marker SVG noir+or cohérent avec recherche
  var icon=L.divIcon({
    html:'<div style="width:32px;height:42px"><svg viewBox="0 0 32 42"><path d="M16 0C7.16 0 0 7.16 0 16c0 12 16 26 16 26s16-14 16-26C32 7.16 24.84 0 16 0z" fill="#d4a843" stroke="#0a0a0a" stroke-width="1.5"/><circle cx="16" cy="16" r="9" fill="#0a0a0a"/><text x="16" y="21" font-size="13" text-anchor="middle" fill="#d4a843">'+(getMetierLabel().charAt(0))+'</text></svg></div>',
    className:'',iconSize:[32,42],iconAnchor:[16,42]
  });
  L.marker([lat,lng],{icon:icon}).addTo(window._salonMiniMap)
    .bindPopup('<div style="font-family:'+"'Playfair Display',serif".replace(/"/g,'&quot;')+';font-weight:700;color:#d4a843">'+escapeHtmlSimple(SALON.nom)+'</div><div style="font-size:12px;color:#9a9590;margin-top:4px">'+escapeHtmlSimple(adrFromSalon(SALON))+'</div>');
}
function adrFromSalon(s){
  return (s.adresse||'')+(s.cp?', '+s.cp:'')+(s.ville?' '+s.ville:'');
}

function renderBookingStep1(){
  // Mode mono-prestation (style Planity) : 1 service \u00e0 la fois.
  // Design harmonis\u00e9 avec la page Tarifs : sticky chips + tarif-row.
  if(!booking.items)booking.items=[];
  booking.collabId=null;booking.collab=null;booking.date=null;booking.time=null;
  var cats={};
  SERVICES.forEach(function(s){
    var dur=0;if(s.phases)s.phases.forEach(function(p){dur+=p.d;});
    s._dur=dur||30;
    if(!cats[s.cat])cats[s.cat]=[];
    cats[s.cat].push(s);
  });
  var ordRef=(window.SITE_CATS_ORDER||[]);
  var catNames=Object.keys(cats).sort(function(a,b){
    var ia=ordRef.indexOf(a), ib=ordRef.indexOf(b);
    if(ia===-1 && ib===-1)return a.localeCompare(b);
    if(ia===-1)return 1;
    if(ib===-1)return -1;
    return ia-ib;
  });
  var h='<div class="step active">';
  h+='<div class="step-header"><div class="step-num">1</div><div class="step-title">Choisissez votre prestation</div></div>';

  h+='<div class="tarifs-chips" id="bookingChips">';

  // Liste par cat\u00e9gorie (m\u00eame structure que tarif-cat / tarif-row)

  catNames.forEach(function(cat){
    h+='<div class="tarif-cat" data-cat="'+escapeAttrSimple(cat)+'">';

    cats[cat].forEach(function(s){

      h+='<div class="tarif-row-meta">\u23f1 '+dur+' min'+(isOnDemand?' \u00b7 Sur demande':'')+'</div>';
      h+='</div>';
      h+='<div class="tarif-row-right">';

// Met \u00e0 jour la chip active selon la position de scroll
function initBookingScrollSpy(){
  var chips=document.querySelectorAll('#bookingChips .tarif-chip');
  if(!chips.length)return;
  var sections=document.querySelectorAll('#bookingFlow .tarif-cat');
  function update(){
    var top=window.scrollY+150;
    var current=null;
    sections.forEach(function(s){
      if(s.offsetTop<=top)current=s.getAttribute('data-cat');
    });
    chips.forEach(function(c){
      c.classList.toggle('active', c.getAttribute('data-cat-target')===current);
    });
  }
  window.removeEventListener('scroll',window._bookSpy);
  window._bookSpy=update;
  window.addEventListener('scroll',update,{passive:true});
  update();
}

function closeSurMesureModal(){document.getElementById("authModal").innerHTML="";}

async function submitSurMesure(){
  var demande=document.getElementById("smDemande").value.trim();
  var dispo=document.getElementById("smDispo").value.trim();
  var svcIdEl=document.getElementById("smSvcId");
  var serviceId=svcIdEl?parseInt(svcIdEl.value)||null:null;
  var errEl=document.getElementById("smErr");
  errEl.style.display="none";errEl.textContent="";
  // Si une prestation est pré-renseignée, le commentaire est optionnel.
  // Sinon (RDV sur mesure libre), il faut au moins 5 caractères.
  if(!serviceId && demande.length<5){errEl.textContent="Veuillez décrire votre demande (5 caractères min).";errEl.style.display="block";return;}
  if(demande.length>2000){errEl.textContent="Demande trop longue (2000 caractères max).";errEl.style.display="block";return;}
  // Si pré-rempli depuis un service, on construit un texte par défaut
  var demandeFinal=demande;
  if(serviceId){
    var svc=null;for(var i=0;i<SERVICES.length;i++){if(SERVICES[i].id===serviceId){svc=SERVICES[i];break;}}
    var prefix=svc?("Prestation demandée : "+svc.n+" ("+(Number(svc.p)||0).toFixed(2)+" €)"):"";
    demandeFinal=prefix+(demande?"\n\n"+demande:"");
  }
  var btn=document.getElementById("smBtn");
  btn.disabled=true;btn.textContent="Envoi en cours...";
  try{
    var token=(typeof LX!=="undefined"&&LX.getToken)?LX.getToken():(window._bpToken||"");
    var r=await fetch(SB_URL+"/functions/v1/rdv-demande-create",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY},
      body:JSON.stringify({session_token:token,salon_id:salonId,demande_text:demandeFinal,dispo_text:dispo,service_id:serviceId})
    });
    var data=await r.json();
    if(!r.ok){
      errEl.textContent=data.error||"Erreur lors de l'envoi";errEl.style.display="block";
      btn.disabled=false;btn.textContent="Envoyer la demande";return;
    }
    // Success
    var h='<div class="auth-modal" onclick="if(event.target===this)closeSurMesureModal()">';
    h+='<div class="auth-box" onclick="event.stopPropagation()" style="text-align:center">';
    h+='<div style="font-size:48px;margin-bottom:12px">✨</div>';
    h+='<h2 style="color:var(--green)">Demande envoyée !</h2>';
    h+='<p style="font-size:14px;color:var(--text2);line-height:1.6;margin:14px 0">'+(data.message||"Votre demande a été envoyée. Le salon vous proposera un créneau sous 24-48h.")+'</p>';
    h+='<button class="btn btn-gold" style="width:100%" onclick="closeSurMesureModal()">Fermer</button>';
    h+='</div></div>';
    document.getElementById("authModal").innerHTML=h;
  }catch(e){
    errEl.textContent="Erreur de connexion : "+e.message;errEl.style.display="block";
    btn.disabled=false;btn.textContent="Envoyer la demande";
  }
}

function isServiceInBooking(svcId){
  if(!booking.items)return false;
  for(var i=0;i<booking.items.length;i++){if(booking.items[i].svcId===svcId)return true;}
  return false;
}

function toggleService(svcId){
  var svc=null;for(var i=0;i<SERVICES.length;i++){if(SERVICES[i].id===svcId){svc=SERVICES[i];break;}}
  if(!svc)return;
  if(!booking.items)booking.items=[];
  // MONO-SÉLECTION (Planity-like) : 1 prestation à la fois.
  // Si on click sur la même → désélectionne. Sinon → remplace.
  var alreadySel=(booking.items.length===1 && booking.items[0].svcId===svcId);
  if(alreadySel){
    booking.items=[];
    booking.svcId=null;booking.svc=null;
    bookingTotals();
    renderBookingStep1();
    return;
  }
  var dur=0;if(svc.phases)svc.phases.forEach(function(p){dur+=p.d;});
  if(!dur)dur=30;
  booking.items=[{svcId:svcId,nom:svc.n,prix:Number(svc.p)||0,duree:dur,svc:svc}];
  booking.svcId=svcId;booking.svc=svc;
  bookingTotals();
  // Auto-avance à l'étape 2 (style Planity)
  renderBookingStep2();
}

function renderBookingCartInner(){
  // En mode mono-prestation, le mini-cart est un simple r\u00e9cap de la prestation choisie.
  if(!booking.items||!booking.items.length){
    return '<div class="book-cart-empty">S\u00e9lectionnez une prestation ci-dessus pour continuer</div>';
  }
  var it=booking.items[0];
  var h='';
  h+='<div class="bc-line"><span>'+it.nom+' <span style="color:var(--text3);font-size:11px">('+it.duree+' min)</span></span><span class="v">'+(Number(it.prix)||0).toFixed(2)+' \u20ac</span></div>';
  h+='<button class="btn btn-gold bc-cta" onclick="renderBookingStep2()">Continuer \u25b6</button>';
  return h;
}

// Compat : selectService garde l'ancien comportement (mono-select) pour
// d'\u00e9ventuels callers externes ou liens directs (ex: bouton "R\u00e9server" sur la fiche service).
function selectService(svcId){
  if(!booking.items)booking.items=[];
  // Vide la liste pour mimer l'ancien comportement single-select
  booking.items=[];
  toggleService(svcId);
  // Avance directement \u00e0 l'\u00e9tape suivante
  if(booking.items.length)renderBookingStep2();
}

// R\u00e9serve directement le prochain cr\u00e9neau dispo (pas de pr\u00e9f\u00e9rence collab)
function bookNextSlot(dateStr, timeStr){
  booking.collabId=null;
  booking.collab=null;
  booking.date=dateStr;
  booking.time=timeStr;
  renderBookingStep4();
}

// Cherche le 1er cr\u00e9neau disponible dans les 30 prochains jours
// Helper local : formate une Date en YYYY-MM-DD selon le fuseau LOCAL
// (toISOString retourne UTC, ce qui d\u00e9cale d'1 jour quand on est en d\u00e9but/fin de journ\u00e9e Paris).
function _ymdLocal(d){
  return d.getFullYear() + '-' +
         String(d.getMonth()+1).padStart(2,'0') + '-' +
         String(d.getDate()).padStart(2,'0');
}
function findNextAvailableSlot(){
  if(!booking.duration && !booking.svc) return null;
  var dur=booking.duration||30;
  var minDelay=(SITE_CFG.delaiMin||2)*60;
  var maxDays=Math.min(SITE_CFG.delaiMax||30,30);
  var now=new Date();
  for(var dayOffset=0;dayOffset<=maxDays;dayOffset++){
    var dt=new Date(now); dt.setDate(dt.getDate()+dayOffset);
    var dateStr=_ymdLocal(dt);  // LOCAL \u2014 pas UTC \u2014 pour aligner avec dt.getDay()
    var dow=dt.getDay();
    var hrs=HORAIRES[dow];
    if(booking.collab && booking.collab.hrs) hrs=booking.collab.hrs[dow];
    var absences=SITE_CFG.absences||[];
    var skipDay=false;
    for(var ai=0;ai<absences.length;ai++){
      var ab=absences[ai];
      if(ab.type==="fermeture_except" && ab.date===dateStr){
        if(!ab.stId||!booking.collabId||ab.stId===booking.collabId){skipDay=true;break;}
      }
    }
    if(skipDay) continue;
    if(!hrs){
      for(var ai=0;ai<absences.length;ai++){
        var ab=absences[ai];
        if(ab.type==="ouverture_except" && ab.date===dateStr && ab.horaire_o && ab.horaire_c){
          if(!booking.collabId||ab.stId===booking.collabId){hrs={o:ab.horaire_o,c:ab.horaire_c};break;}
        }
      }
    }
    if(!hrs) continue;
    // Skip si tout le monde est absent ce jour
    if(booking.collabId && isCollabDayOff(dateStr,booking.collabId)) continue;
    if(!booking.collabId && isAllCollabsOff(dateStr)) continue;
    var startM=toMin(hrs.o), endM=toMin(hrs.c);
    var interval=15;
    for(var m=startM;m+dur<=endM;m+=interval){
      var timeStr=fromMin(m);
      var slotDt=new Date(dateStr+"T"+timeStr);
      if((slotDt-now)/60000 < minDelay) continue;
      if(isSlotTaken(dateStr,timeStr,dur,booking.collabId)) continue;
      var jours=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
      var mois=["janvier","f\u00e9vrier","mars","avril","mai","juin","juillet","ao\u00fbt","septembre","octobre","novembre","d\u00e9cembre"];
      var label;
      if(dayOffset===0) label="Aujourd\u0027hui";
      else if(dayOffset===1) label="Demain";
      else label=jours[dt.getDay()]+" "+dt.getDate()+" "+mois[dt.getMonth()];
      return {date:dateStr,time:timeStr,dateLabel:label};
    }
  }
  return null;
}

function selectCollab(collabId){
  booking.collabId=collabId;
  booking.collab=null;
  if(collabId){for(var i=0;i<COLLABS.length;i++){if(COLLABS[i].id===collabId){booking.collab=COLLABS[i];break;}}}
  calMonth=new Date().getMonth();calYear=new Date().getFullYear();
  renderBookingStep3();
}

function renderBookingStep3(){
  var h='<div class="step active">';
  h+='<div class="step-header"><div class="step-num">3</div><div class="step-title">Choisissez une date</div></div>';
  h+=renderCalendar();
  h+='<div id="timeSlotsArea"></div>';
  h+='<div style="margin-top:16px"><button class="btn btn-outline" onclick="renderBookingStep2()">\u25c0 Retour</button></div>';
  h+='</div>';
  document.getElementById("bookingFlow").innerHTML=h;
}

function renderCalendar(){
  var h='<div class="cal-nav">';
  h+='<button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderBookingStep3()">\u25c0</button>';
  var mNames=["Janvier","F\u00e9vrier","Mars","Avril","Mai","Juin","Juillet","Ao\u00fbt","Septembre","Octobre","Novembre","D\u00e9cembre"];
  h+='<div class="month">'+mNames[calMonth]+' '+calYear+'</div>';
  h+='<button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderBookingStep3()">\u25b6</button>';
  h+='</div>';
  h+='<div class="cal-grid">';
  ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"].forEach(function(d){h+='<div class="cal-head">'+d+'</div>';});
  var first=new Date(calYear,calMonth,1);
  var startDow=(first.getDay()+6)%7;// Monday=0
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var today=new Date();today.setHours(0,0,0,0);
  var maxDate=new Date();maxDate.setDate(maxDate.getDate()+(SITE_CFG.delaiMax||30));
  for(var i=0;i<startDow;i++)h+='<div></div>';
  for(var d=1;d<=daysInMonth;d++){
    var dt=new Date(calYear,calMonth,d);
    var dow=dt.getDay();
    var hrs=HORAIRES[dow];
    // Check if collab works this day
    if(booking.collab&&booking.collab.hrs){hrs=booking.collab.hrs[dow];}
    var isPast=dt<today;
    var isTooFar=dt>maxDate;
    var isClosed=!hrs;
    var dateKey=formatDate(dt);
    // Check exceptional closing (overrides open day)
    var absences=SITE_CFG.absences||[];
    var isExceptClosed=false;
    var isExceptOpen=false;
    for(var ai=0;ai<absences.length;ai++){
      var ab=absences[ai];
      if(ab.type==="fermeture_except"&&ab.date===dateKey){
        if(!ab.stId||!booking.collabId||ab.stId===booking.collabId){isExceptClosed=true;break;}
      }
    }
    // Check exceptional opening (overrides closed day)
    if(isClosed){
      for(var ai=0;ai<absences.length;ai++){
        var ab=absences[ai];
        if(ab.type==="ouverture_except"&&ab.date===dateKey&&ab.horaire_o&&ab.horaire_c){
          if(!booking.collabId||ab.stId===booking.collabId){isExceptOpen=true;break;}
        }
      }
    }
    if(isExceptClosed)isClosed=true;
    if(isExceptOpen)isClosed=false;
    // Check if collaborator has full-day absence on this date
    // - Avec collab choisi : check ce collab uniquement
    // - Sans préférence : grise si TOUS les collabs actifs sont absents
    var isAbsent=false;
    if(!isClosed){
      if(booking.collabId) isAbsent=isCollabDayOff(dateKey,booking.collabId);
      else isAbsent=isAllCollabsOff(dateKey);
    }
    var isToday=dt.getTime()===today.getTime();
    var isSelected=booking.date&&booking.date===dateKey;
    var cls="cal-day";
    if(isToday)cls+=" today";
    if(isSelected)cls+=" selected";
    if(isPast||isTooFar)cls+=" disabled";
    if(isClosed||isAbsent)cls+=" off";
    h+='<div class="'+cls+'" onclick="selectDate(\''+dateKey+'\')">'+d+(isAbsent?'<div style="font-size:7px;color:var(--red);margin-top:-2px">Indispo.</div>':'')+'</div>';
  }
  h+='</div>';
  return h;
}

function formatDate(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

function selectDate(dateStr){
  booking.date=dateStr;booking.time=null;
  renderBookingStep3();
  window._bkSelHour=undefined;
  renderTimeSlots(dateStr);
}

function isCollabBlocked(date,collabId,slotStart,slotEnd){
  var absences=SITE_CFG.absences||[];
  for(var i=0;i<absences.length;i++){
    var ab=absences[i];
    // Fermeture exceptionnelle (whole salon or specific collab)
    if(ab.type==="fermeture_except"&&ab.date===date){
      if(!ab.stId||!collabId||ab.stId===collabId)return true;
    }
    // Filter by collaborator : on ne regarde que les absences qui concernent
    // soit ce collab précis, soit le salon entier (ab.stId vide).
    // Le mode "sans préférence" (collabId=null) est géré dans isSlotTaken
    // qui appelle isSpecificCollabBusy pour CHAQUE collab — donc ici on a
    // toujours un collabId réel quand on entre dans cette fonction.
    if(collabId&&ab.stId&&ab.stId!==collabId)continue;
    var aType=ab.type||"absent";
    // Full-day blocks
    if(aType==="conge"||aType==="absent_jour"||aType==="absent"||aType==="maladie"||aType==="formation"){
      if(ab.dateFrom&&ab.dateFrom<=date&&ab.dateTo>=date)return true;
      if(ab.date===date&&!ab.from)return true;
    }
    // Hourly blocks
    if((aType==="pause"||aType==="absent_heures")&&ab.date===date&&ab.from&&ab.to){
      var bStart=toMin(ab.from),bEnd=toMin(ab.to);
      if(slotStart<bEnd&&slotEnd>bStart)return true;
    }
  }
  // Check recurring pause on collab
  if(collabId){
    var col=COLLABS.find(function(c){return c.id===collabId;});
    if(col&&col.pause&&col.pause.o&&col.pause.c){
      var pS=toMin(col.pause.o),pE=toMin(col.pause.c);
      if(slotStart<pE&&slotEnd>pS)return true;
    }
  }
  return false;
}

function isCollabDayOff(date,collabId){
  if(!collabId) return false; // garde-fou — passer par isAllCollabsOff
  var absences=SITE_CFG.absences||[];
  for(var i=0;i<absences.length;i++){
    var ab=absences[i];
    // Fermeture exceptionnelle
    if(ab.type==="fermeture_except"&&ab.date===date){
      if(!ab.stId||ab.stId===collabId)return true;
    }
    if(ab.stId&&ab.stId!==collabId)continue;
    var aType=ab.type||"absent";
    if(aType==="conge"||aType==="absent_jour"||aType==="absent"||aType==="maladie"||aType==="formation"){
      if(ab.dateFrom&&ab.dateFrom<=date&&ab.dateTo>=date)return true;
      if(ab.date===date&&!ab.from)return true;
    }
  }
  return false;
}

// Mode "sans préférence" : grise un jour si TOUS les collabs actifs
// sont en absence (congé/maladie/etc.) ce jour-là, OU si fermeture
// exceptionnelle globale. Si pas de collabs définis, check fermeture globale uniquement.
function isAllCollabsOff(date){
  var absences=SITE_CFG.absences||[];
  // Fermeture exceptionnelle globale (ab.stId vide) → tout le monde fermé
  for(var i=0;i<absences.length;i++){
    var ab=absences[i];
    if(ab.type==="fermeture_except"&&ab.date===date&&!ab.stId)return true;
    // Absence globale (sans stId) couvrant ce jour
    if(!ab.stId){
      var aType=ab.type||"absent";
      if(aType==="conge"||aType==="absent_jour"||aType==="absent"||aType==="maladie"||aType==="formation"){
        if(ab.dateFrom&&ab.dateFrom<=date&&ab.dateTo>=date)return true;
        if(ab.date===date&&!ab.from)return true;
      }
    }
  }
  // Aucun collab actif → check global déjà fait → dispo
  var activeCollabs=(COLLABS||[]).filter(function(c){
    if(c.actif===false||c.active===false) return false;
    return true;
  });
  if(!activeCollabs.length) return false;
  // Tous les collabs doivent être off
  for(var i=0;i<activeCollabs.length;i++){
    if(!isCollabDayOff(date,activeCollabs[i].id)) return false;
  }
  return true;
}

// Check si UN collab spécifique est indispo (absences, pauses, RDV existants)
// pour un créneau donné. NE PAS appeler avec collabId=null directement —
// utiliser isSlotTaken qui gère le mode "sans préférence".
function isSpecificCollabBusy(date,time,duration,collabId){
  if(!collabId)return false; // garde-fou (sans collab on passe par isSlotTaken)
  var slotStart=toMin(time),slotEnd=slotStart+duration;
  // 1) Absences/pauses/congés de ce collab
  if(isCollabBlocked(date,collabId,slotStart,slotEnd))return true;
  // 2) RDV existants impliquant ce collab
  for(var i=0;i<RDV_EXISTING.length;i++){
    var r=RDV_EXISTING[i];
    if(r.date_rdv!==date)continue;
    if(!r.heure)continue;
    var rStart=toMin(r.heure);
    if(r.a_phases&&r.a_phases.length){
      var cur=rStart;
      for(var pi=0;pi<r.a_phases.length;pi++){
        var ph=r.a_phases[pi];
        if(ph.t==="w"){
          var phCollab=ph.stId||r.collab_id;
          // Si la phase n'est pas pour CE collab → skip, il est libre pendant
          if(phCollab && phCollab!==collabId){cur+=(ph.d||0);continue;}
          var wEnd=cur+(ph.d||30);
          if(slotStart<wEnd&&slotEnd>cur)return true;
        }
        cur+=(ph.d||0);
      }
    } else {
      // Pas de phases : RDV bloque le collab principal pendant toute sa durée
      if(r.collab_id && r.collab_id!==collabId)continue;
      var rDur=30;
      if(r.service_id){for(var si=0;si<SERVICES.length;si++){if(SERVICES[si].id===r.service_id){var sv=SERVICES[si];if(sv.phases&&sv.phases.length){var td=0;sv.phases.forEach(function(p){td+=p.d;});rDur=td;}else rDur=sv.duree||30;break;}}}
      var rEnd=rStart+rDur;
      if(slotStart<rEnd&&slotEnd>rStart)return true;
    }
  }
  return false;
}

function isSlotTaken(date,time,duration,collabId){
  // Mode collab spécifique : check ce collab uniquement
  if(collabId) return isSpecificCollabBusy(date,time,duration,collabId);
  // Mode "sans préférence" : si AU MOINS UN collab actif est dispo → slot dispo
  var activeCollabs=(COLLABS||[]).filter(function(c){
    if(c.actif===false || c.active===false) return false;
    return true;
  });
  if(!activeCollabs.length){
    // Pas de collabs définis (mono-praticien) → check absences globales + RDV non-attribués
    var slotStart=toMin(time),slotEnd=slotStart+duration;
    // Absences globales (fermeture exceptionnelle, etc.) sans stId
    var absences=SITE_CFG.absences||[];
    for(var i=0;i<absences.length;i++){
      var ab=absences[i];
      if(ab.stId)continue; // ne s'applique pas aux absences spécifiques
      if(ab.type==="fermeture_except"&&ab.date===date)return true;
      var aType=ab.type||"absent";
      if(aType==="conge"||aType==="absent_jour"||aType==="absent"||aType==="maladie"||aType==="formation"){
        if(ab.dateFrom&&ab.dateFrom<=date&&ab.dateTo>=date)return true;
        if(ab.date===date&&!ab.from)return true;
      }
      if((aType==="pause"||aType==="absent_heures")&&ab.date===date&&ab.from&&ab.to){
        var bStart=toMin(ab.from),bEnd=toMin(ab.to);
        if(slotStart<bEnd&&slotEnd>bStart)return true;
      }
    }
    // RDV existants (sans collab cible, on bloque tout)
    for(var i=0;i<RDV_EXISTING.length;i++){
      var r=RDV_EXISTING[i];
      if(r.date_rdv!==date||!r.heure)continue;
      var rStart=toMin(r.heure);
      if(r.a_phases&&r.a_phases.length){
        var cur=rStart;
        for(var pi=0;pi<r.a_phases.length;pi++){
          var ph=r.a_phases[pi];
          if(ph.t==="w"){
            var wEnd=cur+(ph.d||30);
            if(slotStart<wEnd&&slotEnd>cur)return true;
          }
          cur+=(ph.d||0);
        }
      }else{
        var rDur=30;
        if(r.service_id){for(var si=0;si<SERVICES.length;si++){if(SERVICES[si].id===r.service_id){var sv=SERVICES[si];if(sv.phases&&sv.phases.length){var td=0;sv.phases.forEach(function(p){td+=p.d;});rDur=td;}else rDur=sv.duree||30;break;}}}
        if(slotStart<rStart+rDur&&slotEnd>rStart)return true;
      }
    }
    return false;
  }
  // Cherche au moins UN collab dispo
  for(var i=0;i<activeCollabs.length;i++){
    if(!isSpecificCollabBusy(date,time,duration,activeCollabs[i].id)){
      return false; // un collab est libre → slot dispo
    }
  }
  return true; // tous indispos
}

function renderTimeSlots(dateStr){
  var dt=new Date(dateStr);
  var dow=dt.getDay();
  var hrs=HORAIRES[dow];
  if(booking.collab&&booking.collab.hrs)hrs=booking.collab.hrs[dow];
  // Check exceptional closing
  var absences=SITE_CFG.absences||[];
  for(var ai=0;ai<absences.length;ai++){
    var ab=absences[ai];
    if(ab.type==="fermeture_except"&&ab.date===dateStr){
      if(!ab.stId||!booking.collabId||ab.stId===booking.collabId){
        document.getElementById("timeSlotsArea").innerHTML='<div style="text-align:center;padding:20px;color:var(--text3)">'+(ab.motif||'Ferm\u00e9 exceptionnellement ce jour')+'</div>';return;
      }
    }
  }
  // Check exceptional opening (overrides closed day)
  if(!hrs){
    for(var ai=0;ai<absences.length;ai++){
      var ab=absences[ai];
      if(ab.type==="ouverture_except"&&ab.date===dateStr&&ab.horaire_o&&ab.horaire_c){
        if(!booking.collabId||ab.stId===booking.collabId){hrs={o:ab.horaire_o,c:ab.horaire_c};break;}
      }
    }
  }
  if(!hrs){document.getElementById("timeSlotsArea").innerHTML='<div style="text-align:center;padding:20px;color:var(--text3)">Ferm\u00e9 ce jour</div>';return;}
  // Check if collaborator is on full-day absence
  if(booking.collabId&&isCollabDayOff(dateStr,booking.collabId)){
    document.getElementById("timeSlotsArea").innerHTML='<div style="text-align:center;padding:20px;color:var(--text3)">Collaborateur indisponible ce jour</div>';return;
  }
  
  var interval=15;
  var startM=toMin(hrs.o),endM=toMin(hrs.c);
  var dur=booking.duration||30;
  var now=new Date();
  var minDelay=(SITE_CFG.delaiMin||2)*60;
  
  // Build available hours
  var hours={};
  for(var m=startM;m+dur<=endM;m+=interval){
    var hr=Math.floor(m/60);
    if(!hours[hr])hours[hr]={available:0,total:0,slots:[]};
    var timeStr=fromMin(m);
    var isTaken=isSlotTaken(dateStr,timeStr,dur,booking.collabId);
    var slotDt=new Date(dateStr+"T"+timeStr);
    var tooSoon=(slotDt-now)/60000<minDelay;
    var avail=!isTaken&&!tooSoon;
    hours[hr].total++;
    if(avail)hours[hr].available++;
    hours[hr].slots.push({time:timeStr,taken:isTaken||tooSoon});
  }
  
  var selectedHour=window._bkSelHour;
  
  var h='<div style="margin-top:20px">';
  h+='<div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px">Choisissez l\u0027heure :</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px">';
  var hasAny=false;
  for(var hr in hours){
    var hd=hours[hr];
    var isSel=selectedHour===parseInt(hr);
    var noSlots=hd.available===0;
    var style="padding:12px 8px;border-radius:10px;text-align:center;font-weight:700;font-size:15px;cursor:pointer;border:2px solid "+(isSel?"var(--gold)":noSlots?"rgba(255,255,255,.05)":"rgba(255,255,255,.12)")+";background:"+(isSel?"rgba(200,168,78,.15)":noSlots?"rgba(255,255,255,.02)":"rgba(255,255,255,.04)")+";color:"+(noSlots?"rgba(255,255,255,.2)":"#fff")+";pointer-events:"+(noSlots?"none":"auto");
    h+='<div style="'+style+'" onclick="window._bkSelHour='+hr+';renderTimeSlots(\''+dateStr+'\')">';
    h+=hr+'h';
    if(!noSlots){h+='<div style="font-size:10px;font-weight:400;color:var(--gold);margin-top:2px">'+hd.available+' dispo</div>';hasAny=true;}
    h+='</div>';
  }
  h+='</div>';
  
  // Show minute slots for selected hour
  if(selectedHour!==undefined&&hours[selectedHour]){
    h+='<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:8px">'+selectedHour+'h - Choisissez le cr\u00e9neau :</div>';
    h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">';
    hours[selectedHour].slots.forEach(function(s){
      var cls=s.taken?"background:rgba(255,255,255,.02);color:rgba(255,255,255,.15);pointer-events:none;border-color:rgba(255,255,255,.05)":"background:rgba(45,154,94,.08);border-color:rgba(45,154,94,.3);color:#2d9a5e;cursor:pointer";
      h+='<div style="padding:14px 8px;border-radius:10px;text-align:center;font-weight:800;font-size:16px;border:2px solid transparent;'+cls+'" onclick="'+(s.taken?"":"selectTime(\'"+s.time+"\')")+'">'+s.time+'</div>';
    });
    h+='</div></div>';
  }
  
  if(!hasAny)h+='<div style="text-align:center;padding:20px;color:var(--text3)">Aucun cr\u00e9neau disponible ce jour</div>';
  h+='</div>';
  document.getElementById("timeSlotsArea").innerHTML=h;
}

    h+='<button class="btn btn-gold" style="flex:1" onclick="submitWithStripe()">\ud83d\udcb3 Payer l\u0027acompte et confirmer</button>';
  }else{
    h+='<button class="btn btn-gold" style="flex:1" onclick="submitBooking()">Confirmer le rendez-vous</button>';
  }
  h+='</div></div>';
  document.getElementById("bookingFlow").innerHTML=h;

// Refresh RDV_EXISTING from DB before critical checks (prevents stale data double-booking)
async function refreshRDV(){
  try{
    var today=new Date().toISOString().slice(0,10);
    var maxD=new Date();maxD.setDate(maxD.getDate()+(SITE_CFG.delaiMax||30));
    var avRes=await fetch("/api/salon/availability",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({salon_id:salonId,date_from:today,date_to:maxD.toISOString().slice(0,10)})});
    var avData=await avRes.json();
    if(avData.appointments){RDV_EXISTING=avData.appointments.filter(function(a){return a.status!=="canc"&&!a.cancelled;});}
    else{RDV_EXISTING=[];}
    if(avData.rdv_online){avData.rdv_online.filter(function(r){return r.status!=="cancelled";}).forEach(function(r){
      RDV_EXISTING.push({date_rdv:r.date_rdv,heure:r.heure_rdv?r.heure_rdv.slice(0,5):null,collab_id:r.collaborateur_id,status:"conf",a_phases:[{t:"w",d:r.duree_minutes||60,l:"RDV"}]});
    });}
  }catch(e){console.log("refreshRDV:",e);}
}

async function submitBooking(){
  var nom=document.getElementById("bkNom").value.trim();
  var tel=document.getElementById("bkTel").value.trim();
  if(!nom||!tel){showAlert("Nom et t\u00e9l\u00e9phone obligatoires","warning");return;}
  // Si lieu='domicile' : valider l'adresse (re-g\u00e9ocode si pas encore valid\u00e9e)
  if(booking.lieu==='domicile'){
    if(!booking.clientAdr || booking.clientAdr.frais_mt==null){
      var ok=await validateClientAdresse();
      if(!ok){ showAlert("Veuillez v\u00e9rifier l'adresse de RDV \u00e0 domicile avant de confirmer.","warning"); return; }
    }
  }
  var pre=document.getElementById("bkPre").value.trim();
  var email=document.getElementById("bkEmail").value.trim();
  var msg=document.getElementById("bkMsg").value.trim();

  var t=bookingTotals();
  var dur=t.dur;
  var totalPrix=t.prix;
  var prixFinal=t.prixFinal;
  var remiseCarte=t.remise;
  var primaryNom=bookingPrimaryNom();
  var itemsPayload=bookingItemsPayload();
  // Refresh availability from DB before submitting (prevents stale data)
  await refreshRDV();
  // Double-check availability before submitting
  if(isSlotTaken(booking.date,booking.time,dur,booking.collabId)){
    showAlert("Ce cr\u00e9neau n'est plus disponible. Veuillez choisir un autre horaire.","warning");
    renderTimeSlots(booking.date);return;
  }
  if(booking.collabId&&isCollabDayOff(booking.date,booking.collabId)){
    showAlert("Ce collaborateur est indisponible ce jour. Veuillez choisir un autre jour.","warning");
    return;
  }
  var acompte=0;
  if(SITE_CFG.acompte){
    // Acompte calcul\u00e9 sur le prix R\u00c9DUIT (apr\u00e8s remise carte d'abonnement si applicable)
    acompte=SITE_CFG.acompteType==="pourcentage"?Math.round(prixFinal*SITE_CFG.acompteMt/100):SITE_CFG.acompteMt;
    if(SITE_CFG.acompteMin&&acompte<SITE_CFG.acompteMin)acompte=SITE_CFG.acompteMin;
  }

  var data={
    salon_id:salonId,
    client_nom:nom,client_prenom:pre,client_tel:tel,client_email:email,
    client_online_id:null,client_luxyra_id:CLIENT?CLIENT.id:null,
    service_id:booking.svcId,service_nom:primaryNom,service_prix:prixFinal,
    items:itemsPayload,
    carte_abo_id:(remiseCarte>0&&CLIENT_CARTE_ABO)?CLIENT_CARTE_ABO.id:null,
    remise_carte_montant:remiseCarte,
    collaborateur_id:booking.collabId,collaborateur_nom:booking.collab?booking.collab.n:null,
    date_rdv:booking.date,heure_rdv:booking.time,duree_minutes:dur,
    acompte_montant:acompte,status:SITE_CFG.autoConfirm?"confirmed":"pending",
    message:msg,
    lieu: booking.lieu||'salon'
  };
  // Champs sp\u00e9cifiques RDV \u00e0 domicile
  if(booking.lieu==='domicile' && booking.clientAdr){
    data.client_adresse = booking.clientAdr.adr;
    data.client_adresse_cp = booking.clientAdr.cp;
    data.client_adresse_ville = booking.clientAdr.ville;
    data.adresse_complement = booking.clientAdr.complement || null;
    data.client_lat = booking.clientAdr.lat;
    data.client_lng = booking.clientAdr.lng;
    data.distance_km = booking.clientAdr.distance_km;
    data.frais_deplacement_montant = booking.clientAdr.frais_mt || 0;
  }

  try{
    var r=await sb.from("rdv_online").insert(data).select();
    if(r.error){showAlert(rdvErrorMessage(r.error),"info");await refreshRDV();renderTimeSlots(booking.date);return;}
    // Immediately block this slot from being rebooked
    RDV_EXISTING.push({date_rdv:booking.date,heure:booking.time,collab_id:booking.collabId,status:"conf",a_phases:[{t:"w",d:dur,l:primaryNom}]});
    // Success
    var confirmMsg=SITE_CFG.msgConfirm||"Votre demande a bien \u00e9t\u00e9 envoy\u00e9e.";
    var h='<div class="success-page">';
    h+='<div class="ico">\u2705</div>';
    h+='<h2>'+(SITE_CFG.autoConfirm?"Rendez-vous confirm\u00e9 !":"Demande envoy\u00e9e !")+'</h2>';
    h+='<p>'+confirmMsg+'</p>';
    h+='<div class="summary" style="max-width:400px;margin:20px auto">';
    if(booking.items&&booking.items.length>1){
      h+='<div class="summary-row" style="font-weight:800;color:var(--gold)"><span>Prestations</span><span class="v">'+booking.items.length+'</span></div>';
      booking.items.forEach(function(it){
        h+='<div class="summary-row" style="padding-left:8px;font-size:13px"><span>\u2022 '+it.nom+'</span><span class="v">'+(Number(it.prix)||0).toFixed(2)+' \u20ac</span></div>';
      });
      h+='<div class="summary-row"'+(remiseCarte>0?' style="color:var(--text3)"':' style="font-weight:700"')+'><span>'+(remiseCarte>0?"Sous-total":"Total")+' ('+dur+' min)</span><span class="v">'+totalPrix.toFixed(2)+' \u20ac</span></div>';
    }else{
      h+='<div class="summary-row"><span>Prestation</span><span class="v">'+primaryNom+'</span></div>';
    }
    if(remiseCarte>0){
      h+='<div class="summary-row" style="color:#4caf50;font-weight:700"><span>\ud83d\udcb3 Carte '+(CLIENT_CARTE_ABO?CLIENT_CARTE_ABO.carteNom:"abonnement")+'</span><span class="v">-'+remiseCarte.toFixed(2)+' \u20ac</span></div>';
      h+='<div class="summary-row" style="font-weight:800;color:var(--gold)"><span>Total \u00e0 payer</span><span class="v">'+prixFinal.toFixed(2)+' \u20ac</span></div>';
    }
    h+='<div class="summary-row"><span>Date</span><span class="v">'+formatDateFR(booking.date)+' \u00e0 '+booking.time+'</span></div>';
    if(booking.collab)h+='<div class="summary-row"><span>Avec</span><span class="v">'+booking.collab.n+'</span></div>';
    h+='</div>';
    h+='<button class="btn btn-gold" onclick="renderBookingStep1()" style="margin-top:16px">Nouveau rendez-vous</button>';
    h+='</div>';
    document.getElementById("bookingFlow").innerHTML=h;
  }catch(e){
    showAlert("Erreur: "+e.message,"error");
  }
}

// Load dashboard RDV list
async function loadDashboardFidelite(){
  if(!CLIENT||!salonId)return;
  try{
    // Endpoint sécurisé : worker valide token + filtre par salon_id côté serveur
    var resF = await _clientApi("fidelite", {salon_id: salonId});
    var fid = (resF.ok && resF.data && Array.isArray(resF.data.fidelite)) ? resF.data.fidelite[0] : null;
    var pts=0,vis=0,seuil=10,remise=10,remType="amount";
    if(fid){
      pts=fid.points||0;
      vis=fid.visites||0;
      // Le worker enrichit déjà avec fidconf à jour
      if(fid.seuil_fidelite) seuil = fid.seuil_fidelite;
      if(fid.remise_fidelite) remise = fid.remise_fidelite;
      if(fid.remise_type) remType = fid.remise_type;
    }
    // Get CURRENT fidconf from salon config_json
    try{
      var sr=await sb.from("salons_public").select("config_json").eq("id",salonId).limit(1);
      if(sr.data&&sr.data[0]){
        var cfg=typeof sr.data[0].config_json==="string"?JSON.parse(sr.data[0].config_json):sr.data[0].config_json||{};
        if(cfg.fidconf){
          seuil=cfg.fidconf.seuil||10;
          remise=cfg.fidconf.remise||10;
          remType=cfg.fidconf.type||"amount";
        }
      }
    }catch(e2){}
    var pct=Math.min(100,Math.round(pts/seuil*100));
    var remUnit=remType==="percent"?"%":"\u20ac";
    var remaining=Math.max(0,seuil-pts);
    var el;
    el=document.getElementById("dashVisites");if(el)el.textContent=vis;
    el=document.getElementById("dashPoints");if(el)el.textContent=pts+"/"+seuil;
    el=document.getElementById("dashPct");if(el)el.textContent="-"+remise+remUnit;
    el=document.getElementById("dashPctLabel");if(el)el.textContent="R\u00e9compense";
    el=document.getElementById("dashFidBar");if(el)el.style.width=pct+"%";
  }catch(e){console.log("Fidelite load error",e);}
}
