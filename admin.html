:root{
--bg:#06080f;--bg2:#0c0e16;--bg3:#12141e;--bg4:#1a1c28;
--gold:#d4a843;--gold2:#b8960f;--gold-bg:rgba(212,168,67,.08);--gold-bg2:rgba(212,168,67,.15);

--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
--f1:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--f1);font-size:14px;line-height:1.5;overflow-x:hidden}
a{color:var(--gold);text-decoration:none}
.sidebar{position:fixed;top:0;left:0;width:250px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transition:transform .3s}
.sb-logo{padding:20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sb-logo img{border-radius:8px}
.sb-logo-text{font-weight:800;font-size:18px}
.sb-logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:1px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-section{font-size:10px;font-weight:700;color:var(--text3);padding:16px 12px 6px;letter-spacing:1.5px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all .15s;margin-bottom:2px}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--gold-bg);color:var(--gold);font-weight:700}
.sb-item .icon{width:20px;text-align:center;font-size:16px}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;min-width:18px;text-align:center}
.sb-footer{padding:16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
.main{margin-left:250px;padding:24px;min-height:100vh}
.burger{display:none;position:fixed;top:14px;left:14px;z-index:101;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:18px;cursor:pointer;color:var(--text)}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.topbar h1{font-size:22px;font-weight:800}
.topbar h1 span{font-size:13px;font-weight:500;color:var(--text3);margin-left:8px}
.tb-btn{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f1);transition:all .15s}
.tb-btn:hover{border-color:var(--gold);color:var(--gold)}
.tb-btn.primary{background:var(--gold);color:#0a0a0a;border-color:var(--gold)}

.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden}
.kpi-label{font-size:12px;color:var(--text3);font-weight:600;margin-bottom:6px}
.kpi-value{font-size:28px;font-weight:800;font-family:var(--mono)}

.kpi-icon{position:absolute;top:14px;right:14px;font-size:28px;opacity:.15}

.sf-label{font-weight:600;font-size:13px}
.sf-desc{font-size:11px;color:var(--text3)}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.chart-title{font-weight:700;font-size:15px;margin-bottom:14px}
.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.chart-bar-label{width:110px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0}
.chart-bar-track{flex:1;height:28px;background:var(--bg3);border-radius:8px;overflow:hidden}

.td-salon{display:flex;align-items:center;gap:10px}

.td-btn{padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:14px;cursor:pointer;transition:all .15s}
.td-btn:hover{background:var(--gold-bg);border-color:var(--gold)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:center;justify-content:center}
.mbox{max-width:500px;width:calc(100% - 32px);background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;max-height:90vh;overflow-y:auto}
.mbox select option{color:#000;background:#fff}
</style>
</head>

async function lxPushSupported(){return "serviceWorker" in navigator && "PushManager" in window && "Notification" in window;}
async function lxPushEnable(){
  try{
    if(!await lxPushSupported()){alert("Push non support├® sur ce navigateur.");return false;}
    var perm=await Notification.requestPermission();
    if(perm!=="granted"){alert("Permission refus├®e.");return false;}
    var reg=await navigator.serviceWorker.register("/admin/sw-admin.js",{scope:"/admin/"});
    if(reg.installing){await new Promise(function(res){reg.installing.addEventListener("statechange",function(e){if(e.target.state==="activated"||e.target.state==="redundant")res();});});}
    var sub=await reg.pushManager.getSubscription();
    if(!sub){sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:_b64ToU8(VAPID_PUBLIC_KEY)});}

async function lxPushDisable(id){
  try{
    if(id){await _sb.from("push_subscriptions").delete().eq("id",id);}

  }catch(e){console.error(e);}

// Router 6 onglets v2 ŌĆö nav(tab, sub) avec ?tab=&sub= et back/forward
// R├®trocompat : anciens nav('dashboard'), nav('inscriptions'), nav('demandes'), nav('sms'), nav('nf525'), nav('settings'), nav('alerts'), nav('revenue'), nav('finances'), nav('systeme')
var LEGACY_NAV={
  dashboard:['cockpit',null], alerts:['cockpit',null],
  inscriptions:['salons','inscriptions'], demandes:['salons','demandes'],
  finances:['finance','revenus'], revenue:['finance','revenus'], nf525:['finance','nf525'],
  sms:['communication','sms'],
  systeme:['parametres','admin'], settings:['parametres','admin']
};
var DEFAULT_SUB={cockpit:null,salons:'liste',finance:'revenus',communication:'chat',analytics:'kpis',parametres:'admin'};
function nav(tab, sub, _fromPop){
  // R├®trocompat 1-arg : si tab est une cl├® legacy, on remappe
  if(arguments.length===1 && LEGACY_NAV[tab]){var m=LEGACY_NAV[tab];tab=m[0];sub=m[1];}
  if(!tab) tab='cockpit';
  if(typeof sub==='undefined' || sub===null) sub=DEFAULT_SUB[tab]||null;
  window._currentTab=tab; window._currentSub=sub; curPage=sub||tab;
  // URL sync
  if(!_fromPop){
    try{
      var qs='?tab='+encodeURIComponent(tab)+(sub?'&sub='+encodeURIComponent(sub):'');
      history.pushState({tab:tab,sub:sub}, '', qs);
    }catch(e){}
  }
  // Active state sidebar
  document.querySelectorAll('.sb-item').forEach(function(e){
    e.classList.toggle('active', e.getAttribute('data-tab')===tab);
  });
  if(window.innerWidth<900){var sb=document.querySelector('.sidebar');if(sb)sb.classList.remove('open');}
  render();
}
window.addEventListener('popstate', function(e){
  var s=e.state||{};
  var p=new URLSearchParams(location.search);
  nav(s.tab||p.get('tab')||'cockpit', s.sub||p.get('sub')||null, true);
});
function bootRoute(){
  var p=new URLSearchParams(location.search);
  var t=p.get('tab')||'cockpit';
  var s=p.get('sub')||null;
  nav(t, s, true);
  // Replace state pour que back/forward fonctionne d├©s le premier changement
  try{history.replaceState({tab:t,sub:s}, '', '?tab='+encodeURIComponent(t)+(s?'&sub='+encodeURIComponent(s):''));}catch(e){}
}

// MRR par salon ŌĆö logique : is_free actif ŌåÆ 0 ; sinon customPrice si non null sinon PLANS[plan].prix
function mrrOf(s){
  if(s.status!=='active'&&s.status!=='past_due')return 0;
  if(s.isFree){
    if(!s.freeUntil)return 0;
    if(new Date(s.freeUntil)>new Date())return 0;
  }
  if(s.customPrice!=null&&s.customPrice!=='')return Number(s.customPrice)||0;
  return gPlan(s.plan).prix||0;
}
function mrrTotal(){var t=0;SALONS.forEach(function(s){t+=mrrOf(s);});return t;}
// MRR r├®tro 12 mois ŌĆö pour chaque mois M, on simule "salons existants ├Ā fin M qui auraient pay├®"
function mrr12(){
  var out=[],now=new Date();
  for(var i=11;i>=0;i--){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    var endM=new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59);
    var t=0;
    SALONS.forEach(function(s){
      if(!s.created)return;
      if(new Date(s.created)>endM)return;
      // Approximation r├®tro : on applique mrrOf actuel si le salon existait
      t+=mrrOf(s);
    });
    out.push({label:['Jan','F├®v','Mar','Avr','Mai','Juin','Jui','Ao├╗','Sep','Oct','Nov','D├®c'][d.getMonth()],value:t});
  }
  return out;
}
// SVG MRR 12 mois ŌĆö noir/dor├®, sans Chart.js
function svgMRR(data){
  var W=720,H=200,P=32,n=data.length;
  var max=Math.max.apply(null,data.map(function(d){return d.value;}));max=max||1;
  var bw=(W-P*2)/n*0.7,gap=(W-P*2)/n*0.3;
  var bars='',labels='',values='';
  data.forEach(function(d,i){
    var x=P+i*((W-P*2)/n)+gap/2;
    var bh=(d.value/max)*(H-P*2);
    var y=H-P-bh;
    bars+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" rx="3" fill="url(#gold-grad)" opacity="0.85"><title>'+d.label+': '+fmtM(d.value)+'</title></rect>';
    labels+='<text x="'+(x+bw/2)+'" y="'+(H-12)+'" text-anchor="middle" fill="var(--text3)" font-size="10" font-family="var(--mono)">'+d.label+'</text>';
    if(d.value>0)values+='<text x="'+(x+bw/2)+'" y="'+(y-4)+'" text-anchor="middle" fill="var(--gold)" font-size="9" font-family="var(--mono)" font-weight="700">'+Math.round(d.value)+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block"><defs><linearGradient id="gold-grad" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#d4a843"/><stop offset="1" stop-color="#b8960f"/></linearGradient></defs>'+bars+labels+values+'</svg>';
}

  setTimeout(function(){

// ====================================================================
// Notifications locales (syst├©me initial qui fonctionne)
// ====================================================================
// On a abandonn├® Web Push externe (FCM/WNS) qui ├®tait bloqu├® par Android Doze.
// Strat├®gie actuelle : watcher local 15s ŌåÆ reg.showNotification (cf. lxStartErrorWatcher).
// Cette fonction ne fait que demander la permission Notification et d├®clencher
// une notif de test pour valider que tout fonctionne.
window.lxRequestMonitoringNotif = async function(){
  if(typeof Notification === 'undefined'){
    alert('ŌØī Votre navigateur ne supporte pas les notifications.');
    return;
  }
  if(Notification.permission === 'denied'){
    alert('ŌØī Notifications BLOQU├ēES par votre navigateur.\n\nCadenas ├Ā gauche de l\'URL ŌåÆ Notifications ŌåÆ Autoriser, puis recharger.');
    return;
  }
  try {
    if(Notification.permission !== 'granted'){
      var perm = await Notification.requestPermission();
      if(perm !== 'granted'){ alert('ŌØī Permission refus├®e.'); return; }
    }
    // S'assure que le SW est pr├¬t pour pouvoir utiliser reg.showNotification
    // (background-friendly). Fallback Notification() si SW indisponible.
    var sent = false;
    try {
      if(navigator.serviceWorker){
        var reg = await navigator.serviceWorker.ready;
        await reg.showNotification('Ō£ģ Notifications activ├®es', {
          body: 'Vous recevrez les alertes erreur Luxyra tant que l\'admin est ouvert.',
          icon: '/icon-192.png',
          badge: '/icon-192.png',
          tag: 'lx-confirm-'+Date.now(),
          data: { url: '/admin?tab=monitoring' }
        });
        sent = true;
      }
    } catch(_){}
    if(!sent){
      try { new Notification('Ō£ģ Notifications activ├®es', { body: 'Test OK.' }); } catch(_){}
    }
    var btn = document.getElementById('lxNotifBtn');
    if(btn){ btn.textContent = 'Ō£ģ Notifications activ├®es'; btn.style.color = '#66bb6a'; btn.style.borderColor = '#66bb6a'; }
  } catch(e) {
    console.error('[lxNotif] error', e);
    alert('ŌØī Erreur : '+(e.message || e));
  }
};

// Si l'utilisateur vient du SW (clic sur notif), on navigue vers monitoring
if (typeof navigator !== 'undefined' && navigator.serviceWorker) {
  navigator.serviceWorker.addEventListener('message', function(event){
    if (event.data && event.data.type === 'navigate' && typeof go === 'function') {
      go('monitoring');
    }
  });
  // Enregistrement silencieux du Service Worker d├©s l'ouverture de l'admin ŌĆö
  // n├®cessaire pour que `lxStartErrorWatcher` puisse appeler `reg.showNotification()`
  // (notifs visibles m├¬me onglet en arri├©re-plan / PWA en veille). Aucun Push externe
  // n'est utilis├® : c'est juste le canal d'affichage local.
  try {

// Watcher : poll toutes les 15s sur les NOUVELLES erreurs depuis la derni├©re v├®rif
// Tourne en arri├©re-plan tant que l'admin est ouvert dans un onglet.
window.lxStartErrorWatcher = function(){
  if(window._lxErrorWatcherTimer) return; // d├®j├Ā lanc├®
  // Init : ne pas alerter sur les erreurs d├®j├Ā pr├®sentes au boot
  window._lxLastErrorCheckTs = new Date().toISOString();
  window._lxLastServerErrTs = window._lxLastErrorCheckTs;
  window._lxNotifiedIds = new Set();

  function notify(title, body, severity){
    if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    var opts = {
      body: body,
      icon: '/icon-192.png',
      badge: '/icon-192.png',
      tag: severity === 'critical' ? 'lx-critical-'+Date.now() : 'lx-error-'+Date.now(),
      requireInteraction: severity === 'critical', // notif critical reste affich├®e
      silent: false,
      vibrate: severity === 'critical' ? [200,100,200,100,200] : [120,60,120],
      data: { url: '/admin?tab=monitoring', severity: severity, ts: Date.now() }
    };
    // PRIORIT├ē 1 : Service Worker showNotification ŌĆö fonctionne m├¬me onglet en arri├©re-plan / PWA en veille
    // (le clic est g├®r├® par le listener 'notificationclick' dans /admin-sw.js)
    try {
      if(navigator.serviceWorker && navigator.serviceWorker.ready){
        navigator.serviceWorker.ready.then(function(reg){
          try { reg.showNotification(title, opts); }
          catch(e){ _fallbackNotify(title, opts); }
        }).catch(function(){ _fallbackNotify(title, opts); });
        return;
      }
    } catch(_){}
    // PRIORIT├ē 2 (fallback) : Notification API directe ŌĆö uniquement onglet actif
    _fallbackNotify(title, opts);
  }
  function _fallbackNotify(title, opts){
    try {
      var n = new Notification(title, opts);
      n.onclick = function(){
        window.focus();
        if(typeof go === 'function') go('monitoring');
        n.close();
      };
    } catch(e){ console.warn('[lxNotif] failed:', e); }
  }

  async function checkNewErrors(){
    try {
      var lastTs = window._lxLastErrorCheckTs;
      // 1) Nouvelles erreurs audit_log (JS_ERROR, DB_ERROR, NF525_SEAL_TRIGGER_FAIL)
      var r = await _sb.from('audit_log')
        .select('id, action, details, salon_id, timestamp_action')
        .in('action', ['JS_ERROR','DB_ERROR','NF525_SEAL_TRIGGER_FAIL','JS_ERROR_PUBLIC'])
        .gt('timestamp_action', lastTs)
        .order('timestamp_action', { ascending: false })
        .limit(10);
      if(r.data && r.data.length > 0){
        for(var i=0; i<r.data.length; i++){
          var row = r.data[i];
          var key = 'audit_'+row.id;
          if(window._lxNotifiedIds.has(key)) continue;
          window._lxNotifiedIds.add(key);
          var severity = (row.action === 'DB_ERROR' || row.action === 'NF525_SEAL_TRIGGER_FAIL') ? 'critical' : 'high';
          var msg = '';
          try { msg = (JSON.parse(row.details||'{}').msg) || row.details || '(sans d├®tail)'; }
          catch(_){ msg = String(row.details||'').slice(0,150); }
          notify('ŌÜĀ’ĖÅ '+row.action+' Luxyra', msg.slice(0, 200), severity);
        }
        // Met ├Ā jour le timestamp
        window._lxLastErrorCheckTs = r.data[0].timestamp_action;
      }

      // 2) Nouvelles erreurs server_errors (worker, edge functions)
      var s = await _sb.from('server_errors')
        .select('id, source, severity, message, reported_at')
        .gt('reported_at', window._lxLastServerErrTs)
        .in('severity', ['critical','error'])
        .order('reported_at', { ascending: false })
        .limit(10);
      if(s.data && s.data.length > 0){
        for(var j=0; j<s.data.length; j++){
          var row2 = s.data[j];
          var key2 = 'server_'+row2.id;
          if(window._lxNotifiedIds.has(key2)) continue;
          window._lxNotifiedIds.add(key2);
          var sev = row2.severity === 'critical' ? 'critical' : 'high';
          notify('­¤Ü© '+(row2.severity === 'critical' ? 'Erreur CRITIQUE' : 'Erreur serveur'),
                 '['+row2.source+'] '+ String(row2.message||'').slice(0,200), sev);
        }
        window._lxLastServerErrTs = s.data[0].reported_at;
      }
    } catch(e){ console.warn('[lxWatcher] tick error:', e); }
  }

  // Premier check imm├®diat puis toutes les 15s
  setTimeout(checkNewErrors, 1000);
  window._lxErrorWatcherTimer = setInterval(checkNewErrors, 15000);
};
async function rMonitoringRefresh(){
  var container = document.getElementById('monitoringContent');

    var [summary, recent, publicErrs, serverErrs, cronHealth, grouped, anomalies, quotas, slowQueries, topEndpoints, integrations, fixQueue] = await Promise.all([
      _sb.rpc('admin_js_errors_summary'),
      _sb.rpc('admin_js_errors_recent', {p_limit: 100, p_salon_id: null}),

      _sb.from('server_errors').select('id, source, severity, message, http_path, http_status, salon_id, reported_at')
         .order('reported_at', { ascending: false }).limit(50),
      _sb.rpc('admin_cron_health'),
      _sb.rpc('admin_errors_grouped', {p_hours: window._lxGroupHours || 24}),
      _sb.rpc('check_business_anomalies'),
      _sb.rpc('check_quotas'),

    var rowsCron = cronHealth.error ? [] : (cronHealth.data || []);
    var rowsGrouped = grouped.error ? [] : (grouped.data || []);
    var rowsAnomalies = anomalies.error ? [] : (anomalies.data || []);

    var rowsIntegrations = (integrations && !integrations.error) ? (integrations.data || []) : [];
    var rowsFixQueue = (fixQueue && !fixQueue.error) ? (fixQueue.data || []) : [];
    container.innerHTML = _renderMonitoringHTML(rowsS, rowsR, rowsP, rowsServer, rowsCron, rowsGrouped, rowsAnomalies, rowsQuotas, rowsSlowQ, rowsTopEp, rowsIntegrations, rowsFixQueue);
  } catch(e){
    container.innerHTML = '<div style="padding:30px;border-radius:12px;background:rgba(244,67,54,.08);border:1px solid rgba(244,67,54,.25);color:#ef5350">'
      + '<div style="font-weight:800;margin-bottom:8px;font-size:15px">ŌØī Erreur chargement</div>'
      + '<div style="font-size:13px">'+(e.message||e)+'</div>'
      + '</div>';
  }
}

    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    + '<h2 style="margin:0;font-size:18px;color:var(--gold)">­¤öŹ D├®tail de l\'erreur</h2>'
    + '<button onclick="lxCloseErrorDetail()" style="background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 12px;cursor:pointer">Ō£Ģ Fermer</button>'
    + '</div>'
    + '<div style="font-family:monospace;font-size:11px;color:var(--text3);margin-bottom:14px;padding:8px 12px;background:var(--bg2);border-radius:6px;word-break:break-all">'+_esc(signature)+'</div>'
    + '<div id="lxErrorDetailBody" style="color:var(--text3);text-align:center;padding:40px">ChargementŌĆ”</div>'
    + '</div>';
  try {
    var r = await _sb.rpc('admin_error_signature_detail', { p_signature: signature, p_hours: 168 });
    if(r.error) throw new Error(r.error.message);
    var rows = r.data || [];

      body.innerHTML = '<div style="color:var(--text3);padding:30px;text-align:center">Aucune occurrence trouv├®e sur 7 jours.</div>';

function rAnalyticsCohorts(h){
  var rows=lxAnaCacheGet('cohorts');

      byMonth[k].inscrits++;

      var stillActive=(s.status==='active'||(s.plan&&s.plan!=='trial'&&!s.is_free));

    var lbl=r.date.toLocaleDateString('fr-FR',{month:'short',year:'numeric'});

    h+='<td style="text-align:center;padding:8px"><div style="display:inline-block;padding:6px 12px;border-radius:6px;font-family:var(--mono);font-size:12px;'+heat(p3)+'">'+p3+'%</div></td>';

async function deleteSalonCascade(id){
  // Cascade d├®terministe Phase 1 ŌĆö ordre fig├® enfants ŌåÆ parents.
  // Chaque ├®tape try/catch ind├®pendante pour ne pas bloquer la cha├«ne.
  if(!_online||!id)return{ok:false,err:"offline"};
  var s=gSalon(id);
  var purged=[],failed=[],steps=[];
  async function step(name,fn){
    try{var r=await fn();if(r&&r.error){failed.push(name+':'+r.error.message);steps.push({name:name,ok:false,err:r.error.message});}
    else{purged.push(name);steps.push({name:name,ok:true});}}
    catch(e){failed.push(name+':'+(e.message||'err'));steps.push({name:name,ok:false,err:e.message||'err'});}
  }
  // 1. support_messages
  await step('support_messages',function(){return _sb.from('support_messages').delete().eq('salon_id',id);});
  // 2. support_conversations
  await step('support_conversations',function(){return _sb.from('support_conversations').delete().eq('salon_id',id);});
  // 3. salon_promotions
  await step('salon_promotions',function(){return _sb.from('salon_promotions').delete().eq('salon_id',id);});
  // 4. salon_admin_notes
  await step('salon_admin_notes',function(){return _sb.from('salon_admin_notes').delete().eq('salon_id',id);});
  // 5. admin_shortcuts (o├╣ action_url r├®f├®rence ce salon ŌĆö best effort, table index├®e par admin_user_id)
  // Pas de filtre salon_id sur cette table : on ne purge rien ici, c'est li├® ├Ā l'admin pas au salon. Skip.
  // 6. cartes_abo_clients
  await step('cartes_abo_clients',function(){return _sb.from('cartes_abo_clients').delete().eq('salon_id',id);});
  // 7. Tables m├®tier (s├®curit├® ŌĆö appointments, tickets, etc.)
  var metierTables=['appointments','tickets','ticket_lines','cash_movements','z_closures','rdv_online','clients_online','photos_clients','sms_queue','sms_logs','email_logs','cartes_abonnement','cartes_passages','gift_cards','gift_transactions','loyalty_points','forfaits','forfait_phases','absences','horaires','services','produits','stock_movements','webhook_events','nf525_events'];
  for(var i=0;i<metierTables.length;i++){
    var t=metierTables[i];
    await step(t,(function(t){return function(){return _sb.from(t).delete().eq('salon_id',id);};})(t));
  }
  // 8. clients (clients_luxyra)
  await step('clients_luxyra',function(){return _sb.from('clients_luxyra').delete().eq('salon_id',id);});
  await step('clients',function(){return _sb.from('clients').delete().eq('salon_id',id);});
  // 9. collaborateurs
  await step('collaborateurs',function(){return _sb.from('collaborateurs').delete().eq('salon_id',id);});
  // 10. admin_log (entr├®es du salon)
  await step('admin_log',function(){return _sb.from('admin_log').delete().eq('salon_id',id);});
  // 11. inscriptions_log (par email du salon)
  if(s&&s.email){
    await step('inscriptions_log',function(){return _sb.from('inscriptions_log').delete().eq('email',s.email);});
  }
  // 12. Storage : documents/{id}/*
  try{
    var list=await _sb.storage.from('salon-documents').list('documents/'+id);
    if(list&&list.data&&list.data.length){
      var paths=list.data.map(function(f){return 'documents/'+id+'/'+f.name;});
      var rm=await _sb.storage.from('salon-documents').remove(paths);
      if(rm&&rm.error){failed.push('storage:'+rm.error.message);steps.push({name:'storage',ok:false,err:rm.error.message});}
      else{purged.push('storage('+paths.length+')');steps.push({name:'storage',ok:true,count:paths.length});}
    }else{steps.push({name:'storage',ok:true,count:0});}
  }catch(e){failed.push('storage:'+(e.message||'err'));steps.push({name:'storage',ok:false,err:e.message});}
  // 13. salons (la ligne principale)
  var rs=await _sb.from('salons').delete().eq('id',id);
  if(rs.error)return{ok:false,err:'salons:'+rs.error.message,purged:purged,failed:failed,steps:steps};
  steps.push({name:'salons',ok:true});
  // 14. auth.admin.deleteUser via Worker (service_role c├┤t├® serveur)
  if(s&&s.userId){
    try{
      var r=await fetch('/api/admin/delete-user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:s.userId})});
      steps.push({name:'auth.deleteUser',ok:r.ok});
      if(!r.ok)failed.push('auth.deleteUser:'+r.status);
    }catch(e){failed.push('auth.deleteUser:'+(e.message||'err'));steps.push({name:'auth.deleteUser',ok:false});}
  }
  // 15. Log final SALON_DELETED_CASCADE
  try{
    await _sb.from('admin_log').insert({admin_user_id:_uid,action:'SALON_DELETED_CASCADE',target_id:id,details:JSON.stringify({nom:s&&s.nom,email:s&&s.email,purged:purged.length,failed:failed.length,steps:steps})});
  }catch(e){}
  return{ok:true,purged:purged,failed:failed,steps:steps};
}

// Wrapper avec double confirmation ŌĆö appel├® depuis la fiche salon
async function confirmDeleteSalon(id){
  var s=gSalon(id);if(!s)return;
  if(!confirm('ŌÜĀ’ĖÅ SUPPRESSION D├ēFINITIVE\n\nSalon : '+s.nom+'\nEmail : '+(s.email||'?')+'\n\nToutes les donn├®es seront purg├®es (RDV, clients, tickets, documents, compte auth).\n\nContinuer ?'))return;
  var word=prompt('Pour confirmer, tapez exactement le nom du salon :\n\n'+s.nom);
  if(word!==s.nom){alert('ŌØī Nom incorrect, suppression annul├®e');return;}
  var res=await deleteSalonCascade(id);
  if(res.ok){
    alert('­¤Śæ’ĖÅ Salon supprim├®\n\n├ētapes OK : '+res.purged.length+'\n├ēchecs ignor├®s : '+res.failed.length+(res.failed.length?'\n\nD├®tails : '+res.failed.slice(0,5).join('\n'):''));
    closeDetail();await loadData();render();
  }else{
    alert('ŌØī Erreur critique : '+res.err);
  }
}

async function actS(id,act){
  var s=gSalon(id);if(!s||!_online)return;
  if(act==="suspend"){await _sb.from("salons").update({status:"suspended"}).eq("id",id);alert("Ōøö Salon suspendu");}
  else if(act==="reactivate"){await _sb.from("salons").update({status:"active"}).eq("id",id);alert("Ō£ģ Salon r├®activ├®");}
  else if(act==="extend"){var d=new Date(s.trialEnd||new Date());d.setDate(d.getDate()+7);await _sb.from("salons").update({trial_end:d.toISOString()}).eq("id",id);alert("ŌÅ░ Essai prolong├® de 7 jours");}
  else if(act==="plan"){var np=s.plan==="essential"?"pro":"essential";if(!confirm("Changer le plan de "+s.nom+" en "+np.toUpperCase()+" ?"))return;await _sb.from("salons").update({plan:np}).eq("id",id);alert("­¤ō” Plan chang├® en "+np);}
  else if(act==="reset"){await _sb.auth.resetPasswordForEmail(s.email);alert("­¤öæ Lien de r├®initialisation envoy├® ├Ā "+s.email);return;}
  else if(act==="delete"){await confirmDeleteSalon(id);return;}
  await loadData();render();if(act!=="delete")openD(id);
}

// Helper interne : nettoie/met ├Ā jour le config_json du salon associ├® ├Ā une demande
async function _migSyncSalonConfig(salonId, newStatus){
  // newStatus : "requested" | "completed" | null (= retire les champs migration*)
  if(!salonId)return {ok:true};
  try {
    var sRes=await _sb.from("salons").select("config_json").eq("id",salonId).maybeSingle();
    if(!sRes.data)return {ok:true,note:"salon introuvable"};
    var raw=sRes.data.config_json;
    var cfg={};
    try {
      var asString = typeof raw === "string" ? raw : JSON.stringify(raw);
      try { var parsed = JSON.parse(asString); cfg = (typeof parsed === "string") ? JSON.parse(parsed) : parsed; } catch(_) { cfg = {}; }
      if(typeof cfg!=="object"||cfg===null)cfg={};
    } catch(e){ cfg={}; }
    if(newStatus===null){
      delete cfg.migrationStatus;
      delete cfg.migrationRequestedAt;
      delete cfg.migrationRequestId;
      delete cfg.migrationCompletedAt;
    } else {
      cfg.migrationStatus = newStatus;
      if(newStatus==="completed") cfg.migrationCompletedAt = new Date().toISOString();
    }
    var u=await _sb.from("salons").update({config_json:JSON.stringify(cfg)}).eq("id",salonId);
    if(u.error)return {ok:false,err:u.error.message};
    return {ok:true};
  } catch(e){return {ok:false,err:e.message};}
}

async function updMig(id,st){
  var m=MIGRATIONS.find(function(x){return x.id===id;});
  if(!m){await lxAdminAlert("Demande introuvable",{title:"Erreur",color:"#e88080"});return;}

  var confirmCfg={
    contacted:{title:"Contact effectu├®",okLabel:"­¤ō× Marquer contact├®",msg:"Marquer cette demande comme CONTACT├ēE ?\n\nC'est not├® ├Ā des fins de suivi interne, le salon n'est pas notifi├®."},
    in_progress:{title:"D├®marrer migration",okLabel:"­¤ö¦ D├®marrer",msg:"D├®marrer la migration pour\n"+m.salon_name+" ?\n\nLe salon continue de voir ┬½ Migration en cours ┬╗ dans son app."},
    completed:{title:"Marquer compl├®t├®",okLabel:"Ō£ģ Compl├®ter",msg:"Marquer la migration COMPL├ēT├ēE ?\n\nŌåÆ L'entr├®e ┬½ Migration ┬╗ dispara├«t du menu Param├©tres de l'app du salon.\nŌåÆ Le salon est notifi├® au prochain reload."},
    cancelled:{title:"Annuler la demande",okLabel:"­¤Ü½ Annuler",danger:true,msg:"Annuler cette demande ?\n\nŌåÆ Le statut c├┤t├® app du salon est retir├®.\nŌåÆ Le salon pourra refaire une nouvelle demande."},
  };
  var c = confirmCfg[st];
  if(c){
    var ok = await lxAdminConfirm(c.msg,{title:c.title,okLabel:c.okLabel,danger:c.danger,surtitle:"Action sur la demande"});
    if(!ok)return;
  }

  try {
    var u1=await _sb.from("migration_requests").update({status:st,status_updated_at:new Date().toISOString()}).eq("id",id);
    if(u1.error){await lxAdminAlert("Erreur update demande : "+u1.error.message,{title:"├ēchec",color:"#e88080"});return;}

    // Synchro config_json salon : completed ŌåÆ "completed" ; cancelled ŌåÆ null
    if(m.salon_id && (st==="completed"||st==="cancelled")){
      var newCfgStatus = st==="completed" ? "completed" : null;
      var sync = await _migSyncSalonConfig(m.salon_id, newCfgStatus);
      if(!sync.ok){
        await lxAdminAlert("Statut mis ├Ā jour mais sync salon ├®chou├®e : "+sync.err,{title:"Sync partielle",color:"#e88080"});
        await loadMigrations();render();
        return;
      }
    }

    var labels={
      contacted:{t:"­¤ō× Contact not├®",b:"La demande est marqu├®e comme contact├®e."},
      in_progress:{t:"­¤ö¦ Migration d├®marr├®e",b:"Le salon voit ┬½ Migration en cours ┬╗ dans son app."},
      completed:{t:"Ō£ģ Migration compl├®t├®e",b:"L'entr├®e ┬½ Migration ┬╗ dispara├«t du menu Param├©tres de l'app du salon."},
      cancelled:{t:"­¤Ü½ Demande annul├®e",b:"Le salon peut refaire une nouvelle demande quand il le souhaite."},
    };
    var lbl=labels[st];
    if(lbl) await lxAdminAlert(lbl.b,{title:lbl.t,surtitle:"Statut mis ├Ā jour"});
    await loadMigrations();render();
  } catch(e){
    await lxAdminAlert("Erreur : "+e.message,{title:"├ēchec",color:"#e88080"});
  }
}

async function delMig(id){
  var m=MIGRATIONS.find(function(x){return x.id===id;});
  if(!m){await lxAdminAlert("Demande introuvable",{title:"Erreur",color:"#e88080"});return;}

  var msg = "Supprimer d├®finitivement la demande de\n"+m.salon_name+" ?\n\nAction irr├®versible ŌĆö la trace en historique est perdue.";
  if(m.salon_id) msg += "\n\nLe statut ┬½ Migration en cours ┬╗ sera ├®galement retir├® de l'app du salon (si pr├®sent).";
  var ok = await lxAdminConfirm(msg,{title:"Suppression d├®finitive",okLabel:"­¤Śæ’ĖÅ Supprimer",danger:true,surtitle:"Action irr├®versible"});
  if(!ok)return;

  try {
    // Cleanup config_json du salon AVANT suppression (si li├®e ├Ā un salon)
    if(m.salon_id){
      var sync = await _migSyncSalonConfig(m.salon_id, null);

    if(d.error){await lxAdminAlert("Erreur suppression : "+d.error.message,{title:"├ēchec",color:"#e88080"});return;}
    await loadMigrations();render();
    await lxAdminAlert("La demande a ├®t├® supprim├®e d├®finitivement.",{title:"­¤Śæ’ĖÅ Suppression effectu├®e",surtitle:"Confirmation"});

  }
}

  h+='<div class="kpi"><div class="kpi-label">ARPU</div><div class="kpi-value">'+fmtM(Math.round(mrr/Math.max(1,ac)*100)/100)+'</div><div class="kpi-sub">Par ├®tablissement</div><div class="kpi-icon">­¤ÅĀ</div></div></div>';
  h+='<div class="chart-card"><div class="chart-title">­¤Æ░ MRR par plan</div>';
  PLANS.forEach(function(p){

async function saveAppConfig(){
  // Champs num├®riques (valid├®s positifs)
  var numKeys = ["stripe_fee_pct","stripe_fee_fixed","stripe_fee_uk_pct","stripe_fee_intl_pct","stripe_fee_sepa_pct","stripe_fee_sepa_max","sms_bonus_first_pay","sms_price_ttc","sms_pack_100_eur","sms_pack_250_eur","sms_pack_500_eur","urssaf_services_pct","urssaf_ventes_pct","micro_seuil_ca_services","micro_seuil_ca_ventes","micro_seuil_tva_services","micro_seuil_tva_ventes","plan_essential_eur","plan_pro_eur","luxyra_tva_pct"];
  // Champs texte (forme juridique, SIRET, n┬░ TVA intra, capital social)
  var textKeys = ["luxyra_forme_juridique","luxyra_siret_editeur","luxyra_tva_intra","luxyra_capital_social"];
  var newConfig = {};
  for(var i=0;i<numKeys.length;i++){
    var el = document.getElementById("ac_"+numKeys[i]);
    if(!el) continue;
    var v = parseFloat(el.value);
    if(isNaN(v)){ alert("Valeur invalide pour "+numKeys[i]); el.focus(); return; }
    if(v < 0){ alert("Valeur n├®gative interdite pour "+numKeys[i]); el.focus(); return; }
    newConfig[numKeys[i]] = v;
  }
  for(var j=0;j<textKeys.length;j++){
    var elt = document.getElementById("ac_"+textKeys[j]);
    if(!elt) continue;
    newConfig[textKeys[j]] = (elt.value||"").trim();
  }
  if(!confirm("Enregistrer ces modifications ?\n\nElles seront imm├®diatement appliqu├®es :\nŌĆó App salon (exports comptables, calculs frais)\nŌĆó Site public (tarifs.html, aide.html)\nŌĆó Edge function emails onboarding\nŌĆó Bordereau Stripe / pack ZIP comptable\n\nContinuer ?")) return;
  try{
    var r = await _sb.from("app_config").update({config:newConfig}).eq("id",1);
    if(r.error){ alert("Erreur : "+r.error.message); return; }
    await _sb.from("admin_log").insert({admin_user_id:_uid, action:"EDIT_APP_CONFIG", details:JSON.stringify(newConfig)});
    alert("Ō£ģ Configuration mise ├Ā jour. Les modifs sont actives partout.");
    loadAppConfigEditor();
  }catch(e){ alert("Erreur : "+e.message); }
}

  h+='<div style="font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px">Coordonn├®es</div>';
  var cFs=[["elAdresse","Adresse",s.adresse],["elCp","Code postal",s.cp],["elVille","Ville",s.ville],["elTel","T├®l├®phone",s.tel]];
  cFs.forEach(function(f){
    h+='<div style="margin-bottom:10px"><label style="font-size:11px;color:var(--text2);display:block;margin-bottom:3px">'+f[1]+'</label><input id="'+f[0]+'" value="'+(f[2]||"").replace(/"/g,'&quot;')+'" style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;outline:none"></div>';
  });
  h+='<button onclick="doSaveLegal(&#39;'+id+'&#39;)" style="width:100%;padding:12px;border-radius:10px;background:var(--gold);color:#000;font-weight:700;font-size:14px;border:none;cursor:pointer;margin-top:10px">­¤ÆŠ Enregistrer (propag├® partout)</button>';
  h+='</div></div>';
  document.getElementById("detailOverlay").innerHTML=h;
}

async function doSaveLegal(id){
  if(!_sb||!_online)return;
  // Validation m├®tier (les valeurs autoris├®es par le syst├©me)
  var mAllowed=["coiffure","barbier","esthetique","ongles","bien_etre"];
  var mVal=(document.getElementById("elMetier").value||"").trim().toLowerCase();
  if(mVal && mAllowed.indexOf(mVal)<0){
    alert("M├®tier invalide. Valeurs autoris├®es : "+mAllowed.join(", "));
    return;
  }
  var data={
    nom:document.getElementById("elNom").value.trim(),
    metier:mVal,
    gerant_nom:document.getElementById("elGerantNom").value.trim(),
    gerant_prenom:document.getElementById("elGerantPrenom").value.trim(),
    forme_juridique:document.getElementById("elFormeJur").value.trim(),
    siret:document.getElementById("elSiret").value.trim(),
    siren:document.getElementById("elSiren").value.trim(),
    tva_intra:document.getElementById("elTva").value.trim(),
    adresse:document.getElementById("elAdresse").value.trim(),
    cp:document.getElementById("elCp").value.trim(),
    ville:document.getElementById("elVille").value.trim(),
    tel:document.getElementById("elTel").value.trim()
  };
  // Filtrer les champs vides pour ne pas ├®craser des donn├®es existantes par "" si l'admin
  // a juste cliqu├® Enregistrer sans toucher tous les champs (mais on garde nom/metier obligatoires)
  if(!data.nom){alert("Le nom du salon est obligatoire.");return;}
  if(!data.metier){alert("Le m├®tier est obligatoire.");return;}
  // SIRET : si fourni, doit faire 14 chiffres
  var siretClean=data.siret.replace(/\s/g,"");
  if(siretClean && !/^\d{14}$/.test(siretClean)){
    alert("Le SIRET doit contenir exactement 14 chiffres.");
    return;
  }
  data.siret=siretClean;
  // Auto-d├®duire SIREN depuis SIRET si pas renseign├®
  if(siretClean && !data.siren) data.siren=siretClean.slice(0,9);
  var r=await _sb.from("salons").update(data).eq("id",id);
  if(r&&r.error){alert("Erreur sauvegarde : "+r.error.message);return;}
  await _sb.from("admin_log").insert({admin_user_id:_uid,salon_id:id,action:"EDIT_LEGAL",details:JSON.stringify(data)});
  alert("Ō£ģ Modifications enregistr├®es et propag├®es (app salon, site public, tickets, factures)");
  await loadData();closeMod();render();openD(id);
}

// ===== VERIFICATION =====
async function toggleDocLock(salonId,lock){
  if(!_sb||!_online)return;
  var msg=lock?"\ud83d\udd12 Verrouiller les documents de ce salon ?\n\nLe client ne pourra plus les remplacer tant que vous n'aurez pas d\u00e9verrouill\u00e9.":"\ud83d\udd13 D\u00e9verrouiller les documents ?\n\nLe client pourra les modifier librement.";
  if(!confirm(msg))return;
  var r=await _sb.from("salons").update({documents_locked:lock}).eq("id",salonId);
  if(r&&r.error){alert("Erreur : "+r.error.message);return;}
  await _sb.from("admin_log").insert({admin_user_id:_uid,salon_id:salonId,action:lock?"DOCS_LOCKED":"DOCS_UNLOCKED",details:lock?"Documents verrouill\u00e9s":"Documents d\u00e9verrouill\u00e9s"});
  alert(lock?"\u2705 Documents verrouill\u00e9s":"\ud83d\udd13 Documents d\u00e9verrouill\u00e9s");
  await loadData();render();openD(salonId);
}

async function resetDocs(id){
  if(!confirm("\u26a0 Supprimer TOUS les documents de ce salon ?\n\nLe client devra les renvoyer. Le compte sera bloqu\u00e9 si le d\u00e9lai de 15 jours est d\u00e9pass\u00e9."))return;
  await _sb.from("salons").update({documents_kbis:null,documents_id:null,documents_id_verso:null,verification_status:"pending",verified_at:null,verified_by:null,documents_uploaded_at:null}).eq("id",id);
  await _sb.from("admin_log").insert({admin_user_id:_uid,salon_id:id,action:"DOCS_RESET",details:"Tous les documents supprim\u00e9s"});
  alert("\ud83d\uddd1 Documents r\u00e9initialis\u00e9s");
  await loadData();render();openD(id);
}

async function verifSalon(id,status){
  if(!_sb||!_online)return;
  var labels={verified:"\u2705 Valider les documents (d\u00e9blocage d\u00e9finitif)",pending:"\u23f3 Remettre en attente de v\u00e9rification",incomplete:"\ud83d\udcdd Marquer comme incomplet (le client devra renvoyer)",rejected:"\u274c Rejeter les documents (compte bloqu\u00e9)"};
  if(!confirm((labels[status]||"Changer le statut")+" ?\n\nSalon: "+(gSalon(id)?gSalon(id).nom:id)))return;
  var data={verification_status:status};
  if(status==="verified"){data.verified_at=new Date().toISOString();data.verified_by=_uid;}
  if(status==="pending"||status==="rejected"){data.verified_at=null;data.verified_by=null;}
  await _sb.from("salons").update(data).eq("id",id);
  await _sb.from("admin_log").insert({admin_user_id:_uid,salon_id:id,action:"VERIFY_"+status.toUpperCase(),details:""});
  var msgs={verified:"\u2705 Salon v\u00e9rifi\u00e9 !",pending:"\u23f3 Remis en attente",incomplete:"\ud83d\udcdd Marqu\u00e9 comme incomplet",rejected:"\u274c Salon rejet\u00e9"};
  alert(msgs[status]||"Statut mis \u00e0 jour");
  await loadData();render();openD(id);
}

// ===== EDIT USER ID =====
function editUserId(id){
  var s=gSalon(id);if(!s)return;
  var newId=prompt("User ID actuel :\n"+(s.userId||"aucun")+"\n\nNouveau user_id (UUID auth) :",s.userId||"");
  if(newId===null)return;
  if(newId&&newId.length>30){doEditUserId(id,newId);}
  else{alert("User ID invalide (doit ├¬tre un UUID)");}
}

async function doEditUserId(id,newUid){
  await _sb.from("salons").update({user_id:newUid}).eq("id",id);
  await _sb.from("admin_log").insert({admin_user_id:_uid,salon_id:id,action:"CHANGE_USER_ID",details:"new="+newUid});
  await loadData();render();openD(id);
}

async function saveNotes(id){
  var n=document.getElementById("dpNotes");if(!n)return;
  await _sb.from("salons").update({notes_admin:n.value}).eq("id",id);
  alert("Notes enregistr├®es !");

async function saveFreePlan(id){
  var isFree=document.getElementById("dpFree").checked;
  var plan=document.getElementById("dpFreePlan").value;
  var dur=document.getElementById("dpFreeDur").value;
  var freeUntil=null;
  if(isFree&&dur!=="unlimited"){
    var d=new Date();
    if(dur==="1m")d.setMonth(d.getMonth()+1);
    else if(dur==="3m")d.setMonth(d.getMonth()+3);
    else if(dur==="6m")d.setMonth(d.getMonth()+6);
    else if(dur==="1y")d.setFullYear(d.getFullYear()+1);
    freeUntil=d.toISOString().slice(0,10);
  }
  var update={is_free:isFree,free_until:freeUntil};
  if(isFree){update.plan=plan;update.status="active";update.trial_end=null;}
  await _sb.from("salons").update(update).eq("id",id);
  var s=gSalon(id);
  if(s){s.isFree=isFree;s.freeUntil=freeUntil;s.plan=isFree?plan:s.plan;s.status=isFree?"active":s.status;}
  alert("\u2705 "+(isFree?"Plan "+plan+" offert"+(freeUntil?" jusqu\u2019au "+fmtD(freeUntil):" (illimit\u00e9)"):"Plan gratuit d\u00e9sactiv\u00e9"));
  openD(id);
}

async function addSmsCredits(id,nb){
  var s=gSalon(id);if(!s)return;
  var newCredits=(s.smsCredits||0)+nb;
  await _sb.from("salons").update({sms_credits:newCredits}).eq("id",id);
  s.smsCredits=newCredits;
  alert("\u2705 "+nb+" SMS ajout\u00e9s. Nouveau solde: "+newCredits+" SMS");
  openD(id);
}

async function addSmsCreditsCustom(id){
  var nb=prompt("Nombre de SMS \u00e0 ajouter :");
  if(!nb||isNaN(nb)||+nb<=0)return;
  await addSmsCredits(id,+nb);
}

async function resetSmsCredits(id){
  if(!confirm("Remettre le solde SMS \u00e0 0 ?"))return;
  var today=new Date().toISOString().slice(0,10);
  await _sb.from("salons").update({sms_credits:0,sms_last_reset:today}).eq("id",id);
  var s=gSalon(id);if(s){s.smsCredits=0;s.smsLastReset=today;}
  alert("\u2705 Solde SMS remis \u00e0 0");
  openD(id);
}
