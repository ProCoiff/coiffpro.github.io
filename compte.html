<style>

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f1);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
html{overflow-x:hidden}
a{color:var(--gold);text-decoration:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:50;gap:8px;flex-wrap:nowrap;min-width:0}

.topbar .logo{flex-shrink:0;white-space:nowrap}
.topbar .btn-trouver-salon{flex-shrink:0;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}

@media(max-width:600px){

.btn{padding:14px;border-radius:12px;border:none;font-weight:700;font-size:15px;cursor:pointer;font-family:var(--f1);transition:all .2s;width:100%;text-align:center;display:block}

.consent{padding:10px 0;border-top:1px solid var(--border)}

.tab-bar::-webkit-scrollbar{display:none}

.tab.active{color:var(--gold);border-color:var(--gold)}
.section{margin-bottom:24px}
.section-title{font-size:14px;font-weight:800;color:var(--gold);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}

/* RDV LIST */
.rdv-item{display:flex;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.rdv-item:last-child{border:none}
.rdv-date{text-align:center;min-width:48px}
.rdv-date .d{font-size:22px;font-weight:900;line-height:1}
.rdv-date .m{font-size:11px;color:var(--text3);text-transform:uppercase}
.rdv-info{flex:1}
.rdv-svc{font-weight:700;font-size:14px}
.rdv-det{font-size:12px;color:var(--text2);margin-top:2px}
.rdv-salon{font-size:11px;color:var(--gold);margin-top:2px}
.rdv-status{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700}

.st-confirmed{background:rgba(74,222,128,.12);color:var(--green)}
.st-done{background:rgba(96,165,250,.12);color:var(--blue)}

.toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.1);position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--gold)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s}

.empty{text-align:center;padding:40px 20px;color:var(--text3)}

.footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);margin-top:20px}

async function sha256(pass){
  var enc=new TextEncoder().encode(pass);
  var hash=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}
// FIX I7: Salted hash (email as salt) — prevents rainbow table attacks
async function sha256Salted(email, pass){
  return await sha256(email.toLowerCase().trim() + ":" + pass);
}
function api(path,opts){return fetch(SB_URL+"/rest/v1/"+path,Object.assign({headers:HDR},opts||{}));}

// === Helper sécurisé : appelle un endpoint /api/client/* du worker en passant
// le session_token JWT. Le worker valide le token et utilise service_role pour
// bypass RLS. Permet de DROP les policies anon USING(true).
async function _clientApi(endpoint, body){
  var token = (window.LX && LX.getToken) ? LX.getToken() : "";
  if(!token) return {ok:false, status:401, data:{error:"Pas de session"}};
  var payload = Object.assign({session_token:token}, body||{});
  try{
    var r = await fetch("/api/client/"+endpoint, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
    var data;
    try{ data = await r.json(); }catch(_){ data = {}; }
    // ⚠️ Pas de LX.logout() automatique sur 401 : un 401 du worker peut venir
    // d'un bug temporaire (lx-profile lent, déploiement en cours), pas forcément
    // d'une session vraiment expirée. Si la session est cassée pour de bon, le
    // refresh LX.get() au boot s'en chargera proprement.
    return {ok:r.ok, status:r.status, data:data};
  }catch(e){
    return {ok:false, status:0, data:{error:"Erreur réseau: "+(e.message||e)}};
  }
}
function fmtDate(d){if(!d)return"\u2014";try{return new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});}catch(e){return d;}}

// Session
function saveSession(){
  if(!CLIENT)return;
  var safe={};for(var k in CLIENT){if(k!=="password_hash")safe[k]=CLIENT[k];}
  try{localStorage.setItem("lx_account",JSON.stringify(safe));}catch(e){}
}
function loadSession(){
  // Priorité au token BP (nouveau flow via edge functions)
  if (window.LX && LX.hasSession()) {
    var u=LX.getUser();
    if(u){CLIENT=u;if(CLIENT.password_hash)delete CLIENT.password_hash;PAGE="dashboard";return;}
  }
  // Fallback legacy localStorage
  try{var d=localStorage.getItem("lx_account");if(d){CLIENT=JSON.parse(d);if(CLIENT.password_hash)delete CLIENT.password_hash;PAGE="dashboard";}}catch(e){}
}
function logout(){CLIENT=null;CLIENT_RDVS=[];PAGE="login";LX.logout();try{localStorage.removeItem("lx_account");}catch(e){}render();}

// === DETECT INVITE TOKEN ?invite=XXX → AFFICHE FORM "DÉFINISSEZ VOTRE MOT DE PASSE" ===
// Si l'URL contient ?invite=XXX, on bypasse loadSession et on affiche le form invite.
window.INVITE_TOKEN = (function(){
  try { var p = new URLSearchParams(window.location.search); return p.get("invite") || null; } catch(e){ return null; }
})();
if(window.INVITE_TOKEN){

} else {
  loadSession();
}
// Refresh client data via edge function (si session BP valide)
if(CLIENT&&LX.hasSession()){
  LX.get().then(function(res){
    if(res.ok&&res.data&&res.data.user){
      CLIENT=res.data.user;
      saveSession();render();
    } else if (res.status===401){
      // Session expirée → retour login
      logout();
    }
  }).catch(function(e){});
}

async function doActivateInvite(){
  var p1=(document.getElementById("iPass")||{}).value||"";
  var p2=(document.getElementById("iPass2")||{}).value||"";
  if(p1.length<6){showErr("invErr","Mot de passe minimum 6 caract\u00e8res");return;}
  if(p1!==p2){showErr("invErr","Les mots de passe ne correspondent pas");return;}
  var token=window.INVITE_TOKEN;
  if(!token){showErr("invErr","Token d\u2019invitation manquant");return;}
  // D\u00e9sactive bouton pendant la requ\u00eate + spinner
  var btn=document.getElementById("btnActivateInvite");
  var btnHTMLOriginal = btn ? btn.innerHTML : "";
  if(btn){btn.disabled=true;btn.style.opacity="0.6";btn.innerHTML='<svg width="18" height="18" viewBox="0 0 50 50" style="animation:spin 1s linear infinite"><circle cx="25" cy="25" r="20" stroke="#0a0a0a" stroke-width="4" fill="none" stroke-dasharray="80" stroke-dashoffset="60" stroke-linecap="round"/></svg>Activation en cours\u2026';}
  if(!document.getElementById("_spinStyle")){var s=document.createElement("style");s.id="_spinStyle";s.textContent="@keyframes spin{to{transform:rotate(360deg)}}";document.head.appendChild(s);}
  try{
    var resp=await fetch("/api/client/invite/verify",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({token:token, password:p1})
    });
    var data=await resp.json();
    if(!resp.ok || !data.ok){
      showErr("invErr", data.error || "Activation impossible. Contactez votre salon.");
      if(btn){btn.disabled=false;btn.style.opacity="1";btn.innerHTML=btnHTMLOriginal;}
      return;
    }
    // Compte cr\u00e9\u00e9 + li\u00e9 \u2192 on connecte automatiquement avec email + password
    if(btn){btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>Compte activ\u00e9 \u2713';}
    var loginRes = await LX.signin({email:data.email, password:p1});
    if(!loginRes.ok){
      showErr("invErr","Compte activ\u00e9, mais connexion \u00e9chou\u00e9e. Allez sur /compte et connectez-vous avec votre email et mot de passe.");
      if(btn){btn.disabled=false;btn.textContent="R\u00e9essayer";}
      return;
    }
    // Connect\u00e9 \u2192 bascule sur dashboard, nettoie l'URL
    if(loginRes.data && loginRes.data.user){ CLIENT=loginRes.data.user; saveSession(); }
    PAGE="dashboard";
    window.INVITE_TOKEN=null;
    if(window.history && window.history.replaceState){ window.history.replaceState({}, "", "/compte"); }
    render();
  }catch(e){
    showErr("invErr","Erreur r\u00e9seau : "+(e.message||""));
    if(btn){btn.disabled=false;btn.textContent="Activer mon compte";}
  }
}

// --- HELPER : sélecteur d'établissement (pills + barre de recherche si nombreux) ---
// opts = { salons:[{id,nom,count}], filterId, onSelectFn:"setMyXxxFilter", totalCount, searchKey:"photos|tickets|..." }
// - Si salons.length <= 1 : retourne ""
// - Si salons.length >= 6 : ajoute une barre de recherche au-dessus des pills
function lxRenderSalonPicker(opts){
  if(!opts || !opts.salons || opts.salons.length <= 1) return "";
  var SHOW_SEARCH = opts.salons.length > 5;
  var sk = "_picker_search_"+(opts.searchKey||"def");
  var searchVal = String(window[sk]||"").toLowerCase().trim();
  var filtered = opts.salons.filter(function(s){
    return !searchVal || (s.nom||"").toLowerCase().indexOf(searchVal) >= 0;
  });
  var h = '<div style="margin-bottom:14px">';
  if(SHOW_SEARCH){
    h += '<div style="margin-bottom:8px"><input type="text" placeholder="🔍 Rechercher un établissement..." value="'+escAttr(searchVal)+'" oninput="window.'+sk+'=this.value;render();setTimeout(function(){var i=document.getElementById(\''+sk+'_input\');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}},10)" id="'+sk+'_input" autocomplete="off" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid rgba(200,168,78,.25);background:rgba(0,0,0,.35);color:#fff;font-size:13px;box-sizing:border-box;outline:none"></div>';
  }
  h += '<div style="display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:rgba(0,0,0,.25);border:1px solid rgba(200,168,78,.15);border-radius:10px;'+(SHOW_SEARCH?"max-height:170px;overflow-y:auto;":"")+'">';
  var pillBase = 'cursor:pointer;padding:6px 12px;border-radius:18px;font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,.1);transition:all .15s';
  var pillOff = 'background:transparent;color:#bbb;'+pillBase;
  var pillOn  = 'background:linear-gradient(135deg,#c8a84e,#a88a3e);color:#000;border-color:#c8a84e;'+pillBase;
  // "Tous" toujours présent même en cas de recherche
  h += '<div style="'+(opts.filterId==="all"?pillOn:pillOff)+'" onclick="'+opts.onSelectFn+'(\'all\')">Tous · '+(opts.totalCount||0)+'</div>';
  if(filtered.length){
    filtered.forEach(function(s){
      h += '<div style="'+(opts.filterId===s.id?pillOn:pillOff)+'" onclick="'+opts.onSelectFn+'(\''+s.id+'\')">'+escAttr(s.nom||"Salon")+' · '+(s.count||0)+'</div>';
    });
  } else if(searchVal){
    h += '<div style="padding:6px 10px;color:#888;font-size:12px;font-style:italic">Aucun résultat pour « '+escAttr(searchVal)+' »</div>';
  }
  h += '</div></div>';
  return h;
}

// --- PHOTOS TAB (visible si salon a activé "photos_visible_client") ---
window.MY_PHOTOS = null; // {salons:[{salon_id,salon_nom,salon_logo,photos:[...]}]}
window._myPhotosLoading = false;
window._myPhotosFilter = "all"; // "all" ou salon_id
function setMyPhotosFilter(v){ window._myPhotosFilter = v; render(); }
async function loadMyPhotos(){
  if(window._myPhotosLoading) return render();
  window._myPhotosLoading = true;
  render();
  try{
    // Pattern compatible lx-profile : session_token via POST body (pas Authorization header)
    var token = (window.LX && LX.getToken) ? LX.getToken() : "";
    if(!token){
      window.MY_PHOTOS = {salons:[], error:"Pas de session active"};
      window._myPhotosLoading = false;
      return render();
    }
    var r = await fetch(SB_URL+"/functions/v1/client-mes-photos", {
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SB_KEY},
      body:JSON.stringify({session_token: token})
    });
    var data = await r.json();
    if(!r.ok) data.error = data.error || "Erreur serveur";
    window.MY_PHOTOS = data;
  }catch(e){
    console.warn("[loadMyPhotos]", e);
    window.MY_PHOTOS = {salons:[], error:e.message};
  }
  window._myPhotosLoading = false;
  render();
}

function renderPhotosTab(){
  if(window._myPhotosLoading){
    return '<div style="text-align:center;padding:40px;color:#888"><div style="font-size:32px;margin-bottom:10px">⏳</div>Chargement de vos photos...</div>';
  }
  if(!window.MY_PHOTOS){
    setTimeout(loadMyPhotos, 50);
    return '<div style="text-align:center;padding:40px;color:#888">Chargement...</div>';
  }
  var data = window.MY_PHOTOS;
  if(data.error){
    return '<div style="text-align:center;padding:40px;color:#f44336">Erreur : '+data.error+'</div>';
  }
  if(!data.salons || data.salons.length===0){
    return '<div style="text-align:center;padding:40px;color:#888">'
      +'<div style="font-size:48px;margin-bottom:10px">📸</div>'
      +'<div style="font-size:15px;font-weight:600;color:#fff;margin-bottom:6px">Aucune photo disponible</div>'
      +'<div style="font-size:12px;line-height:1.5">Vos photos apparaîtront ici si votre salon a activé le partage. Demandez à votre salon de l\'activer dans Réglages → Réservation en ligne.</div>'
      +'</div>';

  var h = '';

  var totalPhotos = data.salons.reduce(function(a,s){return a+s.photos.length;},0);
  h += lxRenderSalonPicker({
    salons: data.salons.map(function(s){return {id:s.salon_id, nom:s.salon_nom, count:s.photos.length};}),
    filterId: filterId, onSelectFn: "setMyPhotosFilter",
    totalCount: totalPhotos, searchKey: "photos"
  });
  var salonsToShow = (filterId==="all") ? data.salons : data.salons.filter(function(s){return s.salon_id===filterId;});
  salonsToShow.forEach(function(salon){
    h += '<div style="background:rgba(255,255,255,.04);border:1px solid rgba(200,168,78,.2);border-radius:12px;padding:14px;margin-bottom:14px">';
    h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.06)">';
    if(salon.salon_logo) h += '<img src="'+salon.salon_logo+'" style="width:36px;height:36px;border-radius:8px;object-fit:cover">';
    h += '<div><div style="font-weight:700;color:var(--gold,#c8a84e);font-size:15px">'+salon.salon_nom+'</div>';
    h += '<div style="font-size:11px;color:#888">'+salon.photos.length+' photo'+(salon.photos.length>1?'s':'')+'</div></div></div>';
    // Group by date
    var groups = {};
    salon.photos.forEach(function(p){var d=(p.date||"").slice(0,10)||"sans-date";if(!groups[d])groups[d]=[];groups[d].push(p);});
    Object.keys(groups).sort(function(a,b){return b.localeCompare(a);}).forEach(function(dk){
      var moisN=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
      var dateLabel = dk;
      if(dk!=="sans-date"){
        var d = new Date(dk);
        if(!isNaN(d.getTime())) dateLabel = d.getDate()+" "+moisN[d.getMonth()]+" "+d.getFullYear();
      }
      h += '<div style="font-size:12px;font-weight:700;color:#888;margin:10px 0 6px">📅 '+dateLabel+'</div>';
      h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:6px">';
      groups[dk].forEach(function(p){
        var labelMeta = {avant:{l:"Avant",col:"#ff9800"},apres:{l:"Après",col:"#4caf50"},couleur:{l:"Couleur",col:"#e91e63"},coupe:{l:"Coupe",col:"#2196f3"},meches:{l:"Mèches",col:"#ffeb3b"},brushing:{l:"Brushing",col:"#00bcd4"}}[p.label] || {l:p.label||"Photo",col:"#888"};
        h += '<div style="position:relative;border-radius:10px;overflow:hidden;background:rgba(0,0,0,.4);aspect-ratio:1;cursor:pointer" onclick="window.open(\''+p.signed_url+'\',\'_blank\')">';
        h += '<img src="'+p.signed_url+'" style="width:100%;height:100%;object-fit:cover">';
        h += '<div style="position:absolute;top:6px;left:6px;background:'+labelMeta.col+'cc;color:#fff;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:800">'+labelMeta.l+'</div>';

        h += '</div>';
      });
      h += '</div>';
    });
    h += '</div>';
  });
  return h;
}

// --- RDV TAB ---
function renderRdvTab(){
  var h='';
  var mois=["Jan","F\u00e9v","Mar","Avr","Mai","Jun","Jul","Ao\u00fb","Sep","Oct","Nov","D\u00e9c"];
  var stLabels={pending:"En attente",confirmed:"Confirm\u00e9",done:"Termin\u00e9",cancelled:"Annul\u00e9"};
  var stClasses={pending:"st-pending",confirmed:"st-confirmed",done:"st-done",cancelled:"st-cancelled"};
  
  var today=new Date().toISOString().slice(0,10);
  var upcoming=CLIENT_RDVS.filter(function(r){return r.date_rdv>=today&&r.status!=="cancelled"&&r.status!=="done";});
  var past=CLIENT_RDVS.filter(function(r){return (r.date_rdv<today&&r.status!=="cancelled")||r.status==="done";});
  var cancelled=CLIENT_RDVS.filter(function(r){return r.status==="cancelled";});
  // Override status label for past confirmed → Terminé
  function getStatusLabel(r){
    if(r.status==="done")return "Termin\u00e9";
    if(r.date_rdv<today&&r.status!=="cancelled")return "Termin\u00e9";
    return stLabels[r.status]||r.status;
  }
  function getStatusClass(r){
    if(r.status==="done"||(r.date_rdv<today&&r.status!=="cancelled"))return "st-done";
    return stClasses[r.status]||"";
  }
  
  // --- UPCOMING ---
  h+='<div class="section"><div class="section-title">\ud83d\udcc5 \u00c0 venir ('+upcoming.length+')</div>';
  if(upcoming.length){
    upcoming.forEach(function(r){
      var dp=r.date_rdv.split("-");
      h+='<div class="card" style="margin-bottom:8px">';
      h+='<div class="rdv-item" style="border:none;padding:0">';
      h+='<div class="rdv-date"><div class="d">'+parseInt(dp[2])+'</div><div class="m">'+mois[parseInt(dp[1])-1]+'</div></div>';
      h+='<div class="rdv-info"><div class="rdv-svc">'+r.service_nom+'</div>';
      h+='<div class="rdv-det">'+(r.heure_rdv?r.heure_rdv.slice(0,5):"")+' \u2022 '+(r.collaborateur_nom||"")+' \u2022 '+r.service_prix+'\u20ac</div>';
      h+='<div class="rdv-salon">\ud83c\udfe0 '+(r.salon_nom||"Salon")+'</div></div>';
      h+='<div class="rdv-status '+getStatusClass(r)+'">'+getStatusLabel(r)+'</div>';
      h+='</div>';
      // === Modification SALON (le salon a modifi\u00e9 le RDV) \u2014 bandeau prioritaire ===
      if(r.salon_modified_at && !r.salon_modified_acknowledged_by_client){
        var modFields=r.salon_modified_fields||{};
        var modList=[];
        if(modFields.date_rdv) modList.push('Date : <strong>'+fmtDate(modFields.date_rdv.old)+' \u2192 '+fmtDate(modFields.date_rdv.new)+'</strong>');
        if(modFields.heure_rdv) modList.push('Heure : <strong>'+(modFields.heure_rdv.old||"").slice(0,5)+' \u2192 '+(modFields.heure_rdv.new||"").slice(0,5)+'</strong>');
        if(modFields.collaborateur_nom) modList.push('Avec : <strong>'+modFields.collaborateur_nom.old+' \u2192 '+modFields.collaborateur_nom.new+'</strong>');
        if(modFields.duree_minutes) modList.push('Dur\u00e9e : <strong>'+modFields.duree_minutes.old+' \u2192 '+modFields.duree_minutes.new+' min</strong>');
        if(modFields.service_nom) modList.push('Prestation : <strong>'+modFields.service_nom.old+' \u2192 '+modFields.service_nom.new+'</strong>');
        h+='<div style="margin-top:8px;padding:10px 12px;background:linear-gradient(135deg,rgba(251,146,60,.12),rgba(251,146,60,.06));border:1.5px solid rgba(251,146,60,.35);border-radius:10px;font-size:12px;color:#fff;line-height:1.6">';

        h+='<button onclick="ackSalonModification(\''+r.id+'\')" style="margin-top:8px;width:100%;padding:8px;border-radius:6px;border:1px solid rgba(251,146,60,.3);background:rgba(251,146,60,.08);color:#fb923c;font-size:11px;font-weight:700;cursor:pointer">\u2713 J\'ai pris connaissance</button>';
        h+='</div>';

      // Modification pending notice (DEMAND\u00c9E PAR LE CLIENT vers salon)
      if(r.modification_demandee&&r.modification_status==="pending"){

      h+='</div></div>';
      }
    });
  } else {
    h+='<div class="empty"><div class="ico">\ud83d\udcc5</div>Aucun rendez-vous \u00e0 venir<br><a href="/recherche.html" style="font-size:13px">Trouver un pro</a></div>';

      }

  // --- CANCELLED ---
  if(cancelled.length){

      h+='<div class="card" style="margin-bottom:6px;opacity:.4">';

      h+='</div></div>';

    h+='</div>';

  return h;
}

    salons: FIDELITE_DATA.map(function(f){return {id:f.salon_id, nom:f.salon_nom||"Salon", count:(f.points||0)+" pts"};}),

    h+='</div>';
  });
  
  h+='</div>';
  return h;
}

async function emailReceipt(rdvId){
  var rdv=CLIENT_RDVS.find(function(r){return r.id===rdvId;});if(!rdv)return;
  if(!CLIENT||!CLIENT.email){alert("Aucun email enregistr\u00e9 sur votre compte.");return;}
  var btn=event.target;if(btn){btn.textContent="\u23f3 Envoi...";btn.disabled=true;}

  // Use stored ticket HTML if available, otherwise generate
  var ticketHtml;
  if(rdv.ticket_html){
    ticketHtml=rdv.ticket_html;
  }else{
    var salon={nom:rdv.salon_nom||"Salon",adresse:"",cp:"",ville:"",tel:"",siret:"",tva:"",tauxTVA:20};
    try{
      var sr=await api("salons_public?select=nom,config_json&id=eq."+rdv.salon_id);
      var sd=await sr.json();
      if(Array.isArray(sd)&&sd[0]){
        var cfg={};try{cfg=typeof sd[0].config_json==="string"?JSON.parse(sd[0].config_json):sd[0].config_json||{};}catch(e){}
        salon.nom=cfg.nom||sd[0].nom||"Salon";
        salon.adresse=cfg.adresse||"";salon.cp=cfg.cp||"";salon.ville=cfg.ville||"";
        salon.tel=cfg.tel||"";salon.siret=cfg.siret||"";salon.tva=cfg.tva||"";salon.tauxTVA=cfg.tauxTVA||20;
      }
    }catch(e){}
    ticketHtml=buildCompteTicketHTML(rdv,salon);
  }
  var salonNomEmail=rdv.salon_nom||"Salon";

  try{
    var resp=await fetch("/api/email/ticket",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        clientEmail:CLIENT.email,
        clientName:(CLIENT.prenom||"")+" "+(CLIENT.nom||""),
        salonName:salonNomEmail,
        ticketNum:rdv.ticket_num||("RDV-"+rdvId.slice(0,8)),
        ticketHtml:ticketHtml
      })
    });
    var data=await resp.json();
    if(data.success)alert("\u2705 Ticket envoy\u00e9 \u00e0 "+CLIENT.email);
    else alert("\u274c Erreur lors de l\u0027envoi: "+(data.error||""));
  }catch(e){alert("\u274c Erreur de connexion");}
  if(btn){btn.textContent="\u2709 Recevoir par email";btn.disabled=false;}
}

// Build ticket HTML for compte client (shared between downloadReceipt and emailReceipt)
function buildCompteTicketHTML(rdv,salon){
  var txTVA=salon.tauxTVA||20;
  var ttc=Number(rdv.service_prix)||0;
  var ht=Math.round(ttc*100/(100+txTVA)*100)/100;
  var tva=Math.round((ttc-ht)*100)/100;
  var dp=rdv.date_rdv?rdv.date_rdv.split("-"):["2026","01","01"];
  var dateFR=dp[2]+"/"+dp[1]+"/"+dp[0];
  var acompte=Number(rdv.acompte_montant)||0;

  var h="";
  // DUPLICATA
  h+="<div style='text-align:center;border:3px solid #000;padding:6px;margin-bottom:8px;font-weight:900;font-size:16px;letter-spacing:3px'>DUPLICATA</div>";
  // En-t\u00eate salon
  h+="<div style='text-align:center;border-bottom:1px solid #000;padding-bottom:8px;margin-bottom:8px'>";
  h+="<div style='font-weight:900;font-size:14px;letter-spacing:1px'>"+salon.nom.toUpperCase()+"</div>";
  h+="<div style='font-size:11px'>"+salon.adresse+"</div>";
  h+="<div style='font-size:11px'>"+(salon.cp||"")+" "+(salon.ville||"")+"</div>";
  if(salon.tel)h+="<div style='font-size:11px'>T\u00e9l: "+salon.tel+"</div>";
  h+="</div>";
  // Ticket info
  h+="<div style='text-align:center;margin-bottom:8px'>";
  h+="<div style='font-weight:900;font-size:13px'>Ticket de vente N\u00b0"+(rdv.ticket_num||"--")+"</div>";
  h+="<div style='font-size:12px'>"+dateFR+" \u00e0 "+(rdv.heure_rdv?rdv.heure_rdv.slice(0,5):"")+"</div>";
  if(rdv.collaborateur_nom)h+="<div style='font-size:12px'>Collaborateur: "+rdv.collaborateur_nom+"</div>";
  h+="<div style='font-size:12px'>Client: "+(CLIENT.prenom||"")+" "+(CLIENT.nom||"")+"</div>";
  h+="</div>";
  // Articles
  h+="<table style='width:100%;border-collapse:collapse'><tr style='border-top:1px solid #000;border-bottom:1px solid #000'><th style='text-align:left;padding:4px 0;font-size:11px'>Quantit\u00e9</th><th style='text-align:left;font-size:11px'>D\u00e9signation</th><th style='text-align:right;font-size:11px'>TTC</th></tr>";
  if(rdv.items&&rdv.items.length){
    rdv.items.forEach(function(it){
      if(it.isSep){h+="<tr><td colspan='3' style='padding:6px 0 2px;font-weight:900;border-top:1px dashed #999;font-size:11px'>\u25b6 "+(it.name||"").replace(/---/g,"").trim()+"</td></tr>";return;}
      var lt=(it.price||0)*(it.qty||1)-(it.remise||0);
      h+="<tr style='border-bottom:1px solid #ccc'><td style='padding:3px 0'>"+(it.qty||1)+"</td><td style='padding:3px 4px;font-weight:700'>"+(it.name||"").toUpperCase()+"</td><td style='text-align:right;padding:3px 0'>"+lt.toFixed(2)+"</td></tr>";
    });
  }else{
    h+="<tr><td>1</td><td style='font-weight:700'>"+(rdv.service_nom||"").toUpperCase()+"</td><td style='text-align:right'>"+ttc.toFixed(2)+"</td></tr>";
  }
  h+="</table>";
  // HT
  h+="<div style='display:flex;justify-content:space-between;font-weight:900;font-size:13px;border-top:2px solid #000;padding-top:6px'><span>Total HT :</span><span>"+ht.toFixed(2)+"</span></div>";
  // TVA
  h+="<table style='font-size:11px;margin:6px 0;border-top:1px solid #000;border-bottom:1px solid #000;width:100%;border-collapse:collapse'><tr style='font-weight:700'><td></td><td style='text-align:center'>TVA</td><td style='text-align:center'>HT</td><td style='text-align:right'>TTC</td></tr>";
  h+="<tr><td>TVA "+txTVA+"%</td><td style='text-align:center'>"+tva.toFixed(2)+" \u20ac</td><td style='text-align:center'>"+ht.toFixed(2)+" \u20ac</td><td style='text-align:right'>"+ttc.toFixed(2)+" \u20ac</td></tr></table>";
  // TTC
  h+="<div style='display:flex;justify-content:space-between;font-weight:900;font-size:16px;padding:8px 0;border-bottom:1px solid #000'><span>Total TTC :</span><span>"+ttc.toFixed(2)+" \u20ac</span></div>";
  // Acompte
  if(acompte>0){
    h+="<div style='display:flex;justify-content:space-between;font-size:11px;padding:3px 0'><span>Acompte d\u00e9duit</span><span>-"+acompte.toFixed(2)+" \u20ac</span></div>";
    h+="<div style='display:flex;justify-content:space-between;font-weight:900;font-size:14px;padding:3px 0'><span>RESTE PAY\u00c9</span><span>"+(ttc-acompte).toFixed(2)+" \u20ac</span></div>";
  }
  // NF525
  h+="<div style='border-top:1px dashed #999;margin:8px 0'></div>";
  h+="<div style='text-align:center;font-size:10px;color:#666'>";
  if(salon.siret)h+="<div>SIRET: "+salon.siret+"</div>";
  if(salon.tva)h+="<div>N\u00b0 TVA: "+salon.tva+"</div>";
  h+="<div>Logiciel conforme NF525</div><div>Luxyra - contact@luxyra.fr</div>";
  h+="<div style='font-size:9px;color:#999'>Art. 286-I-3\u00b0 bis du CGI - Conserver 6 ans</div>";
  h+="<div style='font-weight:700;margin-top:4px'>COPIE ELECTRONIQUE - DUPLICATA</div></div>";
  return h;
}

// FIX 2026-05-15 : nouvel onglet 🎁 Bons cadeaux. Liste les bons achetés par le client
// (where buyer_email = CLIENT.email) + propose impression et état (active/utilisé/expiré)
var _bonsCadeauxData = null;
var _bonsCadeauxLoaded = false;
async function loadMyBonsCadeaux(){
  if(!CLIENT || !CLIENT.email) return;
  _bonsCadeauxLoaded = false;
  render();
  try {
    var r = await api("cartes_cadeaux?select=*,salons(nom,adresse,cp,ville,tel,logo,slug)&buyer_email=eq."+encodeURIComponent(CLIENT.email.toLowerCase())+"&payment_status=eq.paid&order=created_at.desc");
    _bonsCadeauxData = r || [];
  } catch(e) {
    console.warn("loadMyBonsCadeaux", e);
    _bonsCadeauxData = [];
  }
  _bonsCadeauxLoaded = true;
  render();
}

    h+='<div style="padding:14px 16px;background:linear-gradient(135deg,rgba(232,200,115,.12),rgba(200,168,78,.04));border-bottom:1px solid rgba(232,200,115,.15);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">';

  h+='</div>';
  return h;
}
function _esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ========== LOAD DATA ==========
async function loadMyRdvs(){
  if(!CLIENT)return;
  try{
    // Endpoint sécurisé : le worker fait les 2 fetches (par lx_id puis par email)
    // et dedupe côté serveur. Plus de fuite anon.
    var resR = await _clientApi("rdvs", {});
    CLIENT_RDVS = (resR.ok && resR.data && Array.isArray(resR.data.rdvs)) ? resR.data.rdvs : [];
    
    // Load POS tickets via Worker (bypasses RLS)
    try{
      var r3=await fetch("/api/client/tickets",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email:CLIENT.email})
      });
      var tkData=await r3.json();
      if(tkData&&Array.isArray(tkData.tickets)){
        tkData.tickets.forEach(function(t){
          var ex=false;CLIENT_RDVS.forEach(function(x){if(x.id===t.id)ex=true;});
          if(!ex)CLIENT_RDVS.push(t);
        });
      }
    }catch(e3){}
    
    // Sort by date desc
    CLIENT_RDVS.sort(function(a,b){return (a.date_rdv||"")>(b.date_rdv||"")?-1:1;});
    // Charger les avis déjà laissés par ce client (1 avis par salon)
    try{
      var rA=await api("avis_salon?select=id,salon_id,rdv_online_id,ticket_id,note,texte,created_at,updated_at&client_luxyra_id=eq."+CLIENT.id);
      var dA=await rA.json();
      if(Array.isArray(dA)) CLIENT_AVIS=dA;
    }catch(_){}
    render();
  }catch(e){}
}

  try{

      alert("Erreur anonymisation: "+(anonRes.data&&anonRes.data.error?anonRes.data.error:"inconnue"));

    closePopup("cancelModal");
    // Update local + force reload from DB
    var r=CLIENT_RDVS.find(function(x){return x.id===rdvId;});
    if(r){r.status="cancelled";}
    showToast("\u2705 Rendez-vous annul\u00e9");
    render();
    // Reload from DB to ensure consistency
    loadMyRdvs();
  }catch(e){alert("Erreur: "+e.message);}
}

// ========== RECEIPT / FACTURE ==========
async function downloadReceipt(rdvId){
  var rdv=CLIENT_RDVS.find(function(r){return r.id===rdvId;});if(!rdv)return;
  
  var salonNom=rdv.salon_nom||"Salon";
  var ticketNum=rdv.ticket_num||"";
  
  var w=window.open("","_blank","width=380,height=700");if(!w)return;
  var h="<!DOCTYPE html><html><head><meta charset='utf-8'><title>Ticket "+salonNom+" N\u00b0"+ticketNum+"</title>";
  h+="<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Courier New',monospace;padding:15px;max-width:340px;margin:0 auto;font-size:12px;line-height:1.5;color:#000;background:#fff}";
  h+="table{width:100%;border-collapse:collapse}@media print{body{padding:5px}}</style></head><body>";
  
  // Use stored ticket HTML (exact same as printed at checkout) if available
  if(rdv.ticket_html){
    h+=rdv.ticket_html;
  }else{
    // Fallback to generated ticket
    var salon={nom:salonNom,adresse:"",cp:"",ville:"",tel:"",siret:"",tva:"",sousTitre:"",tauxTVA:20};
    try{
      var sr=await api("salons_public?select=nom,config_json&id=eq."+rdv.salon_id);
      var sd=await sr.json();
      if(Array.isArray(sd)&&sd[0]){
        var cfg={};try{cfg=typeof sd[0].config_json==="string"?JSON.parse(sd[0].config_json):sd[0].config_json||{};}catch(e){}
        salon.nom=cfg.nom||sd[0].nom||"Salon";
        salon.adresse=cfg.adresse||"";salon.cp=cfg.cp||"";salon.ville=cfg.ville||"";
        salon.tel=cfg.tel||"";salon.siret=cfg.siret||"";salon.tva=cfg.tva||"";
        salon.sousTitre=cfg.sousTitre||"";salon.tauxTVA=cfg.tauxTVA||20;
      }
    }catch(e){}
    h+=buildCompteTicketHTML(rdv,salon);
  }
  h+="</body></html>";
  
  w.document.write(h);w.document.close();
  setTimeout(function(){w.print();},500);
}

function rebookRdv(salonId,serviceId,salonNom){
  // Ouvre la page booking du salon, prestation pr\u00e9-s\u00e9lectionn\u00e9e si possible
  var sName=decodeURIComponent(salonNom||"");
  // Pass service_id en query string : site.html lit ?book=<id> au boot
  // pour aller direct \u00e0 l'\u00e9tape 1 booking avec ce service s\u00e9lectionn\u00e9.
  var url="/site.html?s="+salonId;
  if(serviceId && serviceId!=='null') url+="&book="+encodeURIComponent(serviceId);
  window.open(url,"_blank");
  showToast("\ud83d\udd01 Redirection vers "+(sName||"le salon")+" pour r\u00e9server...");
}

// ============================================================================
// AVIS \u2014 Modal "Laisser un avis" (compte Luxyra obligatoire, 1 avis/salon)
// ============================================================================
// 1 client \u2192 1 avis par salon, qui peut \u00eatre MODIFI\u00c9 depuis n'importe quel
// RDV/ticket li\u00e9 \u00e0 ce salon. Pr\u00e9-remplit la note + texte si avis existe d\u00e9j\u00e0.
var AVIS_DRAFT={rdvId:null, ticketId:null, salonId:null, note:0, texte:"", editing:null};

function showLeaveAvisModal(rdvId, ticketId, salonId){
  if(!LX || !LX.hasSession()){
    showToast("Connexion requise pour laisser un avis");
    return;
  }
  // On retrouve le RDV ou ticket pour le contexte d'affichage
  var src=CLIENT_RDVS.find(function(r){return r.id===(rdvId||ticketId);});
  if(!src){showToast("Visite introuvable");return;}
  if(!salonId) salonId=src.salon_id;
  // Pr\u00e9-remplit avec l'avis existant si d\u00e9j\u00e0 un pour ce salon
  var existing=CLIENT_AVIS.find(function(a){return a.salon_id===salonId;});
  AVIS_DRAFT={
    rdvId:rdvId||null,
    ticketId:ticketId||null,
    salonId:salonId,
    note: existing ? Number(existing.note||0) : 0,
    texte: existing ? String(existing.texte||"") : "",
    editing: existing ? existing.id : null
  };
  renderAvisModal(src);
}

function renderAvisModal(src){
  var existing=document.getElementById("avisModal");
  if(existing) existing.remove();
  var dp=(src.date_rdv||"").split("-");
  var dateStr=dp.length===3 ? (parseInt(dp[2])+" "+["janv","f\u00e9vr","mars","avr","mai","juin","juil","ao\u00fbt","sept","oct","nov","d\u00e9c"][parseInt(dp[1])-1]+" "+dp[0]) : "";
  var stars="";
  for(var i=1;i<=5;i++){
    var active=i<=AVIS_DRAFT.note;
    stars+='<span onclick="setAvisNote('+i+')" style="font-size:38px;cursor:pointer;color:'+(active?"#d4a843":"#3a3a3a")+';transition:color .15s;user-select:none;padding:0 4px" data-star="'+i+'">\u2605</span>';
  }
  var noteLabels={1:"Tr\u00e8s d\u00e9cevant",2:"D\u00e9cevant",3:"Correct",4:"Bien",5:"Excellent"};
  var noteLabel=AVIS_DRAFT.note ? noteLabels[AVIS_DRAFT.note] : "Cliquez sur les \u00e9toiles pour noter";
  var titleStr=AVIS_DRAFT.editing ? "Modifier mon avis" : "Votre avis";
  var subtitle=escAttr(src.salon_nom||"Salon")+(src.service_nom?(" \u00b7 "+escAttr(src.service_nom)):"")+(dateStr?(" \u00b7 "+dateStr):"");
  var hint=AVIS_DRAFT.editing ? "Vous pouvez mettre \u00e0 jour votre avis. La nouvelle version remplacera l'ancienne (et la r\u00e9ponse du salon sera r\u00e9initialis\u00e9e)." : "";
  var html=''
    +'<div id="avisModal" onclick="if(event.target===this)closeAvisModal()" style="position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px">'
    +'<div style="background:#1a1815;border:1px solid rgba(200,168,78,.3);border-radius:16px;max-width:480px;width:100%;padding:28px;box-shadow:0 24px 60px rgba(0,0,0,.7)">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px">'
    +'<div><div style="font-family:\'Playfair Display\',serif;font-size:22px;font-weight:700;color:#d4a843;margin-bottom:4px">'+titleStr+'</div>'
    +'<div style="font-size:13px;color:#9a9590">'+subtitle+'</div></div>'
    +'<button onclick="closeAvisModal()" style="background:none;border:none;color:#9a9590;font-size:24px;cursor:pointer;line-height:1">\u00d7</button>'
    +'</div>'
    +(hint?'<div style="background:rgba(200,168,78,.06);border:1px solid rgba(200,168,78,.15);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:#c8c4be;line-height:1.5">'+hint+'</div>':'')
    +'<div style="text-align:center;margin:18px 0 8px">'+stars+'</div>'
    +'<div id="avisNoteLabel" style="text-align:center;font-size:13px;color:'+(AVIS_DRAFT.note?"#d4a843":"#666")+';font-weight:'+(AVIS_DRAFT.note?"600":"400")+';margin-bottom:18px;height:18px">'+noteLabel+'</div>'
    +'<label style="display:block;font-size:12px;color:#c8c4be;margin-bottom:6px">Votre commentaire <span style="color:#666">(optionnel)</span></label>'
    +'<textarea id="avisTexte" maxlength="2000" placeholder="Comment s\'est pass\u00e9 votre rendez-vous ?" style="width:100%;min-height:120px;padding:12px;border-radius:10px;border:1px solid rgba(200,168,78,.15);background:#0f0e0c;color:#fff;font-family:inherit;font-size:13px;line-height:1.5;resize:vertical;box-sizing:border-box">'+escAttr(AVIS_DRAFT.texte)+'</textarea>'
    +'<div style="font-size:11px;color:#666;margin-top:6px;line-height:1.5">Votre avis sera publi\u00e9 sous votre pr\u00e9nom et l\'initiale de votre nom (ex : \u00ab '+escAttr((CLIENT&&CLIENT.prenom)||"Client")+' '+escAttr(((CLIENT&&CLIENT.nom)||"X").charAt(0).toUpperCase())+'. \u00bb).<br>Soyez juste et constructif \u2014 votre avis aidera d\'autres clients.</div>'
    +'<div id="avisErr" style="color:#f87171;font-size:12px;margin-top:10px;display:none"></div>'
    +'<div style="display:flex;gap:10px;margin-top:18px">'
    +'<button onclick="closeAvisModal()" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:transparent;color:#c8c4be;font-size:13px;font-weight:600;cursor:pointer">Annuler</button>'
    +'<button id="avisSubmitBtn" onclick="submitAvis()" style="flex:2;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#d4a843,#b88c2a);color:#0f0e0c;font-size:13px;font-weight:700;cursor:pointer">'+(AVIS_DRAFT.editing?"Mettre à jour mon avis":"Publier mon avis")+'</button>'
    +'</div></div></div>';
  document.body.insertAdjacentHTML("beforeend", html);
}

function escAttr(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function setAvisNote(n){
  AVIS_DRAFT.note=n;
  var ta=document.getElementById("avisTexte");
  if(ta) AVIS_DRAFT.texte=ta.value;
  var src=CLIENT_RDVS.find(function(r){return r.id===(AVIS_DRAFT.rdvId||AVIS_DRAFT.ticketId);});
  if(src) renderAvisModal(src);
}

function closeAvisModal(){
  var m=document.getElementById("avisModal");
  if(m) m.remove();
}

async function submitAvis(){
  var ta=document.getElementById("avisTexte");
  var texte=ta?ta.value.trim():"";
  var err=document.getElementById("avisErr");
  var btn=document.getElementById("avisSubmitBtn");
  err.style.display="none";
  if(!AVIS_DRAFT.note || AVIS_DRAFT.note<1 || AVIS_DRAFT.note>5){
    err.textContent="S\u00e9lectionnez une note de 1 \u00e0 5 \u00e9toiles";
    err.style.display="block";
    return;
  }
  if(!LX || !LX.hasSession()){
    err.textContent="Session expir\u00e9e. Reconnectez-vous.";
    err.style.display="block";
    return;
  }
  btn.disabled=true; btn.textContent="Envoi\u2026"; btn.style.opacity=".6";
  try{
    var SB_FN_URL="https://kxdgjtvrkwugbifgppai.supabase.co/functions/v1/avis-create";
    var payload={
      session_token: LX.getToken(),
      note: AVIS_DRAFT.note,
      texte: texte
    };
    if(AVIS_DRAFT.rdvId) payload.rdv_online_id=AVIS_DRAFT.rdvId;
    if(AVIS_DRAFT.ticketId) payload.ticket_id=AVIS_DRAFT.ticketId;
    var r=await fetch(SB_FN_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY},
      body:JSON.stringify(payload)
    });
    var data=await r.json().catch(function(){return{};});
    if(!r.ok){
      err.textContent=data.error||"Erreur lors de l'envoi";
      err.style.display="block";
      btn.disabled=false; btn.textContent=(AVIS_DRAFT.editing?"Modifier mon avis":"Publier mon avis"); btn.style.opacity="1";
      return;
    }
    // Succ\u00e8s \u2014 UPSERT en local (remplace si d\u00e9j\u00e0 existant pour ce salon)
    if(data.avis){
      var idx=CLIENT_AVIS.findIndex(function(a){return a.salon_id===AVIS_DRAFT.salonId;});
      var entry={id:data.avis.id, salon_id:AVIS_DRAFT.salonId, rdv_online_id:AVIS_DRAFT.rdvId||null, ticket_id:AVIS_DRAFT.ticketId||null, note:AVIS_DRAFT.note, texte:texte, created_at:data.avis.created_at, updated_at:data.avis.updated_at||null};
      if(idx>=0) CLIENT_AVIS[idx]=entry; else CLIENT_AVIS.push(entry);
    }
    closeAvisModal();
    showToast(data.action==="updated" ? "\u2713 Votre avis a \u00e9t\u00e9 mis \u00e0 jour." : "\u2713 Merci ! Votre avis a \u00e9t\u00e9 publi\u00e9.");
    render();
  }catch(e){
    err.textContent="Erreur r\u00e9seau : "+(e.message||e);
    err.style.display="block";
    btn.disabled=false; btn.textContent=(AVIS_DRAFT.editing?"Modifier mon avis":"Publier mon avis"); btn.style.opacity="1";
  }
}

function closePopup(id){var el=document.getElementById(id);if(el)el.remove();}
function showToast(msg){
  var el=document.createElement("div");
  el.style.cssText="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:300;border:1px solid var(--gold);box-shadow:0 4px 20px rgba(0,0,0,.4)";
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(function(){el.remove();},3000);
}

// ========== UTILS ==========
function showErr(id,msg){var el=document.getElementById(id);if(el){el.style.display="block";el.textContent=msg;try{el.scrollIntoView({behavior:"smooth",block:"center"});}catch(_e){}}}
function showMsg(id,msg,color){var el=document.getElementById(id);if(el){el.style.display="block";el.style.color=color||"var(--text)";el.textContent=msg;}}

// Init
if(window.location.hash==="#register"&&!CLIENT)PAGE="register";
render();
if(CLIENT){loadMyRdvs();loadFidelite();}
</script>
