<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
:root{--bg:#050508;--bg2:#0d0d14;--card:#12121c;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.12);--text:#f5f5f7;--text2:#a0a0b0;--text3:#606070;--gold:#c8a84e;--gold-bg:rgba(200,168,78,.08);--gold2:rgba(200,168,78,.15);--green:#4ade80;--red:#f87171;--blue:#60a5fa;--orange:#fb923c;--r:14px;--f1:'DM Sans',sans-serif;--f2:'Playfair Display',serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f1);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--gold);text-decoration:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:50;gap:8px;flex-wrap:nowrap;min-width:0}
.topbar > *{min-width:0}
.topbar .logo{flex-shrink:0;white-space:nowrap}
.topbar .btn-trouver-salon{flex-shrink:0;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.topbar .btn-trouver-salon .ico-search{display:none}
/* Mobile : remplace le bouton pilule par un disque doré avec icône SVG loupe seule (style premium iOS) */
@media(max-width:600px){
  .topbar{padding:10px 12px;gap:6px}
  .topbar .btn-trouver-salon{padding:0 !important;width:40px;height:40px;border-radius:50% !important;justify-content:center;font-size:0;letter-spacing:0;box-shadow:0 2px 12px rgba(212,168,67,.4) !important}
  .topbar .btn-trouver-salon .lbl-trouver{display:none}
  .topbar .btn-trouver-salon .ico-emoji{display:none}
  .topbar .btn-trouver-salon .ico-search{display:block}
}
.logo{font-family:var(--f2);font-size:18px;font-weight:900;color:var(--gold);cursor:pointer;display:flex;align-items:center;gap:6px}
.logo img{flex-shrink:0}
.container{max-width:560px;margin:0 auto;padding:20px 16px 60px}

/* AUTH FORMS */
.auth-page{max-width:420px;margin:40px auto;padding:0 16px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 24px}
.auth-card h1{font-family:var(--f2);font-size:26px;font-weight:900;margin-bottom:4px}
.auth-card .sub{font-size:14px;color:var(--text3);margin-bottom:24px}
.fg{margin-bottom:14px}
.fg label{font-size:12px;font-weight:600;color:var(--text3);display:block;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--f1);outline:none;transition:border .2s}
.fg input:focus{border-color:var(--gold)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:14px;border-radius:12px;border:none;font-weight:700;font-size:15px;cursor:pointer;font-family:var(--f1);transition:all .2s;width:100%;text-align:center;display:block}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:#d4b45e}
.btn-outline{background:none;border:1px solid var(--border2);color:var(--text)}
.btn-red{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.15)}
.err{display:none;background:rgba(248,113,113,.1);color:var(--red);padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px}
.consent{padding:10px 0;border-top:1px solid var(--border)}
.consent label{font-size:13px;display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;color:var(--text2)}

/* DASHBOARD */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;gap:0}
.tab{flex:1;padding:14px 8px;text-align:center;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--gold);border-color:var(--gold)}
.section{margin-bottom:24px}
.section-title{font-size:14px;font-weight:800;color:var(--gold);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}

/* RDV LIST */
.rdv-item{display:flex;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.rdv-item:last-child{border:none}
.rdv-date{text-align:center;min-width:48px}
.rdv-date .d{font-size:22px;font-weight:900;line-height:1}
.rdv-date .m{font-size:11px;color:var(--text3);text-transform:uppercase}
.rdv-info{flex:1}
.rdv-svc{font-weight:700;font-size:14px}
.rdv-det{font-size:12px;color:var(--text2);margin-top:2px}
.rdv-salon{font-size:11px;color:var(--gold);margin-top:2px}
.rdv-status{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700}
.st-pending{background:rgba(251,146,60,.12);color:var(--orange)}
.st-confirmed{background:rgba(74,222,128,.12);color:var(--green)}
.st-done{background:rgba(96,165,250,.12);color:var(--blue)}
.st-cancelled{background:rgba(248,113,113,.12);color:var(--red)}

/* PROFILE */
.avatar-area{text-align:center;margin-bottom:20px}
.avatar{width:80px;height:80px;border-radius:50%;background:var(--gold);color:#000;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;margin:0 auto 8px;font-family:var(--f2)}
.user-name{font-size:18px;font-weight:800}
.user-email{font-size:13px;color:var(--text3)}

/* SETTINGS ROW */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border:none}
.setting-label{font-size:14px;font-weight:600}
.setting-desc{font-size:12px;color:var(--text3);margin-top:2px}
.toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.1);position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--gold)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on::after{left:22px}

.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty .ico{font-size:40px;margin-bottom:8px}

.footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);margin-top:20px}

@media(max-width:440px){.fg-row{grid-template-columns:1fr}.auth-card{padding:24px 16px}}
</style>
</head>

async function sha256(pass){
  var enc=new TextEncoder().encode(pass);
  var hash=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}
// FIX I7: Salted hash (email as salt) — prevents rainbow table attacks
async function sha256Salted(email, pass){
  return await sha256(email.toLowerCase().trim() + ":" + pass);
}
function api(path,opts){return fetch(SB_URL+"/rest/v1/"+path,Object.assign({headers:HDR},opts||{}));}
function fmtDate(d){if(!d)return"\u2014";try{return new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});}catch(e){return d;}}

// Session
function saveSession(){
  if(!CLIENT)return;
  var safe={};for(var k in CLIENT){if(k!=="password_hash")safe[k]=CLIENT[k];}
  try{localStorage.setItem("lx_account",JSON.stringify(safe));}catch(e){}
}
function loadSession(){
  // Priorité au token BP (nouveau flow via edge functions)
  if (window.LX && LX.hasSession()) {
    var u=LX.getUser();
    if(u){CLIENT=u;if(CLIENT.password_hash)delete CLIENT.password_hash;PAGE="dashboard";return;}
  }
  // Fallback legacy localStorage
  try{var d=localStorage.getItem("lx_account");if(d){CLIENT=JSON.parse(d);if(CLIENT.password_hash)delete CLIENT.password_hash;PAGE="dashboard";}}catch(e){}
}
function logout(){CLIENT=null;CLIENT_RDVS=[];PAGE="login";LX.logout();try{localStorage.removeItem("lx_account");}catch(e){}render();}
loadSession();
// Refresh client data via edge function (si session BP valide)
if(CLIENT&&LX.hasSession()){
  LX.get().then(function(res){
    if(res.ok&&res.data&&res.data.user){
      CLIENT=res.data.user;
      saveSession();render();
    } else if (res.status===401){
      // Session expirée → retour login
      logout();
    }
  }).catch(function(e){});
}

  h+='</div>';
  
  if(PAGE==="login")h+=renderLogin();

// --- RDV TAB ---
function renderRdvTab(){
  var h='';
  var mois=["Jan","F\u00e9v","Mar","Avr","Mai","Jun","Jul","Ao\u00fb","Sep","Oct","Nov","D\u00e9c"];
  var stLabels={pending:"En attente",confirmed:"Confirm\u00e9",done:"Termin\u00e9",cancelled:"Annul\u00e9"};
  var stClasses={pending:"st-pending",confirmed:"st-confirmed",done:"st-done",cancelled:"st-cancelled"};
  
  var today=new Date().toISOString().slice(0,10);
  var upcoming=CLIENT_RDVS.filter(function(r){return r.date_rdv>=today&&r.status!=="cancelled"&&r.status!=="done";});
  var past=CLIENT_RDVS.filter(function(r){return (r.date_rdv<today&&r.status!=="cancelled")||r.status==="done";});
  var cancelled=CLIENT_RDVS.filter(function(r){return r.status==="cancelled";});
  // Override status label for past confirmed → Terminé
  function getStatusLabel(r){
    if(r.status==="done")return "Termin\u00e9";
    if(r.date_rdv<today&&r.status!=="cancelled")return "Termin\u00e9";
    return stLabels[r.status]||r.status;
  }
  function getStatusClass(r){
    if(r.status==="done"||(r.date_rdv<today&&r.status!=="cancelled"))return "st-done";
    return stClasses[r.status]||"";
  }
  
  // --- UPCOMING ---
  h+='<div class="section"><div class="section-title">\ud83d\udcc5 \u00c0 venir ('+upcoming.length+')</div>';
  if(upcoming.length){
    upcoming.forEach(function(r){
      var dp=r.date_rdv.split("-");
      h+='<div class="card" style="margin-bottom:8px">';
      h+='<div class="rdv-item" style="border:none;padding:0">';
      h+='<div class="rdv-date"><div class="d">'+parseInt(dp[2])+'</div><div class="m">'+mois[parseInt(dp[1])-1]+'</div></div>';
      h+='<div class="rdv-info"><div class="rdv-svc">'+r.service_nom+'</div>';
      h+='<div class="rdv-det">'+(r.heure_rdv?r.heure_rdv.slice(0,5):"")+' \u2022 '+(r.collaborateur_nom||"")+' \u2022 '+r.service_prix+'\u20ac</div>';
      h+='<div class="rdv-salon">\ud83c\udfe0 '+(r.salon_nom||"Salon")+'</div></div>';
      h+='<div class="rdv-status '+getStatusClass(r)+'">'+getStatusLabel(r)+'</div>';
      h+='</div>';
      // === Modification SALON (le salon a modifi\u00e9 le RDV) \u2014 bandeau prioritaire ===
      if(r.salon_modified_at && !r.salon_modified_acknowledged_by_client){
        var modFields=r.salon_modified_fields||{};
        var modList=[];
        if(modFields.date_rdv) modList.push('Date : <strong>'+fmtDate(modFields.date_rdv.old)+' \u2192 '+fmtDate(modFields.date_rdv.new)+'</strong>');
        if(modFields.heure_rdv) modList.push('Heure : <strong>'+(modFields.heure_rdv.old||"").slice(0,5)+' \u2192 '+(modFields.heure_rdv.new||"").slice(0,5)+'</strong>');
        if(modFields.collaborateur_nom) modList.push('Avec : <strong>'+modFields.collaborateur_nom.old+' \u2192 '+modFields.collaborateur_nom.new+'</strong>');
        if(modFields.duree_minutes) modList.push('Dur\u00e9e : <strong>'+modFields.duree_minutes.old+' \u2192 '+modFields.duree_minutes.new+' min</strong>');
        if(modFields.service_nom) modList.push('Prestation : <strong>'+modFields.service_nom.old+' \u2192 '+modFields.service_nom.new+'</strong>');
        h+='<div style="margin-top:8px;padding:10px 12px;background:linear-gradient(135deg,rgba(251,146,60,.12),rgba(251,146,60,.06));border:1.5px solid rgba(251,146,60,.35);border-radius:10px;font-size:12px;color:#fff;line-height:1.6">';
        h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:16px">\u26a0\ufe0f</span><strong style="color:#fb923c">Modification par le salon</strong><span style="font-size:10px;color:var(--text3);margin-left:auto">'+fmtDate(r.salon_modified_at.slice(0,10))+'</span></div>';
        if(modList.length){h+='<div style="font-size:12px">'+modList.join('<br>')+'</div>';}
        h+='<button onclick="ackSalonModification(\''+r.id+'\')" style="margin-top:8px;width:100%;padding:8px;border-radius:6px;border:1px solid rgba(251,146,60,.3);background:rgba(251,146,60,.08);color:#fb923c;font-size:11px;font-weight:700;cursor:pointer">\u2713 J\'ai pris connaissance</button>';
        h+='</div>';
      }
      // Modification pending notice (DEMAND\u00c9E PAR LE CLIENT vers salon)

      }
      if(r.modification_status==="refused"){
        h+='<div style="margin-top:6px;padding:8px;background:rgba(248,113,113,.08);border-radius:8px;font-size:12px;color:var(--red)">\u274c Modification refus\u00e9e par le salon</div>';

      h+='<button onclick="showModifyRdv(\''+r.id+'\',\''+r.salon_id+'\')" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--gold2);background:var(--gold-bg);color:var(--gold);font-size:12px;font-weight:700;cursor:'+(canModify?"pointer":"not-allowed")+';opacity:'+(canModify?"1":".4")+'"'+(canModify?"":' disabled')+'>\u270f\ufe0f Modifier</button>';

      h+='</div></div>';
    });
  } else {
    h+='<div class="empty"><div class="ico">\ud83d\udcc5</div>Aucun rendez-vous \u00e0 venir<br><a href="/recherche.html" style="font-size:13px">Trouver un pro</a></div>';
  }
  h+='</div>';
  
  // --- PAST (with invoice) ---
  if(past.length){
    h+='<div class="section"><div class="section-title">\ud83d\udcdc Historique ('+past.length+')</div>';
    past.slice(0,15).forEach(function(r){
      var dp=r.date_rdv.split("-");
      h+='<div class="card" style="margin-bottom:6px;opacity:.8">';
      h+='<div class="rdv-item" style="border:none;padding:0">';
      h+='<div class="rdv-date"><div class="d">'+parseInt(dp[2])+'</div><div class="m">'+mois[parseInt(dp[1])-1]+'</div></div>';
      h+='<div class="rdv-info"><div class="rdv-svc">'+r.service_nom+'</div>';
      h+='<div class="rdv-det">'+(r.heure_rdv?r.heure_rdv.slice(0,5):"")+' \u2022 '+r.service_prix+'\u20ac</div>';
      h+='<div class="rdv-salon">\ud83c\udfe0 '+(r.salon_nom||"Salon")+'</div></div>';
      h+='<div class="rdv-status '+getStatusClass(r)+'">'+getStatusLabel(r)+'</div>';

        h+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap">';
        // Bouton avis : seulement pour RDV honor\u00e9, 1 par salon (\u00e9dition possible)
        if(r.status==="done" && r.salon_id){
          var avisExist=CLIENT_AVIS.find(function(a){return a.salon_id===r.salon_id;});
          if(avisExist){
            h+='<button onclick="showLeaveAvisModal(\''+r.id+'\',null,\''+r.salon_id+'\')" style="padding:6px 12px;border-radius:6px;border:1px solid rgba(200,168,78,.3);background:rgba(200,168,78,.08);color:var(--gold);font-size:11px;font-weight:600;cursor:pointer">\u270f Modifier mon avis</button>';
          } else {
            h+='<button onclick="showLeaveAvisModal(\''+r.id+'\',null,\''+r.salon_id+'\')" style="padding:6px 12px;border-radius:6px;border:1px solid rgba(200,168,78,.4);background:linear-gradient(135deg,rgba(200,168,78,.12),rgba(200,168,78,.04));color:var(--gold);font-size:11px;font-weight:700;cursor:pointer">\u2605 Laisser un avis</button>';
          }
        }
        if(r.salon_id)h+='<button onclick="rebookRdv(\''+r.salon_id+'\','+(r.service_id||'null')+',\''+encodeURIComponent(r.salon_nom||"")+'\')" style="padding:6px 12px;border-radius:6px;border:1px solid rgba(200,168,78,.2);background:rgba(200,168,78,.06);color:var(--gold);font-size:11px;font-weight:600;cursor:pointer">\ud83d\udd01 Reprendre ce RDV</button>';
        h+='<button onclick="downloadReceipt(\''+r.id+'\')" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:rgba(255,255,255,.04);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer">\ud83d\udcc4 Re\u00e7u</button>';
        h+='</div>';
      }
      h+='</div>';
    });
    h+='</div>';
  }
  
  // --- CANCELLED ---
  if(cancelled.length){
    h+='<div class="section"><div class="section-title" style="color:var(--red)">\u274c Annul\u00e9s ('+cancelled.length+')</div>';
    cancelled.slice(0,5).forEach(function(r){
      var dp=r.date_rdv.split("-");
      h+='<div class="card" style="margin-bottom:6px;opacity:.4">';
      h+='<div class="rdv-item" style="border:none;padding:0">';
      h+='<div class="rdv-date"><div class="d">'+parseInt(dp[2])+'</div><div class="m">'+mois[parseInt(dp[1])-1]+'</div></div>';
      h+='<div class="rdv-info"><div class="rdv-svc" style="text-decoration:line-through">'+r.service_nom+'</div>';

      h+='<div class="rdv-status st-cancelled">Annul\u00e9</div>';
      h+='</div></div>';
    });
    h+='</div>';
  }
  
  return h;
}

// --- FIDELITE TAB ---
var FIDELITE_DATA=[];
var _fideliteLoaded=false;

async function loadFidelite(){
  if(!CLIENT||_fideliteLoaded)return;
  try{
    var r=await api("fidelite_client?select=*&client_luxyra_id=eq."+encodeURIComponent(CLIENT.email||CLIENT.id)+"&order=derniere_visite.desc");
    var data=await r.json();
    if(Array.isArray(data))FIDELITE_DATA=data;
    // Also try by ID if email returned nothing
    if(!FIDELITE_DATA.length&&CLIENT.id){
      var r2=await api("fidelite_client?select=*&client_luxyra_id=eq."+CLIENT.id+"&order=derniere_visite.desc");
      var d2=await r2.json();
      if(Array.isArray(d2)&&d2.length)FIDELITE_DATA=d2;
    }
    // Fetch CURRENT fidconf from each salon (not stale values from last visit)
    for(var fi=0;fi<FIDELITE_DATA.length;fi++){
      try{
        var sr=await api("salons_public?select=config_json&id=eq."+FIDELITE_DATA[fi].salon_id);
        var sd=await sr.json();
        if(Array.isArray(sd)&&sd[0]){
          var cfg={};try{cfg=typeof sd[0].config_json==="string"?JSON.parse(sd[0].config_json):sd[0].config_json||{};}catch(e){}
          if(cfg.fidconf){
            FIDELITE_DATA[fi].seuil_fidelite=cfg.fidconf.seuil||10;
            FIDELITE_DATA[fi].remise_fidelite=cfg.fidconf.remise||10;
            FIDELITE_DATA[fi].remise_type=cfg.fidconf.type||"amount";
          }
        }
      }catch(e){}
    }
    _fideliteLoaded=true;
  }catch(e){console.log("Fidelite load error:",e);}
}

function renderFideliteTab(){
  var h='';
  h+='<div class="section"><div class="section-title">\ud83c\udf1f Mes points fid\u00e9lit\u00e9</div>';
  
  if(!_fideliteLoaded){
    loadFidelite().then(function(){render();});
    h+='<div class="card" style="text-align:center;padding:30px;color:var(--text3)">Chargement...</div>';
    h+='</div>';
    return h;
  }
  
  if(!FIDELITE_DATA.length){
    h+='<div class="empty"><div class="ico">\ud83c\udf1f</div>Aucun point fid\u00e9lit\u00e9<br><span style="font-size:12px;color:var(--text3)">Vos points appara\u00eetront ici apr\u00e8s chaque visite</span></div>';
    h+='</div>';
    return h;
  }
  
  // Total points
  var totalPoints=0;var totalVisites=0;
  FIDELITE_DATA.forEach(function(f){totalPoints+=(f.points||0);totalVisites+=(f.visites||0);});
  
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">';
  h+='<div class="card" style="text-align:center"><div style="font-size:28px;font-weight:900;color:var(--gold)">'+totalPoints+'</div><div style="font-size:12px;color:var(--text3)">Points totaux</div></div>';
  h+='<div class="card" style="text-align:center"><div style="font-size:28px;font-weight:900;color:var(--blue)">'+totalVisites+'</div><div style="font-size:12px;color:var(--text3)">Visites totales</div></div>';
  h+='</div>';
  
  // Per salon
  h+='<div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px">Par \u00e9tablissement</div>';
  FIDELITE_DATA.forEach(function(f){
    var seuil=f.seuil_fidelite||10;
    var pts=f.points||0;
    var pct=Math.min(100,Math.round(pts/seuil*100));
    var remise=f.remise_fidelite||10;
    var remUnit=f.remise_type==="percent"?"%":"\u20ac";
    var remaining=Math.max(0,seuil-pts);
    h+='<div class="card" style="margin-bottom:8px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    h+='<div><div style="font-weight:700;font-size:14px">'+(f.salon_nom||"Salon")+'</div>';
    h+='<div style="font-size:11px;color:var(--text3)">'+(f.visites||0)+' visite(s) \u2022 Derni\u00e8re: '+fmtDate(f.derniere_visite)+'</div></div>';
    h+='<div style="text-align:right"><div style="font-size:22px;font-weight:900;color:var(--gold)">'+pts+' / '+seuil+'</div><div style="font-size:10px;color:var(--text3)">passages</div></div>';
    h+='</div>';
    // Progress bar
    h+='<div style="height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--gold);border-radius:4px"></div></div>';
    if(remaining>0){
      h+='<div style="font-size:11px;color:var(--text3);margin-top:4px">Encore '+remaining+' passage'+(remaining>1?"s":"")+'avant la remise de <strong style="color:var(--gold)">-'+remise+remUnit+'</strong></div>';
    }else{
      h+='<div style="font-size:11px;color:var(--gold);font-weight:700;margin-top:4px">\ud83c\udf89 Remise de -'+remise+remUnit+' disponible au prochain passage !</div>';
    }
    h+='</div>';
  });
  
  h+='</div>';
  return h;
}

var CARTES_ABO_DATA=[];
var _cartesLoaded=false;

async function loadCartesAbo(){
  if(!CLIENT||_cartesLoaded)return;
  try{
    // Query by email — same cross-salon pattern as fidelite
    var r=await api("cartes_abo_clients?select=*&client_luxyra_id=eq."+encodeURIComponent(CLIENT.email)+"&order=created_at.desc");
    var data=await r.json();
    if(Array.isArray(data))CARTES_ABO_DATA=data;
    // Enrich with salon name
    for(var ci=0;ci<CARTES_ABO_DATA.length;ci++){
      if(!CARTES_ABO_DATA[ci].salon_nom){
        try{
          var sr=await api("salons_public?select=nom&id=eq."+CARTES_ABO_DATA[ci].salon_id);
          var sd=await sr.json();
          if(Array.isArray(sd)&&sd[0])CARTES_ABO_DATA[ci].salon_nom=sd[0].nom;
        }catch(e){}
      }
    }
    _cartesLoaded=true;
  }catch(e){console.log("Cartes abo load error:",e);}
}

    actives.forEach(function(c){

      h+='<div style="font-size:12px;color:var(--text3)">'+(c.salon_nom||"Salon")+' \u2022 Depuis le '+fmtDate(c.date_achat)+'</div></div>';
      h+='<div style="font-size:10px;font-weight:800;background:rgba(74,222,128,.1);color:var(--green);padding:4px 10px;border-radius:6px">ACTIVE</div></div>';
      h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">';
      h+='<div style="text-align:center;padding:8px;background:rgba(255,255,255,.03);border-radius:8px"><div style="font-size:18px;font-weight:900">-'+(c.remise_services||0)+'%</div><div style="font-size:10px;color:var(--text3)">Services TTC</div></div>';
      h+='<div style="text-align:center;padding:8px;background:rgba(255,255,255,.03);border-radius:8px"><div style="font-size:18px;font-weight:900">-'+(c.remise_forfaits||0)+'%</div><div style="font-size:10px;color:var(--text3)">Forfaits TTC</div></div>';
      h+='<div style="text-align:center;padding:8px;background:rgba(74,222,128,.1);border-radius:8px"><div style="font-size:18px;font-weight:900;color:var(--green)">'+eco.toFixed(2)+'\u20ac</div><div style="font-size:10px;color:var(--text3)">\u00c9conomies</div></div>';

  }
  
  // Expired/old cards
  if(expirees.length){
    h+='<div style="font-size:13px;font-weight:700;color:var(--text3);margin:16px 0 8px">Historique</div>';

// --- TICKETS TAB ---
function renderTicketsTab(){
  var h='';
  var mois=["Jan","F\u00e9v","Mar","Avr","Mai","Jun","Jul","Ao\u00fb","Sep","Oct","Nov","D\u00e9c"];
  var today=new Date().toISOString().slice(0,10);
  var done=CLIENT_RDVS.filter(function(r){
    if(r.status==="done")return true;
    // Past confirmed = effectué (salon n'a pas mis à jour le statut online)
    if((r.status==="confirmed"||r.status==="pending")&&r.date_rdv<today)return true;
    return false;
  }).sort(function(a,b){
    if(a.date_rdv!==b.date_rdv)return a.date_rdv>b.date_rdv?-1:1;
    if(a.heure_rdv&&b.heure_rdv&&a.heure_rdv!==b.heure_rdv)return a.heure_rdv>b.heure_rdv?-1:1;
    return (b.ticket_num||0)-(a.ticket_num||0);
  });
  
  h+='<div class="section"><div class="section-title">\ud83c\udfab Mes tickets ('+done.length+')</div>';
  
  if(!done.length){
    h+='<div class="empty"><div class="ico">\ud83c\udfab</div>Aucun ticket de caisse<br><span style="font-size:12px;color:var(--text3)">Vos tickets appara\u00eetront ici apr\u00e8s chaque visite</span></div>';
  }

  done.forEach(function(r){
    var dp=r.date_rdv.split("-");
    var ttc=Number(r.service_prix)||0;
    var dateFR=parseInt(dp[2])+" "+mois[parseInt(dp[1])-1]+" "+dp[0];
    h+='<div class="card" style="margin-bottom:10px;border-left:4px solid var(--gold);padding:14px">';
    // Header: ticket num + date + salon + total
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">';
    h+='<div>';
    h+='<div style="font-weight:800;font-size:15px;color:var(--gold)">Ticket N\u00b0'+(r.ticket_num||"--")+'</div>';
    h+='<div style="font-size:12px;color:var(--text3)">'+dateFR+(r.heure_rdv?" \u00e0 "+r.heure_rdv.slice(0,5):"")+'</div>';
    h+='<div style="font-size:12px;color:var(--text2);margin-top:2px">\ud83c\udfe0 '+(r.salon_nom||"Salon")+'</div>';
    h+='</div>';
    h+='<div style="text-align:right"><div style="font-size:20px;font-weight:900;color:#fff">'+ttc.toFixed(2)+' \u20ac</div><div style="font-size:10px;color:var(--text3)">TTC</div></div>';
    h+='</div>';
    // Items detail - always show all
    if(r.items&&r.items.length){
      h+='<div style="background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:10px">';
      var ic=0;
      r.items.forEach(function(it){
        if(it.isSep)return;
        ic++;
        var icon=it.isProd?"\ud83d\uded2":"\u2728";
        var price=(it.price||0)*(it.qty||1)-(it.remise||0);
        h+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;'+(ic>1?"border-top:1px solid var(--border);":"")+'">';
        h+='<span style="color:var(--text2)">'+icon+' '+(it.name||"")+(it.qty>1?" \u00d7"+it.qty:"")+'</span>';
        h+='<span style="font-weight:700;color:var(--text)">'+price.toFixed(2)+' \u20ac</span></div>';
      });
      h+='</div>';
    }else{
      h+='<div style="font-size:13px;color:var(--text2);margin-bottom:10px;padding:8px 10px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px">';
      h+='\u2728 '+r.service_nom;
      if(r.collaborateur_nom)h+=' \u2022 par '+r.collaborateur_nom;
      h+='</div>';
    }

async function emailReceipt(rdvId){
  var rdv=CLIENT_RDVS.find(function(r){return r.id===rdvId;});if(!rdv)return;
  if(!CLIENT||!CLIENT.email){alert("Aucun email enregistr\u00e9 sur votre compte.");return;}
  var btn=event.target;if(btn){btn.textContent="\u23f3 Envoi...";btn.disabled=true;}

  // Use stored ticket HTML if available, otherwise generate
  var ticketHtml;
  if(rdv.ticket_html){
    ticketHtml=rdv.ticket_html;
  }else{
    var salon={nom:rdv.salon_nom||"Salon",adresse:"",cp:"",ville:"",tel:"",siret:"",tva:"",tauxTVA:20};
    try{
      var sr=await api("salons_public?select=nom,config_json&id=eq."+rdv.salon_id);
      var sd=await sr.json();
      if(Array.isArray(sd)&&sd[0]){
        var cfg={};try{cfg=typeof sd[0].config_json==="string"?JSON.parse(sd[0].config_json):sd[0].config_json||{};}catch(e){}
        salon.nom=cfg.nom||sd[0].nom||"Salon";
        salon.adresse=cfg.adresse||"";salon.cp=cfg.cp||"";salon.ville=cfg.ville||"";
        salon.tel=cfg.tel||"";salon.siret=cfg.siret||"";salon.tva=cfg.tva||"";salon.tauxTVA=cfg.tauxTVA||20;
      }
    }catch(e){}
    ticketHtml=buildCompteTicketHTML(rdv,salon);
  }
  var salonNomEmail=rdv.salon_nom||"Salon";

  try{
    var resp=await fetch("/api/email/ticket",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        clientEmail:CLIENT.email,
        clientName:(CLIENT.prenom||"")+" "+(CLIENT.nom||""),
        salonName:salonNomEmail,
        ticketNum:rdv.ticket_num||("RDV-"+rdvId.slice(0,8)),
        ticketHtml:ticketHtml
      })
    });
    var data=await resp.json();
    if(data.success)alert("\u2705 Ticket envoy\u00e9 \u00e0 "+CLIENT.email);
    else alert("\u274c Erreur lors de l\u0027envoi: "+(data.error||""));
  }catch(e){alert("\u274c Erreur de connexion");}
  if(btn){btn.textContent="\u2709 Recevoir par email";btn.disabled=false;}
}

// Build ticket HTML for compte client (shared between downloadReceipt and emailReceipt)
function buildCompteTicketHTML(rdv,salon){
  var txTVA=salon.tauxTVA||20;
  var ttc=Number(rdv.service_prix)||0;
  var ht=Math.round(ttc*100/(100+txTVA)*100)/100;
  var tva=Math.round((ttc-ht)*100)/100;
  var dp=rdv.date_rdv?rdv.date_rdv.split("-"):["2026","01","01"];
  var dateFR=dp[2]+"/"+dp[1]+"/"+dp[0];
  var acompte=Number(rdv.acompte_montant)||0;

  var h="";
  // DUPLICATA
  h+="<div style='text-align:center;border:3px solid #000;padding:6px;margin-bottom:8px;font-weight:900;font-size:16px;letter-spacing:3px'>DUPLICATA</div>";
  // En-t\u00eate salon
  h+="<div style='text-align:center;border-bottom:1px solid #000;padding-bottom:8px;margin-bottom:8px'>";
  h+="<div style='font-weight:900;font-size:14px;letter-spacing:1px'>"+salon.nom.toUpperCase()+"</div>";
  h+="<div style='font-size:11px'>"+salon.adresse+"</div>";
  h+="<div style='font-size:11px'>"+(salon.cp||"")+" "+(salon.ville||"")+"</div>";
  if(salon.tel)h+="<div style='font-size:11px'>T\u00e9l: "+salon.tel+"</div>";
  h+="</div>";
  // Ticket info
  h+="<div style='text-align:center;margin-bottom:8px'>";
  h+="<div style='font-weight:900;font-size:13px'>Ticket de vente N\u00b0"+(rdv.ticket_num||"--")+"</div>";
  h+="<div style='font-size:12px'>"+dateFR+" \u00e0 "+(rdv.heure_rdv?rdv.heure_rdv.slice(0,5):"")+"</div>";
  if(rdv.collaborateur_nom)h+="<div style='font-size:12px'>Collaborateur: "+rdv.collaborateur_nom+"</div>";
  h+="<div style='font-size:12px'>Client: "+(CLIENT.prenom||"")+" "+(CLIENT.nom||"")+"</div>";
  h+="</div>";
  // Articles
  h+="<table style='width:100%;border-collapse:collapse'><tr style='border-top:1px solid #000;border-bottom:1px solid #000'><th style='text-align:left;padding:4px 0;font-size:11px'>Quantit\u00e9</th><th style='text-align:left;font-size:11px'>D\u00e9signation</th><th style='text-align:right;font-size:11px'>TTC</th></tr>";
  if(rdv.items&&rdv.items.length){
    rdv.items.forEach(function(it){
      if(it.isSep){h+="<tr><td colspan='3' style='padding:6px 0 2px;font-weight:900;border-top:1px dashed #999;font-size:11px'>\u25b6 "+(it.name||"").replace(/---/g,"").trim()+"</td></tr>";return;}
      var lt=(it.price||0)*(it.qty||1)-(it.remise||0);
      h+="<tr style='border-bottom:1px solid #ccc'><td style='padding:3px 0'>"+(it.qty||1)+"</td><td style='padding:3px 4px;font-weight:700'>"+(it.name||"").toUpperCase()+"</td><td style='text-align:right;padding:3px 0'>"+lt.toFixed(2)+"</td></tr>";
    });
  }else{
    h+="<tr><td>1</td><td style='font-weight:700'>"+(rdv.service_nom||"").toUpperCase()+"</td><td style='text-align:right'>"+ttc.toFixed(2)+"</td></tr>";
  }
  h+="</table>";
  // HT
  h+="<div style='display:flex;justify-content:space-between;font-weight:900;font-size:13px;border-top:2px solid #000;padding-top:6px'><span>Total HT :</span><span>"+ht.toFixed(2)+"</span></div>";
  // TVA
  h+="<table style='font-size:11px;margin:6px 0;border-top:1px solid #000;border-bottom:1px solid #000;width:100%;border-collapse:collapse'><tr style='font-weight:700'><td></td><td style='text-align:center'>TVA</td><td style='text-align:center'>HT</td><td style='text-align:right'>TTC</td></tr>";
  h+="<tr><td>TVA "+txTVA+"%</td><td style='text-align:center'>"+tva.toFixed(2)+" \u20ac</td><td style='text-align:center'>"+ht.toFixed(2)+" \u20ac</td><td style='text-align:right'>"+ttc.toFixed(2)+" \u20ac</td></tr></table>";
  // TTC
  h+="<div style='display:flex;justify-content:space-between;font-weight:900;font-size:16px;padding:8px 0;border-bottom:1px solid #000'><span>Total TTC :</span><span>"+ttc.toFixed(2)+" \u20ac</span></div>";
  // Acompte
  if(acompte>0){
    h+="<div style='display:flex;justify-content:space-between;font-size:11px;padding:3px 0'><span>Acompte d\u00e9duit</span><span>-"+acompte.toFixed(2)+" \u20ac</span></div>";
    h+="<div style='display:flex;justify-content:space-between;font-weight:900;font-size:14px;padding:3px 0'><span>RESTE PAY\u00c9</span><span>"+(ttc-acompte).toFixed(2)+" \u20ac</span></div>";
  }
  // NF525
  h+="<div style='border-top:1px dashed #999;margin:8px 0'></div>";
  h+="<div style='text-align:center;font-size:10px;color:#666'>";
  if(salon.siret)h+="<div>SIRET: "+salon.siret+"</div>";
  if(salon.tva)h+="<div>N\u00b0 TVA: "+salon.tva+"</div>";
  h+="<div>Logiciel conforme NF525</div><div>Luxyra - contact@luxyra.fr</div>";
  h+="<div style='font-size:9px;color:#999'>Art. 286-I-3\u00b0 bis du CGI - Conserver 6 ans</div>";
  h+="<div style='font-weight:700;margin-top:4px'>COPIE ELECTRONIQUE - DUPLICATA</div></div>";
  return h;
}

async function doLogin(){

  CLIENT=res.data.user;PAGE="dashboard";TAB="rdv";

}

async function saveProfile(){
  var nom=document.getElementById("pNom").value.trim();
  var pre=document.getElementById("pPre").value.trim();
  var tel=document.getElementById("pTel").value.trim();
  var ddn=document.getElementById("pDdn").value;

  var ville=document.getElementById("pVille")?document.getElementById("pVille").value.trim():"";
  // 1. Save to clients_luxyra via edge function
  var res=await LX.update({nom:nom.toUpperCase(),prenom:pre,telephone:tel,date_naissance:ddn||null,genre:genre||null,adresse:adr,cp:cp,ville:ville});
  if(!res.ok){var el0=document.getElementById("profileMsg");if(el0){el0.style.display="block";el0.style.color="var(--red)";el0.textContent=res.data&&res.data.error?res.data.error:"Erreur";}return;}
  CLIENT=res.data.user;saveSession();
  // 2. Sync to ALL salon client records with same email (only non-empty fields)
  try{
    var syncObj={};
    if(nom)syncObj.nom=nom.toUpperCase();
    if(pre)syncObj.prenom=pre;
    if(tel)syncObj.telephone=tel;
    if(ddn)syncObj.date_naissance=ddn;
    if(genre)syncObj.sexe=genre;
    if(adr)syncObj.adresse=adr;
    if(cp)syncObj.cp=cp;
    if(ville)syncObj.ville=ville;
    if(Object.keys(syncObj).length){
      await api("clients?email=eq."+encodeURIComponent(CLIENT.email),{method:"PATCH",body:JSON.stringify(syncObj)});
    }
  }catch(e2){console.log("Sync salons:",e2);}
  var el=document.getElementById("profileMsg");if(el){el.style.display="block";el.style.color="var(--green)";el.textContent="\u2705 Profil mis \u00e0 jour dans tous vos salons";}
}

async function changePassword(){
  var old=document.getElementById("pOldPass").value;

function toggleNotif(el,field){
  var isOn=el.classList.contains("on");
  el.classList.toggle("on");
  CLIENT[field]=!isOn;saveSession();
  // Save via edge function
  LX.toggleNotif(field,!isOn);
  // Sync to ALL salon client records with same email (unchanged, reste en anon pour l'instant)
  try{
    var body={};body[field]=!isOn;
    api("clients?email=eq."+encodeURIComponent(CLIENT.email),{method:"PATCH",body:JSON.stringify(body)});
  }catch(e){}
}

// ========== LOAD DATA ==========
async function loadMyRdvs(){
  if(!CLIENT)return;
  try{
    // Get RDVs from rdv_online with salon name
    var r=await api("rdv_online?select=*,salons(nom)&client_luxyra_id=eq."+CLIENT.id+"&order=date_rdv.desc&limit=50");
    var data=await r.json();
    if(Array.isArray(data)){
      CLIENT_RDVS=data.map(function(d){d.salon_nom=d.salons?d.salons.nom:"";return d;});
    }
    // Fallback by email
    var r2=await api("rdv_online?select=*,salons(nom)&client_email=eq."+encodeURIComponent(CLIENT.email)+"&order=date_rdv.desc&limit=50");
    var data2=await r2.json();
    if(Array.isArray(data2)){data2.forEach(function(d){d.salon_nom=d.salons?d.salons.nom:"";var ex=false;CLIENT_RDVS.forEach(function(x){if(x.id===d.id)ex=true;});if(!ex)CLIENT_RDVS.push(d);});}
    
    // Load POS tickets via Worker (bypasses RLS)
    try{
      var r3=await fetch("/api/client/tickets",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email:CLIENT.email})
      });
      var tkData=await r3.json();
      if(tkData&&Array.isArray(tkData.tickets)){
        tkData.tickets.forEach(function(t){
          var ex=false;CLIENT_RDVS.forEach(function(x){if(x.id===t.id)ex=true;});
          if(!ex)CLIENT_RDVS.push(t);
        });
      }
    }catch(e3){}
    
    // Sort by date desc
    CLIENT_RDVS.sort(function(a,b){return (a.date_rdv||"")>(b.date_rdv||"")?-1:1;});
    // Charger les avis déjà laissés par ce client (1 avis par salon)
    try{
      var rA=await api("avis_salon?select=id,salon_id,rdv_online_id,ticket_id,note,texte,created_at,updated_at&client_luxyra_id=eq."+CLIENT.id);
      var dA=await rA.json();
      if(Array.isArray(dA)) CLIENT_AVIS=dA;
    }catch(_){}
    render();
  }catch(e){}
}

async function loadMySalons(){
  if(!CLIENT)return;
  try{
    var r=await api("client_salon?select=salon_id,fidelite_points,salons(nom,ville,config_json)&client_id=eq."+CLIENT.id);
    var data=await r.json();
    var el=document.getElementById("mySalons");if(!el)return;
    if(!Array.isArray(data)||!data.length){el.innerHTML='<div class="card"><div class="empty" style="padding:12px">Aucun salon visit\u00e9</div></div>';return;}

async function doDeleteAccount(){
  var confirm=document.getElementById("delConfirm");
  if(!confirm||confirm.value!=="SUPPRIMER"){confirm.style.borderColor="var(--red)";confirm.focus();return;}
  try{
    var email=CLIENT.email;
    // Anonymize rdv_online (reste en anon pour l'instant)
    await api("rdv_online?client_luxyra_id=eq."+CLIENT.id,{method:"PATCH",body:JSON.stringify({client_luxyra_id:null,client_nom:"Anonyme",client_prenom:"",client_tel:"",client_email:""})});
    // Anonymize appointments in all salons
    await api("clients?email=eq."+encodeURIComponent(email),{method:"PATCH",body:JSON.stringify({nom:"ANONYME",prenom:"",telephone:"",email:"",adresse:"",cp:"",ville:"",date_naissance:null,notes:"",actif:false})});
    // Delete fidelite_client
    await api("fidelite_client?client_luxyra_id=eq."+encodeURIComponent(email),{method:"DELETE"});
    // Delete client_salon links
    await api("client_salon?client_id=eq."+CLIENT.id,{method:"DELETE"});
    // Delete the BP account via edge function
    var res=await LX.delete();
    if(!res.ok){alert("Erreur suppression compte: "+(res.data&&res.data.error?res.data.error:""));return;}
    logout();
  }catch(e){alert("Erreur: "+e.message);}
}

  try{

      method:"POST",
      headers:{"Content-Type":"application/json"},

var AVIS_DRAFT={rdvId:null, ticketId:null, salonId:null, note:0, texte:"", editing:null};

  AVIS_DRAFT={
    rdvId:rdvId||null,
    ticketId:ticketId||null,

    note: existing ? Number(existing.note||0) : 0,

function escAttr(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

  AVIS_DRAFT.note=n;

  if(src) renderAvisModal(src);

  var btn=document.getElementById("avisSubmitBtn");
  err.style.display="none";
  if(!AVIS_DRAFT.note || AVIS_DRAFT.note<1 || AVIS_DRAFT.note>5){
    err.textContent="S\u00e9lectionnez une note de 1 \u00e0 5 \u00e9toiles";
    err.style.display="block";
    return;
  }
  if(!LX || !LX.hasSession()){
    err.textContent="Session expir\u00e9e. Reconnectez-vous.";
    err.style.display="block";
    return;
  }
  btn.disabled=true; btn.textContent="Envoi\u2026"; btn.style.opacity=".6";
  try{
    var SB_FN_URL="https://kxdgjtvrkwugbifgppai.supabase.co/functions/v1/avis-create";
    var payload={
      session_token: LX.getToken(),
      note: AVIS_DRAFT.note,
      texte: texte
    };
    if(AVIS_DRAFT.rdvId) payload.rdv_online_id=AVIS_DRAFT.rdvId;
    if(AVIS_DRAFT.ticketId) payload.ticket_id=AVIS_DRAFT.ticketId;
    var r=await fetch(SB_FN_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY},
      body:JSON.stringify(payload)
    });
    var data=await r.json().catch(function(){return{};});
    if(!r.ok){
      err.textContent=data.error||"Erreur lors de l'envoi";
      err.style.display="block";
      btn.disabled=false; btn.textContent=(AVIS_DRAFT.editing?"Modifier mon avis":"Publier mon avis"); btn.style.opacity="1";
      return;
    }
    // Succ\u00e8s \u2014 UPSERT en local (remplace si d\u00e9j\u00e0 existant pour ce salon)
    if(data.avis){
      var idx=CLIENT_AVIS.findIndex(function(a){return a.salon_id===AVIS_DRAFT.salonId;});
      var entry={id:data.avis.id, salon_id:AVIS_DRAFT.salonId, rdv_online_id:AVIS_DRAFT.rdvId||null, ticket_id:AVIS_DRAFT.ticketId||null, note:AVIS_DRAFT.note, texte:texte, created_at:data.avis.created_at, updated_at:data.avis.updated_at||null};
      if(idx>=0) CLIENT_AVIS[idx]=entry; else CLIENT_AVIS.push(entry);
    }
    closeAvisModal();
    showToast(data.action==="updated" ? "\u2713 Votre avis a \u00e9t\u00e9 mis \u00e0 jour." : "\u2713 Merci ! Votre avis a \u00e9t\u00e9 publi\u00e9.");
    render();
  }catch(e){
    err.textContent="Erreur r\u00e9seau : "+(e.message||e);
    err.style.display="block";
    btn.disabled=false; btn.textContent=(AVIS_DRAFT.editing?"Modifier mon avis":"Publier mon avis"); btn.style.opacity="1";
  }
}

function closePopup(id){var el=document.getElementById(id);if(el)el.remove();}
function showToast(msg){
  var el=document.createElement("div");
  el.style.cssText="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:300;border:1px solid var(--gold);box-shadow:0 4px 20px rgba(0,0,0,.4)";
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(function(){el.remove();},3000);
}

// ========== UTILS ==========
function showErr(id,msg){var el=document.getElementById(id);if(el){el.style.display="block";el.textContent=msg;}}
function showMsg(id,msg,color){var el=document.getElementById(id);if(el){el.style.display="block";el.style.color=color||"var(--text)";el.textContent=msg;}}

// Init
if(window.location.hash==="#register"&&!CLIENT)PAGE="register";
render();
if(CLIENT){loadMyRdvs();loadFidelite();}
</script>
